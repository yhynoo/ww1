  TUR_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  TUR_artillery: "Artillery"
  TUR_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
