l_english:
  TUR_army: "Army"
  TUR_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  TUR_army_maneuvers: "Army Maneuvers"
  TUR_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  TUR_conscription: "Announce Mobilization"
  TUR_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

