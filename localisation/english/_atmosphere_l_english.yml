l_english:

  # atmosphere
  _atmosphere.1.d: "The RMS Titanic, pride of the British passenger fleet, struck an iceberg and sank in the icy North Atlantic during her maiden voyage.\n\nOver 1,500 lives were lost in one of the deadliest maritime disasters ever recorded, sending shockwaves through the modern world."

  _atmosphere.2.d: "A meteorite exploded over Holbrook, Arizona, showering the desert with thousands of stony fragments from space.\n\nEyewitnesses reported a blinding fireball and thunderous blast. Scientists have begun collecting the remains of this rare celestial visitor."

  _atmosphere.3.d: "A modern art exhibition at New York’s 69th Regiment Armory has startled the public with bold, abstract, and unconventional works.\n\nSome critics call it visionary, others decry it as nonsense — but few deny that a new artistic movement is underway."

  _atmosphere.4.d: "French aviator Roland Garros has completed the first solo flight across the Mediterranean Sea, traveling from France to Tunisia without pause.\n\nThe daring feat pushes the boundaries of aviation and hints at a future shaped by flight."

  _atmosphere.5.d: "A deadly strain of influenza is sweeping across the globe, spreading with unprecedented speed and devastating both military camps and civilian cities.\n\nHospitals are overwhelmed, streets are deserted, and panic grows as the world faces a silent killer."

  # taken - france
  _taken.1.d: "The capital of France falls into [ROOT.GetAdjective] hands. Streets that once teemed with debate and pride are now eerily silent.\n\nCitizens peer from behind shuttered windows, uncertain how to respond as their cultural and political heart is subdued by enemy forces."

  _taken.2.d: "History seems to repeat itself in the fields of Sedan. Armies clashed on the old fields of honor, and the French army again struggled to mount a defense.\n\nThe nation watches, aware that morale and pride hang by a thread in this symbolic moment."

  # taken - austria
  _taken.3.d: "Trieste, the empire’s key Adriatic port, has fallen. Trade grinds to a halt and naval movements are restricted. \n\nCitizens and officials alike confront the reality that Austria’s connection to the wider world has been severed, leaving commerce and influence exposed."

  _taken.4.d: "[89.GetCapitalVictoryPointName], perched at the edge of the empire and guarding the Carpathians, is now occupied. The once-secure eastern frontier becomes a corridor for [ROOT.GetAdjective] forces, threatening not only military defense but also the very livelihoods of those living in all of Galicia."

  # taken - ottomans
  _taken.5.d: "Athens, ancient heart of European civilization, falls under [ROOT.GetAdjective] control. Monuments and public spaces, once symbols of enduring cultural heritage, now lie under new authority.\n\nCitizens ponder what the conquest of such a storied city signals for the empire and the continent at large."

  _taken.6.d: "Authority over the Near East seems to have shifted. Regions long under Ottoman oversight are now subject to [ROOT.GetAdjective] administration.\n\nTrade routes, governance, and daily life are unsettled, leaving both rulers and subjects to wonder how control over the Levant will shape the wider war."

  _taken.7.d: "Hagia Sophia, emblem of imperial power, now bears the insignia of the occupiers. The city falls into a hushed stillness as traditions adapt under new oversight.\n\nCitizens confront a tangible symbol of [TUR.GetNameDef]’s retreat and the shifting balance of authority."

  # taken - germany
  _taken.8.d: "Germany’s vital northern port has been captured. Docks and warehouses are silent, trade is disrupted, and the city’s people face life under occupation.\n\nThe loss of Hamburg reverberates across [GER.GetNameDef], where many question the direction the war is taking."

  # taken - russia
  _taken.9.d: "Warsaw, cultural and commercial hub of Eastern Europe, falls to [ROOT.GetAdjective] forces. The city’s streets, markets, and institutions now serve occupiers.\n\nLocal citizens worry how this conquest will reshape political influence and economic activity across the eastern front."

  _taken.10.d: "Odessa, gateway to the Black Sea and surrounding fertile lands, is now controlled by [ROOT.GetNameDef].\n\nIts ports, warehouses, and hinterlands come under new authority, unsettling both commerce and daily life while signaling a strategic gain for the occupiers."

  # taken - england
  _taken.11.d: "London has fallen. The capital, hub of the empire’s government and commerce, lies under [ROOT.GetAdjective] control.\n\nCitizens are in shock as the city’s streets, bridges, and institutions come under occupation, a blow to national pride that few had imagined possible."