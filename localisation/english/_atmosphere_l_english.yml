l_english:

  # atmosphere
  _atmosphere.1.d: "Roald Amundsen and his expedition have returned safely, arriving in Hobart after conquering the South Pole.\n\nTheir triumph stirs admiration across the world, a testament to endurance and discovery at the farthest reaches of the Earth’s frozen desolation."

  _atmosphere.2.d: "No word has come from Roald Amundsen’s Antarctic expedition. Weeks have passed since their last signal from the southern icy desert.\n\nFears grow that the explorers perished in the blizzards, lost forever at the edge of the world they sought to conquer."

  _atmosphere.3.d: "After a triumphant voyage across the Atlantic, the RMS Titanic glided into New York Harbor to great celebration.\n\nCrowds cheered as the world’s grandest ship completed her maiden journey, a symbol of modern engineering and human ambition afloat upon calm seas."

  _atmosphere.4.d: "Terrible news shocks the world — the Titanic has been lost in the North Atlantic after striking an iceberg. Over fifteen hundred souls are feared dead, their dreams sunk beneath icy waters.\n\nThe age of progress finds itself humbled by the elements’ cruel hand."

  _atmosphere.5.d: "A deadly strain of influenza is sweeping across the globe, spreading with unprecedented speed and devastating both military camps and civilian cities.\n\nHospitals are overwhelmed, streets are deserted, and panic grows as the world faces a silent killer."

  # taken - france
  _taken.1.d: "The capital of France falls into [ROOT.GetAdjective] hands. Streets that once teemed with debate and pride are now eerily silent.\n\nCitizens peer from behind shuttered windows, uncertain how to respond as their cultural and political heart is subdued by enemy forces."

  _taken.2.d: "History seems to repeat itself in the fields of Sedan. Armies clashed on the old fields of honor, and the French army again struggled to mount a defense.\n\nThe nation watches, aware that morale and pride hang by a thread in this symbolic moment."

  # taken - austria
  _taken.3.d: "Trieste, the empire’s key Adriatic port, has fallen. Trade grinds to a halt and naval movements are restricted. \n\nCitizens and officials alike confront the reality that Austria’s connection to the wider world has been severed, leaving commerce and influence exposed."

  _taken.4.d: "[89.GetCapitalVictoryPointName], perched at the edge of the empire and guarding the Carpathians, is now occupied.\n\nThe once-secure eastern frontier becomes a corridor for [ROOT.GetAdjective] forces, threatening not only military defense but also the very livelihoods of those living in all of Galicia."

  # germany
  _taken.5.d: "After years of mourning the defeat of 1871, French troops once again march through the streets of Strasbourg to the sight of tricolor flags raised from every window.\n\nCrowds cheer, tears are shed — Alsace-Lorraine is French again. Yet behind the celebration lies the weary silence of a nation that has paid dearly for its victory."

  # ottomans
  _taken.6.d: "Authority over the Near East seems to have shifted. Regions long under Ottoman oversight are now subject to [ROOT.GetAdjective] administration.\n\nTrade routes, governance, and daily life are unsettled, leaving both rulers and subjects to wonder how control over the Levant will shape the wider war."

  # taken - russia
  _taken.7.d: "Warsaw, cultural and commercial hub of Eastern Europe, falls to [ROOT.GetAdjective] forces. The city’s streets, markets, and institutions now serve occupiers.\n\nLocal citizens worry how this conquest will reshape political influence and economic activity across the eastern front."

  # taken - england
  _taken.8.d: "London has fallen. The capital, hub of the empire’s government and commerce, lies under [ROOT.GetAdjective] control.\n\nCitizens are in shock as the city’s streets, bridges, and institutions come under occupation, a blow to national pride that few had imagined possible."