l_english:
  # aviation
  poland_aviation.1.d: "A group of American volunteer pilots has arrived to aid the Polish cause, many of them already experienced in aerial combat.\n\nCalling themselves the ‘Kościuszko Squadron,’ they bring not only aircraft but a spirit of adventure and solidarity with a nation fighting for its survival."

  # colonies
  poland_maritime.1.d: "Polish diplomats in Warsaw request the transfer of [polish_colonies.GetName], arguing that a nation reborn must look to the seas as well as its borders.\n\nTheir proposal appeals to shared security and commerce, though some suspect broader ambitions beneath the polite, formal language of their note."

  poland_maritime.2.d: "A Polish flag now flies above distant colonies once thought beyond Warsaw’s reach.\n\nNewspapers celebrate a ‘return to the world’s oceans,’ while foreign chanceries weigh what this gesture means — a token of friendship, or the first step toward a new imperial dream."

  # committee
  poland_committee.1.d: "With Austria-Hungary collapsing, a Liquidation Committee has been proclaimed in Galicja to assume authority from the imperial administration.\n\nIts task is to maintain order and prepare the ground for an independent Polish state — and it is time to choose its leader."

  # uprisings
  poland_uprising.1.d: "As civil war spreads through the Tsars’ empire, reports emerge of Polish militias rising in the western governorates.\n\nIn the towns of former Kingdom of Poland, white-and-red flags appear again, and old tsarist garrisons melt away amid the confusion."

  poland_uprising.2.d: "With Germany consumed by internal strife, voices in Warsaw whisper that the moment has come to claim the industrious Greater Poland, as well as the access to the Baltic sea.\n\nYet many caution against reckless action — these regions are still armed, angry, and uncertain of their loyalties."

  poland_uprising.3.d: "Polish banners and armed groups have appeared across our eastern territories, and local administrations debate surrendering to them, as the authority of Berlin fades.\n\nSome see opportunity in withdrawal, even though most call it outright treason. Everywhere, the air trembles with rumors of gunfire and new borders."

