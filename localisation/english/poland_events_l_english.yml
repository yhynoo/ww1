l_english:
  # aviation
  poland_aviation.1.d: "A group of American volunteer pilots has arrived to aid the Polish cause, many of them already experienced in aerial combat.\n\nCalling themselves the ‘Kościuszko Squadron,’ they bring not only aircraft but a spirit of adventure and solidarity with a nation fighting for its survival."

  # committee
  poland_committee.1.d: "With Austria-Hungary collapsing, a Liquidation Committee has been proclaimed in Galicja to assume authority from the imperial administration.\n\nIts task is to maintain order and prepare the ground for an independent Polish state — and it is time to choose its leader."

  # crown
  poland_crown.1.d: "With the rebirth of the Polish state, the question of the crown hangs heavy in [POL.capital.GetCapitalVictoryPointName]. Foreign courts whisper their candidates, while nobles and soldiers debate what kind of monarch Poland should have.\n\nThe choice will decide not only a king, but the country’s future allegiance."

  poland_crown.2.d: "Amid bells and cannon salutes, [POL.GetLeader] has been crowned King of Poland. Crowds filled the streets of [POL.capital.GetCapitalVictoryPointName], waving flags and singing hymns once banned by the empires.\n\nFor the first time in generations, Poland stands again beneath its own crown."

  # uprisings
  poland_uprisings.1.d: "As civil war spreads through the former empire, reports emerge of Polish militias rising in the western governorates.\n\nIn the towns of former Kingdom of Poland, white-and-red flags appear again, and old tsarist garrisons melt away amid the confusion."

  poland_uprisings.2.d: "With Germany consumed by internal strife, voices in Warsaw whisper that the moment has come to claim the industrious Greater Poland, as well as the access to the Baltic sea.\n\nYet many caution against reckless action — these regions are still armed, angry, and uncertain of their loyalties."

  poland_uprisings.3.d: "Polish banners and armed groups have appeared across our eastern territories, and local administrations debate surrendering to them, as the authority of Berlin fades.\n\nSome see opportunity in withdrawal, even though most call it outright treason. Everywhere, the air trembles with rumors of gunfire and new borders."

