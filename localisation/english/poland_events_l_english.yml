l_english:

  # komisja
  poland_committee.1.d: "With Austria-Hungary collapsing, a Liquidation Committee has been proclaimed in Galicja to assume authority from the imperial administration.\n\nIts task is to maintain order and prepare the ground for an independent Polish state — and it is time to choose its leader."

  # uprisings
  poland_uprisings.2.d: "In the factories and railway yards of Poznań, the mood has turned restless. Workers speak openly of German collapse, and veterans drill in secret.\n\nMany believe the moment has come to reclaim the western lands for Poland, whatever the cost."

  poland_uprisings.3.d: "In [uprising_target_state.GetName], armed locals take to the streets, raising red-and-white banners over the town halls. German garrisons hesitate; some flee, others fight.\n\nOnce again, the West burns with the dream of a free Poland."
