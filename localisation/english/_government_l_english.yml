l_english:

  # government
  _government.1.d: "Whispers of unrest grow louder as factions threaten a coup in the capital. The ruling regime faces pressure to either relinquish power or prepare for civil conflict.\n\nThe fate of the nation hangs in the balance, with insurgents ready to take up arms to fight for control."

  _government.2.d: "Public opinion swells in favor of change, pushing for an adjustment in government to reflect the people’s will. Yet, entrenched leaders hesitate to yield, wary of losing their grip on power.\n\nA choice must be made — to step aside peacefully or resist and risk deeper division."

  # industry
  _industry.1.d: "Despite limited resources and an uncertain future, the nation's industrial leaders have rallied together, pooling funds, expertise, and labor to strengthen the country's foundations.\n\nTheir efforts promise new workshops, factories, and jobs where there were none before. Honor, it seems, is not only earned in combat."

  _industry.2.d: "With war raging and no large arms factories in operation, local authorities in [capital.GetCapitalVictoryPointName] have commandeered workshops, train depots, and even schools to hastily assemble rifles and munitions.\n\nThe improvised armories are crude and dangerous, but they may be all that keeps our fighters able to hold the lines."