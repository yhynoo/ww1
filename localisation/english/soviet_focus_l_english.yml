l_english:
  SOV_army: "Army"
  SOV_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  SOV_army_maneuvers: "Army Maneuvers"
  SOV_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  SOV_conscription: "Announce Mobilization"
  SOV_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  SOV_equipment_effort: "Equipment Effort"
  SOV_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  SOV_support_companies: "Support Companies"
  SOV_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  SOV_artillery: "Artillery"
  SOV_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  SOV_armor: "Armor"
  SOV_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  SOV_industrial_warfare: "Industrial Warfare"
  SOV_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  SOV_airfields: "Airfields"
  SOV_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  SOV_air_training: "Air Training"
  SOV_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  SOV_aerostats: "Aerostats"
  SOV_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  SOV_aces: "Learn from the Aces"
  SOV_aces_desc: ""

  SOV_ground_support: "Ground Support"
  SOV_ground_support_desc: ""

  SOV_air_doctrine: "Air Doctrine"
  SOV_air_doctrine_desc: ""

  SOV_expand_dockyards: "Expand Dockyards"
  SOV_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  SOV_shallow_waters: "Shallow Waters"
  SOV_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  SOV_high_seas: "High Seas"
  SOV_high_seas_desc: "Extend our operational reach beyond coastal waters."

  SOV_rule_the_waves: "Rule the Waves"
  SOV_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  SOV_the_dark_deep: "The Dark Deep"
  SOV_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  SOV_coastal_defense: "Coastal Defense"
  SOV_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  SOV_rationing: "Rationing"
  SOV_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  SOV_infrastructure_effort: "Infrastructure Effort"
  SOV_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  SOV_fuel: "Fuel Production"
  SOV_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  SOV_women_at_work: "Women at Work"
  SOV_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  SOV_construct_civilian: "Industrial Expansion"
  SOV_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  SOV_expand_mining: "Mining Operations"
  SOV_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  SOV_efficiency_studies: "Efficiency Studies"
  SOV_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  SOV_war_industry: "War Industry"
  SOV_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  SOV_telegraph: "Telegraph Network"
  SOV_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  SOV_political_ambitions: "Political Ambitions"
  SOV_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  SOV_international_affairs: "International Affairs"
  SOV_international_affairs_desc: "Engage in diplomacy to secure national interests."

  SOV_expansionism: "Expansionism"
  SOV_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

