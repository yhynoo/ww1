l_english:

  # armistice
  _armistice.1.d: "The old regime is gone, swept aside by failure and discontent. In the corridors of power, the new government weighs its choices with grim urgency: should it seek an end to the war, even at the cost of pride, or press on and risk total ruin?\n\nThe army is exhausted, the people restless — and among ministers, no consensus yet reigns."

  _armistice.2.d: "The frontlines have barely shifted, and the deadlock grinds on with no victor in sight. Months of bloodshed have yielded little but exhaustion, and voices across the cabinet murmur of peace — or at least, the attempt of it.\n\nYet to end a war without triumph is to invite questions that no regime easily survives."

  # armistice offered
  _armistice_offered.1.d: "The diplomats of our adversary, [FROM.GetNameDef], have approached us with a request for armistice. Their position remains intact, but their will appears to falter.\n\nWithin our own councils, debate begins: to end this war with a negotiated deal, or to press for total victory."

  _armistice_offered.2.d: "Diplomats from [ROOT.GetNameDef] have emerged with a signed agreement: an armistice between [FROM.GetNameDef] and their government. Though no side claims full victory, the guns fall silent — for now.\n\nA deep sigh of relief was heard around the world."

  _armistice_offered.3.d: "[FROM.GetName] has rejected our offer of peace. Their armies will march on, and the war will grind forward until one side can no longer stand."
