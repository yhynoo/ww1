l_english:
  GRE_army: "Army"
  GRE_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  GRE_army_maneuvers: "Army Maneuvers"
  GRE_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  GRE_conscription: "Announce Mobilization"
  GRE_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  GRE_equipment_effort: "Equipment Effort"
  GRE_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  GRE_support_companies: "Support Companies"
  GRE_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  GRE_artillery: "Artillery"
  GRE_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  GRE_armor: "Armor"
  GRE_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  GRE_industrial_warfare: "Industrial Warfare"
  GRE_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  GRE_airfields: "Airfields"
  GRE_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  GRE_air_training: "Air Training"
  GRE_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  GRE_aerostats: "Aerostats"
  GRE_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  GRE_aces: "Learn from the Aces"
  GRE_aces_desc: ""

  GRE_ground_support: "Ground Support"
  GRE_ground_support_desc: ""

  GRE_air_doctrine: "Air Doctrine"
  GRE_air_doctrine_desc: ""

  GRE_expand_dockyards: "Expand Dockyards"
  GRE_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  GRE_shallow_waters: "Shallow Waters"
  GRE_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  GRE_high_seas: "High Seas"
  GRE_high_seas_desc: "Extend our operational reach beyond coastal waters."

  GRE_rule_the_waves: "Rule the Waves"
  GRE_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  GRE_the_dark_deep: "The Dark Deep"
  GRE_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  GRE_coastal_defense: "Coastal Defense"
