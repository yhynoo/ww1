  GRE_rationing: "Rationing"
  GRE_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  GRE_infrastructure_effort: "Infrastructure Effort"
  GRE_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  GRE_fuel: "Fuel Production"
  GRE_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

