  GRE_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  GRE_expand_mining: "Mining Operations"
  GRE_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  GRE_efficiency_studies: "Efficiency Studies"
  GRE_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  GRE_war_industry: "War Industry"
  GRE_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

