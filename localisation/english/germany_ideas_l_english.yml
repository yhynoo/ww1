l_english:
  idea_tirpitz_plan: "Tirpitz Plan"
  idea_tirpitz_plan_desc: "A vast naval expansion program aims to challenge Britain’s supremacy at sea, demanding for our economy but promising prestige and power on the oceans."

  idea_an_army_with_a_state: "An Army With A State"
  idea_an_army_with_a_state_desc: "The army’s influence has grown so great that it often feels as though the nation exists to serve the military, rather than the other way around. Civilian authority is increasingly sidelined in favor of martial priorities."
  
  idea_atlantic_submarine_warfare: "Atlantic Submarine Warfare"
  idea_atlantic_submarine_warfare_desc: "Unrestricted submarine warfare in the Atlantic threatens enemy supply lines, but risks provoking new adversaries to join the war."

  idea_turnip_winter: "Turnip Winter"
  idea_turnip_winter_desc: "Hunger and deprivation grip the home front, as failed harvests and militarization of our resources force the population to survive on turnips and meager rations."

  # focus tree
  idea_die_wacht_am_rhein: "Die Wacht am Rhein"
  idea_die_wacht_am_rhein_desc: "Germany stands firm along the Rhine, determined to defend its heartland against any threat. The watchword of the nation is vigilance — and readiness for sacrifice."

  idea_deutschland_uber_alles: "Germany Above All"
  idea_deutschland_uber_alles_desc: "Patriotism fuels every endeavor, as the nation rallies under the banner of 'Germany Above All.' This unifying ideal demands absolute loyalty and devotion to the fatherland."

  idea_lessons_of_the_empire: "Lessons of the Empire"
  idea_lessons_of_the_empire_desc: "By confronting past atrocities and holding those responsible to account, Germany learns painful lessons that strengthen its moral standing and guide a more just course for the future."