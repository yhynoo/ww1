l_english:
  idea_tirpitz_plan: "Tirpitz Plan"
  idea_tirpitz_plan_desc: "A vast naval expansion program seeks to challenge [ENG.GetName]’s supremacy at sea. Though it strains the economy, it promises prestige, power, and a navy worthy of a world empire."

  idea_an_army_with_a_state: "An Army With a State"
  idea_an_army_with_a_state_desc: "The army’s influence has grown so immense that it often seems the state exists to serve the military, not the reverse. Civilian authority bends under the weight of discipline and tradition."

  # event
  idea_atlantic_submarine_warfare: "Atlantic Submarine Warfare"
  idea_atlantic_submarine_warfare_desc: "Unrestricted submarine warfare strikes at the heart of enemy supply lines, but its ruthless efficiency risks drawing new enemies into the conflict."

  idea_harvest_1916: "The Harvest of 1916"
  idea_harvest_1916_desc: "The failed harvest of 1916 forced severe rationing and state intervention in food distribution, weakening morale and undermining the war economy. All effort must now go towards securing food for our population."

  # focus
  idea_die_wacht_am_rhein: "Die Wacht am Rhein"
  idea_die_wacht_am_rhein_desc: "Germany stands firm along the Rhine, determined to defend its heartland against any invasion. Vigilance and sacrifice have become the virtues of the nation."

  idea_deutschland_uber_alles: "Germany Above All"
  idea_deutschland_uber_alles_desc: "Patriotism burns fiercely across the empire, uniting every citizen under the ideal of 'Germany Above All.' National pride has become both rallying cry and burden."

  idea_weimar_constitution: "Weimar Constitution"
  idea_weimar_constitution_desc: ""

  idea_against_utopianism: "Against Utopianism"
  idea_against_utopianism_desc: "Through dismissing extremist illusions, the state emphasizes moderation, cooperation, and sense of civil duty as the true sources of strength and order."
