l_english:
  # focus
  idea_gemeinsame_heeresleitung: "Gemeinsame Heeresleitung"
  idea_gemeinsame_heeresleitung_desc: "We formed a shared General Staff with our allies, so we can better coordinate our military efforts and share our experiences from the fields of glory."

  idea_an_meine_volker: "An Meine Völker"
  idea_an_meine_volker_desc: "The Emperor’s solemn call to arms rallies his subjects to defend the homeland, bolstering morale and strengthening the defense of the crown’s dominions."

  idea_alles_erdreich_ist_osterreich: "Alles Erdreich ist Österreich"
  idea_alles_erdreich_ist_osterreich_desc: "Buoyed by old ambitions and recent momentum, the dream of a boundless empire reawakens in Vienna."

  # external
  idea_unrest_in_galicia: "Unrest in Galicia"
  idea_unrest_in_galicia_desc: "Nationalist tensions, economic hardship, and ethnic divisions are fueling instability across Galicia."

  idea_shame_of_lemberg: "The Shame of Lemberg"
  idea_shame_of_lemberg_desc: "Despite clear indication of the culprits behind Franz Ferdinand’s death, Vienna did not dare to act. Now, the entire world sees our weakness."

  # hungary
  idea_dual_monarchy: "Dual Monarchy"
  idea_dual_monarchy_desc: ""

  idea_ausgleich: "The Humiliating Ausgleich"
  idea_ausgleich_desc: "Despite our efforts, Hungarian aristocracy managed to enforce another compromise agreement, granting them even more control over our shared country."

  idea_equal_development: "Equal Development"
  idea_equal_development_desc: "To convince all our subject ethnicities of our good intentions, we shall invest in the underdeveloped regions as much as in the metropolis."

  # army
  idea_archaic_army: "Archaic Army"
  idea_archaic_army_desc: "The army still relies on outdated tactics and equipment, struggling to keep pace with modern warfare."

  idea_defenses_in_the_east: "Defenses in the East"
  idea_defenses_in_the_east_desc: ""

  idea_operational_directive_d: "War Directive ‘D’"
  idea_operational_directive_d_desc: ""