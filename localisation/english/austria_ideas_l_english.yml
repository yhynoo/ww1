l_english:
  # focus
  idea_gemeinsame_heeresleitung: "Gemeinsame Heeresleitung"
  idea_gemeinsame_heeresleitung_desc: "A unified General Staff now oversees our joint operations with allied forces, improving coordination and ensuring that lessons from every front strengthen our common strategy."

  idea_an_meine_volker: "An Meine Völker"
  idea_an_meine_volker_desc: "The Emperor’s solemn call to arms rallies his subjects to defend the homeland, bolstering morale and strengthening the defense of the crown’s dominions."

  idea_alles_erdreich_ist_osterreich: "Alles Erdreich ist Österreich"
  idea_alles_erdreich_ist_osterreich_desc: "The imperial spirit stirs once more in Vienna, rekindling dreams of a vast, multiethnic realm united under Habsburg rule."

  # external
  idea_unrest_in_galicia: "Unrest in Galicia"
  idea_unrest_in_galicia_desc: "Ethnic tension, economic hardship, and political agitation have set Galicia aflame, threatening to unravel imperial control over this troubled province."

  idea_shame_of_lemberg: "The Shame of Lemberg"
  idea_shame_of_lemberg_desc: "Our failure to respond decisively to the outrage at Lemberg has been seen as cowardice across Europe. The prestige of the empire has suffered, and confidence in Vienna’s resolve has waned."

  # hungary
  idea_dual_monarchy: "Dual Monarchy"
  idea_dual_monarchy_desc: "The Compromise of 1867 forged a delicate balance between Austria and Hungary — a partnership of equals in name, but one strained by conflicting ambitions and uneven burdens."

  idea_ausgleich: "The Humiliating Ausgleich"
  idea_ausgleich_desc: "The latest revision of the Compromise has further strengthened Hungarian dominance within the Dual Monarchy, deepening divisions and eroding imperial authority."

  idea_equal_development: "Equal Development"
  idea_equal_development_desc: "To foster loyalty among the empire’s diverse peoples, we have pledged to invest in the neglected regions and grant them a fair share of prosperity."

  # army
  idea_archaic_army: "Archaic Army"
  idea_archaic_army_desc: "The army still relies on outdated tactics and equipment, struggling to keep pace with modern warfare."

  idea_defenses_in_the_east: "Defenses in the East"
  idea_defenses_in_the_east_desc: "Fortifications and logistical lines are being reinforced along the eastern frontier, preparing the empire for renewed clashes on the Galician plains and in the Carpathians."
