  UKR_aces_desc: ""

  UKR_ground_support: "Ground Support"
  UKR_ground_support_desc: ""

  UKR_air_doctrine: "Air Doctrine"
  UKR_air_doctrine_desc: ""

  UKR_expand_dockyards: "Expand Dockyards"
  UKR_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  UKR_shallow_waters: "Shallow Waters"
  UKR_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  UKR_high_seas: "High Seas"
  UKR_high_seas_desc: "Extend our operational reach beyond coastal waters."

  UKR_rule_the_waves: "Rule the Waves"
  UKR_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
