l_english:
  UKR_army: "Army"
  UKR_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  UKR_army_maneuvers: "Army Maneuvers"
  UKR_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  UKR_conscription: "Announce Mobilization"
  UKR_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  UKR_equipment_effort: "Equipment Effort"
  UKR_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  UKR_support_companies: "Support Companies"
  UKR_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  UKR_artillery: "Artillery"
  UKR_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
