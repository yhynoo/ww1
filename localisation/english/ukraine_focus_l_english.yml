  UKR_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  UKR_airfields: "Airfields"
  UKR_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  UKR_air_training: "Air Training"
  UKR_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  UKR_aerostats: "Aerostats"
  UKR_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

