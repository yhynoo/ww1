  UKR_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  UKR_expand_mining: "Mining Operations"
  UKR_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  UKR_efficiency_studies: "Efficiency Studies"
