l_english:
  decision_effect_tooltip: "Completing this focus unlocks new decisions."

  # HEAD OF STATE
  dc_head_of_state_decisions: "Head of State Decisions"

  ## defense
  honor_the_heroes: "Honor the Heroes"
  honor_the_heroes_desc: "Pay homage to the fallen and the living alike, uniting the nation around shared sacrifice and unbroken will to fight."

  territorial_auxilliaries: "Encourage Voluntary Draft"
  territorial_auxilliaries_desc: "Launch a patriotic campaign to inspire citizens to enlist before conscription becomes necessary."

  workers_militias: "Organize Workers' Militias"
  workers_militias_desc: "Arm and train loyal workers to defend factories and villages under revolutionary banners."

  ## propaganda
  expand_information_services: "Expand State Information Services"
  expand_information_services_desc: "Strengthen government media to ensure the national message reaches every citizen."

  support_liberal_journalists: "Support Liberal Journalists"
  support_liberal_journalists_desc: "Offer quiet backing to pro-democratic voices advocating freedom and civic reform."

  intensify_agitation: "Intensify Agitation"
  intensify_agitation_desc: "Deploy trusted organizers to spread revolutionary fervor through speeches and printed word."

  # puppet
  empower_loyalists: "Empower the Loyalists"
  empower_loyalists_desc: "By elevating loyal officials and collaborators to positions of authority, the overlord ensures firm control over the region, rooting out dissent and keeping rebellious elements in check."

  develop_independents: "Develop Independent Administration"
  develop_independents_desc: "In the shadows of occupation, a parallel state will take form. Secret councils, hidden networks, and loyal cadres will prepare the foundations of true independence, waiting for the moment to step into the light."

  launch_independence_war: "Launch the War of Independence"
  launch_independence_war_desc: "The time for peaceful attempts has passed. With arms in hand and banners raised, let our struggle for self-determination start, as we cast off the overlord’s yoke through fire and sacrifice."

  # armistice
  withdraw_from_war: "Withdraw from the War"
  withdraw_from_war_desc: "We will break from our alliance and try to step out of the conflict, seeking to preserve ourselves from further bloodshed."

  offer_armistice: "Offer Armistice to [FROM.GetNameDef]"
  offer_armistice_desc: "As leaders of our alliance, we may seek to agree with [FROM.GetNameDef] on a path to peace, ending further loss of life."

  # INTERNAL STRUGGLE

  dc_struggle_decisions: "Internal Struggle"
  dc_struggle_decisions_desc: "Several political factions have grown enough to vie for power in our country, sometimes at the cost of all of us.\n\nLet us take action to curb their efforts and shape our future ourselves: the way we truly want."

  crush_agitators: "Crush Communist Agitators"
  crush_agitators_desc: "Stamp out the communist cells before their radical fervor sets the streets aflame."

  attack_activists: "Attack Democratic Activists"
  attack_activists_desc: "Break the influence of democratic activists whose irresponsible rhetoric undermines our stability."

  discredit_authority: "Discredit Authorities"    # monarchist
  discredit_authority_desc: "Expose the monarchists' failures and erode their legitimacy in the eyes of the people."

  disarm_thugs: "Disarm Authoritarian Thugs"
  disarm_thugs_desc: "Armed authoritarian bands impose their will by force; we must strip them of weapons so we can stop them."

  # PUBLIC SUPPORT
  dc_public_support_decisions: "Public Support"
  
  greater_effort: "Advocate for Increased Industrial Effort"
  greater_effort_desc: "Demand more effort from our heroic workers to boost the industrial output — despite the economic strain."

  all_for_the_front: "All for the Front!"
  all_for_the_front_desc: "Redirect all resources toward sustaining the war front through industry and rationing."

  # ECONOMIC
  dc_economic_decisions: "Economic Decisions"

  establish_oil_reserve: "Establish National Fuel Reserve"
  establish_oil_reserve_desc: "Create a centralized stockpile of fuel to safeguard military and industrial operations."

  industrial_war_effort: "Adapt the Industry to Arms Manufacturing"
  industrial_war_effort_desc: "Reorganize the economy to prioritize arms, vehicles, and war materiel above all else."

  literacy_campaigns: "Literacy Campaigns"
  literacy_campaigns_desc: "Improve education to raise literacy rates, empowering the population and workforce."

  ## economic - communist
  dc_communist_economic_decisions: "Commissariat of Economy"

  wheat_requisitions: "Organize Wheat Requisitions"
  wheat_requisitions_desc: "Dispatch soldiers to villages to secure grain from the countryside for the people and the cause."

  arrange_expropriations: "Arrange Expropriations"
  arrange_expropriations_desc: "Seize private assets and place them under state control for the benefit of the collective."

  literacy_campaigns_communist: "Literacy Campaigns"
  literacy_campaigns_communist_desc: "Promote literacy to uplift the working class and spread revolutionary consciousness."

  # CIVIL WARS
  civil_war_decisions: "Civil Wars"

  generic_send_guns: "Send Arms to [FROM.GetNameDef]"
  generic_send_guns_desc: "By sending arms and supplies, we can influence the course of the conflict and ensure that our chosen side has the means to fight."

  generic_truce: "Offer Armistice to [FROM.GetNameDef]"
  generic_truce_desc: "We can use this opportunity to seek peace and bring an end to the war. Offering a truce could allow us to focus on our internal affairs, and winning the civil war."

  generic_cores: "Demand Territories from [FROM.GetNameDef]"
  generic_cores_desc: "We shall demand that they withdraw from territories that rightfully belong to us. Our people yearn for reunification and the restoration of our sovereign lands."