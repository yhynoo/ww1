l_english:

  idea_multiethnic_mosaic: "Multi-Ethnic Mosaic"
  idea_multiethnic_mosaic_desc: "The ethnic diversity of our country, though a testament to our historical heritage, also complicates the efforts to forge a unified society."

  idea_defender_of_europe: "The Defender of Europe"
  idea_defender_of_europe_desc: "Poland stands once more on the frontier between East and West. With the red tide rising in the east, we assume the historic duty of shielding Europe from the forces that would destroy it."

  idea_komendant: "Komendant"
  idea_komendant_desc: "Under the leadership of the Komendant — the war hero Józef Piłsudski — our nation draws strength from discipline, sacrifice, and the martial spirit."

  idea_as_long_as_we_live: "As Long As We Live"
  idea_as_long_as_we_live_desc: "‘Poland is not yet lost, as long as we live!’ If needed, every field, city, and river becomes a line of defense for the homeland."

  idea_kwiatkowskis_government: "Kwiatkowski’s Government"
  idea_kwiatkowskis_government_desc: "Under the guidance of Eugeniusz Kwiatkowski, Poland embarks on a bold program of industrial modernization and self-sufficiency. New factories rise, resources are harnessed, and the nation looks to the future with pragmatic optimism."
