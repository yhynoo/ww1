l_english:
  ENG_army: "Army"
  ENG_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  ENG_army_maneuvers: "Army Maneuvers"
  ENG_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  ENG_conscription: "Announce Mobilization"
  ENG_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  ENG_equipment_effort: "Equipment Effort"
  ENG_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  ENG_support_companies: "Support Companies"
  ENG_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  ENG_artillery: "Artillery"
  ENG_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  ENG_armor: "Armor"
  ENG_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  ENG_industrial_warfare: "Industrial Warfare"
  ENG_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  ENG_airfields: "Airfields"
  ENG_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  ENG_air_training: "Air Training"
  ENG_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  ENG_aerostats: "Aerostats"
  ENG_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  ENG_aces: "Learn from the Aces"
  ENG_aces_desc: ""

  ENG_ground_support: "Ground Support"
  ENG_ground_support_desc: ""

  ENG_air_doctrine: "Air Doctrine"
  ENG_air_doctrine_desc: ""

  ENG_expand_dockyards: "Expand Dockyards"
  ENG_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  ENG_shallow_waters: "Shallow Waters"
  ENG_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  ENG_high_seas: "High Seas"
  ENG_high_seas_desc: "Extend our operational reach beyond coastal waters."

  ENG_rule_the_waves: "Rule the Waves"
  ENG_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  ENG_the_dark_deep: "The Dark Deep"
  ENG_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  ENG_coastal_defense: "Coastal Defense"
  ENG_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  ENG_rationing: "Rationing"
  ENG_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  ENG_infrastructure_effort: "Infrastructure Effort"
  ENG_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  ENG_fuel: "Fuel Production"
  ENG_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  ENG_women_at_work: "Women at Work"
  ENG_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  ENG_construct_civilian: "Industrial Expansion"
  ENG_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  ENG_expand_mining: "Mining Operations"
  ENG_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  ENG_efficiency_studies: "Efficiency Studies"
  ENG_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  ENG_war_industry: "War Industry"
  ENG_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  ENG_telegraph: "Telegraph Network"
  ENG_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  ENG_political_ambitions: "Political Ambitions"
  ENG_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  ENG_international_affairs: "International Affairs"
  ENG_international_affairs_desc: "Engage in diplomacy to secure national interests."

  ENG_expansionism: "Expansionism"
  ENG_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  ENG_deterrence: "Near Eastern Interests"
  ENG_deterrence_desc: "The Near East is the lifeline of the empire, linking [ENG.GetNameDef] to India and beyond. By reinforcing Malta and projecting strength against the Ottomans, we will secure dominance over these vital waters."

  ENG_seek_alliances: "Affirm the Entente"
  ENG_seek_alliances_desc: ""

  ENG_on_our_own: "Expand the Empire"
  ENG_on_our_own_desc: "Our true power lies not on the continent, but in the empire. By relying on our own strength and the duty of every citizen, we shall ensure that the sun never sets on Albion."

  ENG_traditionalism: "Maintain the Course"
  ENG_traditionalism_desc: "Maintain order and unity to prevent domestic turmoil."

  ENG_public_support: "Support the War Effort"
  ENG_public_support_desc: ""

  ENG_mobilize_the_masses: "God Save the King"
  ENG_mobilize_the_masses_desc: "The king will stand as the symbol of national unity in this time of trial. With his call, the nation will mobilize fully, filling the ranks of the army and the factories alike."

  ENG_strength_in_unity: "Strength in Unity"
  ENG_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  ENG_the_everlasting_spirit: "The Sun Never Sets"
  ENG_the_everlasting_spirit_desc: "The empire has weathered centuries of storms, and its people remain unbroken. United by history and destiny, Albion will endure as the realm upon which the sun never sets."

  ENG_abolish_lords: "Abolish the House of Lords"
  ENG_abolish_lords_desc: "The House of Lords is an outdated institution that obstructs true democracy. We will sweep it aside and transfer all power to the people and their elected representatives."

  ENG_open_the_economy: "Unionized Dockyards"
  ENG_open_the_economy_desc: ""

  ENG_state_reform: "State Reform"
  ENG_state_reform_desc: "Implement structural changes to modernize the nation."

  ENG_embrace_modernity: "Access to Education"
  ENG_embrace_modernity_desc: ""

  ENG_over_the_edge: "Guide the Dominions"
  ENG_over_the_edge_desc: "We shall grant freedom to our dominions — but guide them on the path to socialism, so the foreign powers don't exploit them like we once did."
