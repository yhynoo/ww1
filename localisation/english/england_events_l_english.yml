l_english:

  # arabia
  england_arabia.1.d: "The British officer T. E. Lawrence has been sighted in Damascus, meeting discreetly with tribal notables and Arab leaders sympathetic to revolt.\n\nHis presence fuels speculation that London is preparing to stir unrest against Ottoman rule in the Levant."

  # elections
  england_elections.1.d: "The election of 1914 arrives in a time of unease, with questions of reform, empire, and London’s role abroad dividing opinion. The political establishment faces mounting challenges.\n\nWhether Asquith or Balfour prevails will shape the country’s course in uncertain years ahead."

  england_elections.2.d: "In 1918, the United Kingdom again turns to the ballot box. The electorate weighs questions of governance, stability, and foreign policy against rival visions of reform and continuity.\n\nLloyd George stands as a figure of resilience, while Balfour champions traditional strength and authority."
  
  england_elections.3.d: "By 1922, competing voices seek to define London’s vision. Economic strains and social change heighten the stakes of the contest between established parties and rising challengers.\n\nLloyd George fights to maintain his place, while Arthur Henderson promises a different path for the working classes."

  # jaffa
  england_jaffa.1.d: "London has chosen to lend support to the cause of Jewish immigration to Palestine, a triumph for figures such as Chaim Weizmann.\n\nWhile celebrated abroad, the move has stirred unease among local communities, threatening to disrupt fragile balances in Ottoman lands."

  england_jaffa.2.d: "Mounting tensions in Jaffa have exploded into open revolt, with crowds in the streets and sporadic clashes spreading across the city.\n\nThe unrest risks igniting broader turmoil in the region, challenging both stability at home and authority abroad."

  # white feathers
  england_white_feathers.1.d: "Several women’s groups have launched a striking campaign: pressing white feathers into the hands of men out of uniform, shaming them as cowards.\n\nThe movement spreads quickly through towns and cities, stirring both fervent support and bitter resentment."

  england_white_feathers.2.d: "The tragic death of another young conscript, harried into service by the white feather campaign, has shaken the nation.\n\nCritics denounce the government’s inaction, and Asquith’s leadership now wavers as David Lloyd George emerges as a new leader in London."
  
  # world union
  england_world_union.1.d: "At Southampton and Liverpool docks, syndicalist leaders deliver fiery speeches calling for a 'World Union' to unite workers across borders.\n\nSome cheer wildly, others whisper anxiously of unrest — or even a great war meant to end all wars."

