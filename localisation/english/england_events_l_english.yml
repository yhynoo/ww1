l_english:

  # arabia
  england_arabia.1.d: "Reports circulate of T. E. Lawrence traveling openly in Jaffa, meeting with Arab leaders under Ottoman rule.\n\nHis presence raises suspicion that [ENG.GetNameDef] is quietly encouraging unrest, testing the loyalty of populations already discontent with the empire."

  england_arabia.2.d: "A major uprising has broken out across the Levant, as Arab groups take up arms against Ottoman authority.\n\nLocal leaders declare their struggle for independence, forcing the empire to respond swiftly or risk losing control of vital provinces."

  # aliyah
  england_aliyah.1.d: "In a striking declaration, [ENG.GetName] has voiced support for Jewish immigration to the Land of Israel, a cause championed by Chaim Weizmann.\n\nWhile celebrated by Jewish nationalists, others worry that this is just London’s another attempt to meddle in the Near East."

  england_aliyah.2.d: "Jaffa has erupted into turmoil, with protests breaking out in response to the inactivity of [ROOT.GetAdjective] administration facing Jewish immigration.\n\nArab leaders demand recognition and influence, while officials debate whether compromise or force is the path to restoring order."

  # dockers
  england_dockers.1.d: "Strikes have erupted in England’s ports as dockworkers protest stagnant wages and shortages. Red banners and union speakers stir the restless crowds, demanding recognition in exchange for their labor.\n\nOfficials worry that unrest in the docks could spread further inland."

  england_dockers.2.d: "In Southampton, striking workers blockaded the warehouses and halted wartime shipments. Union leaders present their demands with growing confidence, sensing weakness in the government’s position.\n\nDebate now rages in London: should troops be sent, or must concessions be granted?"

  england_dockers.3.d: "The navy clashed with striking dockers in Southampton, gunfire ringing across the quays. Sixteen workers lay dead, their families gathered in mourning as the city reeled in shock.\n\nPublic opinion now questions the government’s judgment, and the unions grow bolder still."

  # elections
  england_elections.1.d: "The election of 1914 arrives in a time of unease, with questions of reform, empire, and London’s role abroad dividing opinion. The political establishment faces mounting challenges.\n\nWhether Asquith or Balfour prevails will shape the country’s course in uncertain years ahead."

  england_elections.2.d: "In 1918, the United Kingdom again turns to the ballot box. The electorate weighs questions of governance, stability, and foreign policy against rival visions of reform and continuity.\n\nLloyd George stands as a figure of resilience, while Balfour champions traditional strength and authority."
  
  england_elections.3.d: "By 1922, competing voices seek to define London’s vision. Economic strains and social change heighten the stakes of the contest between established parties and rising challengers.\n\nLloyd George fights to maintain his place, while Arthur Henderson promises a different path for the working classes."

  # entente
  england_entente.1.d: "In London, the government has reaffirmed its commitment to the Entente alliance. Diplomats from France and Russia hail the move as a vital show of unity.\n\nAcross Europe, the message is clear: Britain stands ready to honor its pledges should war break out."

  # white feathers
  england_white_feathers.1.d: "Several women’s groups have launched a striking campaign: pressing white feathers into the hands of men out of uniform, shaming them as cowards.\n\nThe movement spreads quickly through towns and cities, stirring both fervent support and bitter resentment."

  england_white_feathers.2.d: "The tragic death of another young veteran, shamed for his assumed ‘cowardice’ by women handing out white feathers, has shaken the nation.\n\nCritics denounce the government’s inaction, and the cabinet in London now wavers as David Lloyd George emerges as a new leader. Whether that leads to meaningful action, remains to be seen."

  # wireless
  england_wireless.1.d: "A scandal has erupted over mismanagement within the Imperial Wireless Company, a key project meant to link our colonies through modern communication. State subsidies have disappeared, and accountability remains uncertain.\n\nCritics accuse officials of fraud, while the government scrambles to manage the political embarrassment."
