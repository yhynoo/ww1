l_english:

  # arab office
  england_arab_office.1.d: "In a move cloaked in subtlety, His Majesty's government has opened an 'Arab Office' in Cairo to monitor sentiment across the Levant.\n\nOfficially tasked with gathering information, the office’s true objectives remain opaque — but whispers of intrigue are already circulating in diplomatic circles."

  england_arab_office.2.d: "Reports from the port of Fao indicate an increase in smuggling and secret meetings involving local tribal leaders and our intermediaries.\n\nSome urge closer cooperation with these shadowy networks, while others fear provoking [TUR.GetAdjective] suspicion."

  england_arab_office.3.d: "An informal agreement with regional actors may soon open access to vital oil reserves deep within Arabia.\n\nThough unofficial, the arrangement signals London's deepening investment in the future of Middle Eastern energy."

  england_arab_office.4.d: "An [TUR.GetAdjective] official has been violently attacked in the outskirts of Basra under circumstances that remain unclear.\n\nSuspicion immediately falls on nationalist factions — and perhaps on foreign involvement as well. Tensions in the region continue to mount."

  england_arab_office.5.d: "[TUR.GetAdjective] authorities have raided the so-called 'Arab Office' in Cairo, confiscating documents and detaining several figures linked to regional unrest.\n\nThe diplomatic fallout is immediate, with protests issued but little appetite for open confrontation."

  # boer war
  england_boer_war.1.d: "On the anniversary of our victory in the Boer War, ceremonies across the empire commemorate the fallen and the hard-won triumph.\n\nYet anti-colonial voices grow louder, demanding recognition of the suffering inflicted on civilians during the conflict — and raising uncomfortable questions about the cost of imperial ambition."

  # congo
  england_congo.1.d: "In the wake of its break with the Entente, [ENG.GetNameDef] has begun to assert claims in Central Africa, with speculation mounting that an invasion of the Congo may be imminent.\n\nFrench officials have condemned the maneuver as blatant imperial aggression — but London remains unmoved."

  # dockers
  england_dockers.1.d: "Mailboxes across London have been defaced and set ablaze in a wave of militant suffragette activity. Authorities believe this marks a new phase in the campaign for women's rights.\n\nSome dismiss the acts as hysteria; others warn that deeper unrest may soon follow."

  england_dockers.2.d: "In Southampton, organized dockworkers are threatening a general strike, citing poor conditions and growing sympathy with broader labor movements.\n\nWhile some call for negotiation, others within the government advocate firm resistance to union pressure."

  england_dockers.3.d: "Mass acts of violence have erupted across the South of England, with armed combat reported in several cities. Radical groups are believed to be exploiting worker grievances to foment rebellion.\n\nThe situation has become volatile — and the specter of civil unrest now looms."

  # entente
  england_entente.1.d: "London has announced a series of containment measures aimed at countering growing instability across the continent.\n\nThough vague in detail, the declaration signals a renewed commitment to order — and a subtle warning to any power seeking to upset it."

  england_entente.2.d: "British diplomats in Washington are pressing for greater American involvement in the war.\n\nThey highlight our shared ideals and the expansionist threats to global stability, and hope to shift the American public opinion toward active engagement on their side."

  # jaffa
  england_jaffa.1.d: "British authorities have quietly lent support to increased Jewish migration to Palestine, a move cheered by Chaim Weizmann and other Zionist leaders.\n\nCritics warn that the policy may spark unrest in the region — but for now, London remains committed to its course."

  england_jaffa.2.d: "Tensions have escalated in Jaffa as waves of new arrivals strain relations between communities.\n\nClashes have broken out in the streets, with some officials urging calm while others prepare for worse. The delicate balance in the Holy Land may be tipping."

  england_jaffa.3.d: "Despite the upheaval, a new coastal settlement has blossomed north of Jaffa. Known as Tel-Aviv, it symbolizes a modern vision for the future of the Jewish people.\n\nThe city stands as a bold experiment — and a quiet source of pride for its backers abroad."

  # south africa
  england_south_africa.1.d: "In an effort to ease post-war tensions and placate Boer nationalists, London has formally established [SAF.GetNameDef] as a self-governing dominion.\n\nThough still under London's oversight, the new state enjoys wide autonomy — a concession meant to ensure lasting peace in the region."
  
