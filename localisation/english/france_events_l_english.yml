l_english:

  # agadir
  france_agadir.1.d: "The shock of the Agadir Crisis still lingers, while unrest in Morocco has swelled into open demands for independence.\n\nFrance faces a difficult choice: loosen its grip on North Africa, or risk a costly confrontation in the mountainous territory."

  # caillaux
  france_caillaux.1.d: "Following the Agadir Crisis, Joseph Caillaux has been dismissed from office, his handling of the affair criticized across the political spectrum.\n\nAristide Briand is promoted in his place, promising a steadier hand in diplomacy, while public confidence in France’s government cautiously recovers."

  # elections
  france_elections.1.d: "As 1913 approaches, France prepares for its parliamentary election. Conservatives rally behind Louis Barthou, promising stability and tradition.\n\nModerates support Aristide Briand, arguing that the nation must embrace reform to meet rising social and political challenges, keeping France strong at home and abroad."

  france_elections.2.d: "In 1917, the nation faces uncertainty as war and unrest weigh heavily. Georges Clemenceau emerges as a candidate of firm resolve and decisive action.\n\nJoseph Caillaux counters with calls for moderation and reconciliation, appealing to citizens exhausted by conflict and seeking a peaceful path forward."

  france_elections.3.d: "By 1921, France confronts new choices in governance. Clemenceau remains a figure of authority and wartime leadership.\n\nÉdouard Herriot promises civic renewal and democratic reform, appealing to those who hope for a fresh start and a more measured, stable approach to domestic affairs."

  # greece
  france_greece.1.d: "Proclaiming herself ‘eldest daughter of the Church,’ France has demanded that Greece be granted autonomy from Ottoman control.\n\nParis insists it acts as guardian of Christendom, though the Constantinople views this ultimatum as blatant interference in imperial sovereignty."

  france_greece.2.d: "Under French pressure, Greece has been declared independent — its sovereignty restored with Paris hailed as liberator of the Orthodox faithful.\n\nYet this triumph carries risk, for Ottoman humiliation may drive Constantinople closer to Berlin or trigger renewed conflict in the South of Europe."

  # sicily
  france_sicily.1.d: "Reports of Catholic agitation ripple across Sicily and Calabria, where priests rally against secular authority with increasing fervor.\n\nThough Rome blames local reactionaries, whispers spread that foreign agents — perhaps French — are stirring unrest for their own purposes."

  # tours
  france_tours.1.d: "At Tours, the Archbishop welcomed France’s recent return to its Catholic roots. Admittedly, his words stir both admiration and outrage.\n\nSome see revival of faith, others a threat to the democratic order of the country."  

  france_tours.2.d: "The Archbishop’s appeal has reignited debate over the Exile Law of 1886, which banished royal heirs from France.\n\nRepealing it could restore the pretender’s rights — but critics warn it risks undermining the Republic’s chances to stabilize."  

  # wallonia
  france_wallonia.1.d: "France has failed to act on its threats after issuing its ultimatum over Alsace and Wallonia — a meaningful sign of hesitation or internal division.\n\nMany argue this is the moment to strike first and catch them unprepared. If France is as weak as it appears, a decisive campaign could settle the matter swiftly and on our terms."

  france_wallonia.2.d: "With Flanders and Wallonia now under French administration, the humiliation of the Agadir Crisis has finally faded away.\n\nParis celebrates this newfound strength across its northern frontier, claiming that German ambitions shall no longer threaten the country."
