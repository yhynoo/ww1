l_english:

  # agadir
  france_agadir.1.d: "With Flanders and Wallonia now under French administration, the humiliation of the Agadir Crisis has finally faded away.\n\nParis celebrates this newfound strength across its northern frontier, claiming that German ambitions shall no longer threaten the country."

  # carribean
  france_carrribean.1.d: "The French government has begun asserting territorial and commercial claims across the Caribbean, citing historical precedent and strategic necessity.\n\nFollowing its break from the Entente and restoration of monarchical authority, France appears increasingly willing to challenge Anglo-American influence in the region."

  # entente
  france_entente.1.d: "In a decisive move, Paris has formally approached [ENG.capital.GetCapitalVictoryPointName] and [SOV.capital.GetCapitalVictoryPointName], urging them to transform the loose understanding of the Triple Entente into a defensive military alliance.\n\nFrench officials argue that only firm alliance commitments can deter German expansionist ambitions in Europe."

  # greece
  france_greece.1.d: "Envoys from Paris have approached Constantinople with an unexpected proposal: [FRA.GetNameDef] offers economic relief and debt alleviation if the Sublime Porte agrees to free Greece from its grip.\n\nWhile tempting for an empire weighed down by foreign debt, such a concession would mean sacrificing long-held claims and prestige in the Aegean."

  france_greece.2.d: "Reports from the Bosphorus suggest a landmark deal may be in the making: Paris offering gold in exchange for Greek independence.\n\nIf confirmed, this would signal a dramatic realignment in the Mediterranean balance of power — and a serious blow to Ottoman influence in the region."

  # india
  france_india.1.d: "Rumors swirl of French troop movements near the Indian Ocean, as diplomatic envoys quietly probe regional actors for cooperation.\n\nThough no formal declarations have been made, observers believe France may be preparing a bold strike at London's colonial heart."

  # tours
  france_tours.1.d: "An offhand joke in the War Ministry — suggesting a return to royal rule — reportedly received enthusiastic applause rather than laughter.\n\nWhat some dismissed as harmless banter now appears to reflect deeper currents stirring within the French elite."

  france_tours.2.d: "Monarchist sympathizers have assembled in the city of Tours, invoking the legacy of the House of Orléans and the failures of the Republic.\n\nWhether this is political theater or the beginning of something larger remains to be seen — but the atmosphere is thick with nostalgia and ambition."

  france_tours.3.d: "In a rare and symbolic appearance, a senior archbishop has addressed the Senate, calling for moral renewal and national unity through divine order.\n\nHis remarks received thunderous applause — a signal, perhaps, that France’s future may lie in its past."

  # wallonia
  france_wallonia.1.d: "France has failed to act on its threats after issuing its ultimatum over Alsace and Wallonia — a meaningful sign of hesitation or internal division.\n\nMany argue this is the moment to strike first and catch them unprepared. If France is as weak as it appears, a decisive campaign could settle the matter swiftly and on our terms."
