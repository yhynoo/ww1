l_english:

  ## -- FRANCE
  # agadir
  fra_agadir.1.d: "Joseph Caillaux’s role in the Agadir crisis continues to haunt French politics. Accused of weakness abroad and intrigue at home, he has become a lightning rod for nationalist fury.\n\nIn Paris, deputies argue whether his fall would restore confidence in the Republic — or simply reveal deeper fractures in its leadership."

  # morocco
  fra_morocco.1.d: "A blaze consumes a warehouse in Agadir, its sparks leaping into the night as if fed by more than mere accident. Local officials argue over culprits; foreign observers smirk at the familiar chaos.\n\nIn the capital, each rumour of sabotage lands like a warning that France’s grip on Morocco may be even more fragile than before."
  fra_morocco.2.d: "Delegates from Moroccan towns deliver blunt demands: self-rule, dignity, an end to French commands. Their petitions echo across Tangier and Fez, drawing crowds who mutter of a new dawn.\n\nWhether this is posturing or the first crack of rebellion, no one in Paris dares to say aloud."

  # algeria
  fra_algeria.1.d: "From Algiers come anxious reports: markets shuttered, gendarmes pelted with stones, and slogans chalked on whitewashed walls.\n\nThe governor warns that the unrest feeds on the Moroccan crisis — and that delay might invite something far worse."
  fra_algeria.2.d: "Caravans from the Atlas bring word that several tribal leaders have pledged cooperation with France’s ongoing operations.\n\nOfficials praise the gesture as proof that firm diplomacy can still win hearts, at least for a time."

  # jaures
  fra_jaures.1.d: "Shots ring out in a Paris restaurant, and Jean Jaurès — voice of reason in an overheated continent — falls silent. Crowds gather in stunned disbelief as newspapers rush out black-framed editions.\n\nSome fear the last brake on Europe’s headlong charge has been shattered."
  fra_jaures.2.d: "In the General Staff, officers sneer that France’s hesitation after their weak ultimatum betrays an army incapable of action altogether.\n\nAlthough generals speak of opportunity, a few uneasy diplomats whisper that such talk may open doors no one can later close."

  # the exile act
  fra_exile.1.d: "Old quarrels resurface as the question of the royal families’ exile returns to the chambers of government. Deputies trade speeches steeped in memory: some of reconciliation, others of caution.\n\nOutside, most Parisians go about their day, scarcely aware that a forgotten law still tugs at the edges of the Republic."

  # aura
  fra_aura.1.d: "Along the front, a ragged shout spreads from trench to trench — ‘On les aura!’ Officers gladly adopt it, as the phrase carries a fierce defiance born of hardship.\n\nIn Paris, the cry is seized upon as a symbol that the nation’s spirit, though strained, still refuses to yield."

  # levant
  fra_levant.1.d: "Maps of the eastern Mediterranean lie scattered across a long table in the Quai d’Orsay. Advisers debate history, prestige, and murmured promises from the last war.\n\nSome argue that France must declare its interests openly; others warn that ambition in the Levant often comes at a dear price."
  fra_levant.2.d: "From Damascus and Beirut come fiery speeches condemning French designs. Newspapers print indignant verses, and marches wind through narrow streets.\n\nEven far from the region, diplomats note that Arab pride, once stirred, seldom rests quickly."
  fra_levant.3.d: "European capitals exchange polite yet pointed notes over France’s new claims in the Levant. Commentators speak of another chapter in the old contest for influence.\n\nWhether this marks a mere diplomatic flutter or the start of a larger rearrangement remains to be seen."

  # elections
  fra_elections.1.d: "As 1913 unfolds, France drifts into another election season. Posters bloom on boulevards, salons buzz with speculation, and newspapers argue over personalities more than policies.\n\nBehind the bustle lies a quiet sense that the Republic is searching for a steady hand in uncertain times."
  fra_elections.2.d: "The 1917 contest approaches in an uneasy climate: the public weary of disputes, the press attuned to every whisper from the Chambre.\n\nCandidates speak of renewal, responsibility, and national dignity, yet few dare predict how the temper of the electorate will settle."
  fra_elections.3.d: "France enters the elections of 1921 with a mixture of optimism and fatigue. Crowds attend rallies more out of habit than fervour, listening for promises that seem familiar from years past.\n\nStill, ballots carry weight: a sign that the Republic endures, adjusting its course with each new mandate."