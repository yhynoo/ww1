## -- FRANCE
  # agadir
  fra_agadir.1.d: "Joseph Caillaux’s role in the Agadir crisis continues to haunt French politics. Accused of weakness abroad and intrigue at home, he has become a lightning rod for nationalist fury.\n\nIn Paris, deputies argue whether his fall would restore confidence in the Republic — or simply reveal deeper fractures in its leadership."

  # elections
  fra_elections.1.d: "The spring of 1913 finds France restless yet strangely hopeful. In cafés and boulevards, people speak of renewal, weary of governments that rise and fall like passing showers.\n\nTwo figures come to embody the moment: one promising steadiness, the other renewal. The nation leans in, listening."
  fra_elections.2.d: "By 1917, the air seems heavier, conversations sharper. France longs for a voice strong enough to cut through the fog of uncertainty.\n\nSome favour a commanding presence, others a subtler hand. Between steel and subtlety, the country wonders what future each path might bring."
  fra_elections.3.d: "In 1921, the Republic stands between weariness and hope. The crowds no longer seek thunder, only direction — a calm after years of strain.\n\nOne name carries the weight of experience; another offers gentler horizons. France pauses, considering which spirit should guide its next chapter."

  # jaures
  fra_jaures.1.d: "Jean Jaurès, the great tribune of French socialism and tireless opponent of war, has been shot dead in Paris. His voice, which once echoed through the Chamber in defence of peace and justice, is silenced.\n\nAcross France, cafés and factories fall quiet as people whisper that with Jaurès gone, nothing now stands between the nation and the abyss."
  fra_jaures.2.d: "France has sent a stern ultimatum to Berlin — and received only silence in reply. Yet days pass, and no mobilization follows, no guns roll toward the frontier.\n\nIn the cafés and offices of the General Staff, officers murmur that the French threaten, yet do not act. Some insist that this hesitation is an open invitation for us to seize the initiative before Paris finds its courage."

  # morocco
  fra_morocco.1.d: "Reports of another arson attack in Agadir arrive in Paris. Warehouses and homes have burned, and rumours speak of agitators stirring resentment against French influence.\n\nSome see only local banditry; others fear the first sparks of a wider uprising in Morocco."

  # tours
  fra_tours.1.d: "From the pulpit in Tours, the archbishop has delivered a fiery sermon against the Republic’s secular laws. He denounces moral decline, attacks radical deputies, and calls the faithful to rally around the old pillars of throne and altar.\n\nRepublicans fear that the uneasy truce between Church and State may be beginning to unravel."
  fra_tours.2.d: "Royalist activists of Action Française have begun organizing in Tours, distributing pamphlets and holding meetings denouncing ‘decadent parliamentarism’ and the weakness of democratic rule.\n\nTheir circles remain small but passionate, drawing nobles, officers, and disillusioned patriots into their orbit."
  fra_tours.3.d: "Under banners proclaiming a crusade ‘against degeneracy’, monarchist orators in Tours rail against modern art, liberal politics, and republican ideals. Their speeches mix nostalgia with menace.\n\nSome shrug them off as fanatics; others quietly wonder whether the Republic still commands the loyalty of all its children."
