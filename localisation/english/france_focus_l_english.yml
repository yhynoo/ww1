l_english:
  FRA_army: "Army"
  FRA_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  FRA_army_maneuvers: "Army Maneuvers"
  FRA_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  FRA_conscription: "Announce Mobilization"
  FRA_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  FRA_equipment_effort: "Equipment Effort"
  FRA_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  FRA_support_companies: "Support Companies"
  FRA_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  FRA_artillery: "Artillery"
  FRA_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  FRA_armor: "Armor"
  FRA_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  FRA_industrial_warfare: "Industrial Warfare"
  FRA_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  FRA_airfields: "Airfields"
  FRA_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  FRA_air_training: "Air Training"
  FRA_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  FRA_aerostats: "Aerostats"
  FRA_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  FRA_aces: "Learn from the Aces"
  FRA_aces_desc: ""

  FRA_ground_support: "Ground Support"
  FRA_ground_support_desc: ""

  FRA_air_doctrine: "Air Doctrine"
  FRA_air_doctrine_desc: ""

  FRA_expand_dockyards: "Expand Dockyards"
  FRA_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  FRA_shallow_waters: "Shallow Waters"
  FRA_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  FRA_high_seas: "High Seas"
  FRA_high_seas_desc: "Extend our operational reach beyond coastal waters."

  FRA_rule_the_waves: "Rule the Waves"
  FRA_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  FRA_the_dark_deep: "The Dark Deep"
  FRA_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  FRA_coastal_defense: "Coastal Defense"
  FRA_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  FRA_rationing: "Rationing"
  FRA_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  FRA_infrastructure_effort: "Infrastructure Effort"
  FRA_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  FRA_fuel: "Fuel Production"
  FRA_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  FRA_women_at_work: "Women at Work"
  FRA_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  FRA_construct_civilian: "Industrial Expansion"
  FRA_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  FRA_expand_mining: "Mining Operations"
  FRA_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  FRA_efficiency_studies: "Efficiency Studies"
  FRA_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  FRA_war_industry: "War Industry"
  FRA_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  FRA_telegraph: "Telegraph Network"
  FRA_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  FRA_political_ambitions: "Political Ambitions"
  FRA_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  FRA_international_affairs: "International Affairs"
  FRA_international_affairs_desc: "Engage in diplomacy to secure national interests."

  FRA_expansionism: "Expansionism"
  FRA_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  FRA_deterrence: "Echoes of Agadir"
  FRA_deterrence_desc: ""

  FRA_seek_alliances: "Organize the Entente"
  FRA_seek_alliances_desc: ""

  FRA_on_our_own: "Look to the Near East"
  FRA_on_our_own_desc: ""

  FRA_traditionalism: "Republicanism"
  FRA_traditionalism_desc: ""

  FRA_public_support: "Support the War Effort"
  FRA_public_support_desc: ""

  FRA_mobilize_the_masses: "Union Sacrée"
  FRA_mobilize_the_masses_desc: ""

  FRA_strength_in_unity: "Strength in Unity"
  FRA_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  FRA_the_everlasting_spirit: "Liberté, Egalité, Fraternité"
  FRA_the_everlasting_spirit_desc: "Preserve the ideals and determination of our people."

  FRA_adjust_the_government: "Restore the Ancien Régime"
  FRA_adjust_the_government_desc: ""

  FRA_let_them_eat_cake: "Let Them Eat Cake"
  FRA_let_them_eat_cake_desc: ""

  FRA_state_reform: "State Reform"
  FRA_state_reform_desc: "Implement structural changes to modernize the nation."

  FRA_embrace_modernity: "École Royale de la Marine"
  FRA_embrace_modernity_desc: "To truly dominate in the oceans, we must assure our naval dominance. And to do that, we need qualified naval officers."

  FRA_over_the_edge: "Sharpen the Guillotines"
  FRA_over_the_edge_desc: ""
