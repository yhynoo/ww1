l_english:

  # assassination
  spain_assassination.1.d: "Prime Minister José Canalejas has been struck down by an anarchist gunman in Madrid. His sudden death leaves the government shaken, exposing deep currents of social unrest and political violence.\n\nThe monarchy must now decide whether to continue on its course, hoping that the situation does not escalate — or crush the anarchists."

  # elections
  spain_elections.1.d: "The turnismo system, alternating Conservatives and Liberals, has guided Spanish politics for decades. Some see it as outdated as democracy steps out from the monarchy’s shadow.\n\nStill, it provides stability, since a true election would be an unpredictable gamble, which few are willing to try."

  spain_elections.2.d: "Spanish democracy continues to grow, yet Europe’s turmoil puts strain on institutions. Conservatives and Liberals rotate power, but the system feels worn.\n\nCritics argue it blocks reform and ignores regional and social frustrations, leaving unrest simmering beneath the surface."

  spain_elections.3.d: "Another election under turnismo arrives, promising stability if power alternates smoothly.\n\nBut dissatisfaction spreads. Workers and intellectuals push for a genuine vote, challenging the tired system and demanding more than a continuation of the status quo."
  
  # hispanic union
  spain_hispanic_union.1.d: "In Madrid, the government of [SPA.GetNameDef] has extended a formal offer of alliance to Colombia, invoking the shared heritage of language, culture, and history. Spanish diplomats argue that closer ties would strengthen both nations in the face of foreign pressure.\n\nYet, some in Bogotá worry such commitments could entangle Colombia in distant European disputes."

  spain_hispanic_union.2.d: "[FROM.GetNameDefCap] has declined Spain’s proposal to form a new Hispanic Union. While officials in Bogotá praised the spirit of cooperation, they judged the risks too great.\n\nMadrid’s newspapers denounce the rejection as a wasted chance to restore common strength and influence, sparking frustration among advocates of closer transatlantic ties."

  # weyler
  spain_weyler.1.d: "Throughout Catalonia, local garrisons have marched through the streets amid mounting political tensions. Their officers speak of loyalty, but their men openly intimidate striking workers and radical agitators.\n\nThe government fears this could mark the beginning of something far more dangerous."

  spain_weyler.2.d: "A delegation of workers has arrived in Madrid, demanding reforms, higher wages, and an end to military intimidation. They claim to represent the wider movement growing in Catalonia and beyond.\n\nConceding might calm tensions, but dismissing them risks further radicalization — and perhaps open confrontation in the streets."

  spain_weyler.3.d: "With Spain paralyzed by unrest, General Valeriano Weyler has moved decisively. Supported by loyal officers, he has seized the machinery of government, declaring himself the defender of order and unity.\n\nYet resistance immediately stirs: the country now faces a bitter civil conflict between anarchists and the military junta."
