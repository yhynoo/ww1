l_english:

  # morocco
  spain_morocco.1.d: "Madrid is debating whether to join France’s campaign in Morocco, citing both strategic interests and a shared colonial frontier.\n\nCritics warn of overextension, while proponents argue that Spain cannot ignore unrest so close to its own possessions."

  spain_morocco.2.d: "Spain has formally entered the Moroccan conflict on France’s side, committing troops to suppress the rebellion.\n\nWhile Paris welcomes the reinforcement, other countries may view the move with suspicion — a sign that the colonial struggle may soon widen into a broader contest."
