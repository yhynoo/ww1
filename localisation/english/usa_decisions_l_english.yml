l_english:
  # near
  intervene_central_america: "Intervene in Central America"

  align_mexico: "Align Mexico"
  align_mexico_desc: "Through firmer diplomacy, we will encourage Mexico to align with American interests and stabilize our southern frontier."

  demand_colombia_withdraw: "Demand that Colombia Withdraws"
  demand_colombia_withdraw_desc: "Press Colombia to relinquish control of contested territories, securing American influence and ensuring safety in Central America."

  # alt
  anticolonialism: "Anti-Colonialism"

  liberate_australia: "Support Australian Independence"
  liberate_australia_desc: "Support movements seeking Australian independence to weaken European colonial hold and foster a new democratic ally in the Pacific."

  liberate_india: "Support Indian Independence"
  liberate_india_desc: "Back Indian calls for independence, striking at British imperial power while promoting self-determination and regional stability."

  pacific_airfields: "Expand Pacific Airfields"
  pacific_airfields_desc: "Build and expand air bases across the Pacific to project American air power and safeguard our interests in the region."

  # eco
  american_industries: "American Industries"

  end_jim_crow: "Abolish Jim Crow Laws"
  end_jim_crow_desc: "Push for the abolition of Jim Crow laws to promote civil rights, unify the nation, and strengthen our moral standing at home and abroad."

  introduce_tariffs: "Introduce Tariffs"
  introduce_tariffs_desc: "Protecting domestic production requires bold economic measures. Tariffs on foreign goods will strengthen American industries and reduce dependence on imports."
