l_english:

  # near
  monroe_doctrine: "Affirm the Monroe Doctrine"

  align_mexico: "Align Mexico"
  align_mexico_desc: "Through firmer diplomacy, we will encourage Mexico to align with American interests and stabilize our southern frontier."

  demand_colombia_withdraw: "Demand that Colombia Withdraws"
  demand_colombia_withdraw_desc: "Press Colombia to relinquish control of contested territories, securing American influence and ensuring safety in Central America."

  andes_for_protection: "Offer Guarantees for Andean Chromium"
  andes_for_protection_desc: "The Andean highlands hold vital mineral wealth — particularly chromium, indispensable to modern industry and defense. By offering protective guarantees, we can secure access to these resources and extend our influence deep into South America."

  # adapt wilsonianism
  adapt_wilsonianism: "Wilsonianism"

  liberate_australia: "Support Australian Independence"
  liberate_australia_desc: "Support movements seeking Australian independence to weaken European colonial hold and foster a new democratic ally in the Pacific."

  aid_to_eastern_europe: "Aid to [FROM.GetNameDef]"
  aid_to_eastern_europe_desc: "Extend military aid to [FROM.GetNameDef] to stabilize its fragile existence. By helping rebuild the East, we secure both goodwill and the promise of lasting peace across Europe."
  