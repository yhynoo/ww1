l_english:
  # near
  area_of_security: "The Area of Security"

  demand_tsingtao: "Demand Tsingtao"
  demand_tsingtao_desc: "We shall assert our claims over Tsingtao and scattered Pacific islands now held by [GER.GetNameDef]. These territories are essential stepping stones to securing dominance over the seas of Asia."

  develop_okinawa: "Develop Okinawa and Minamitori-shima"
  develop_okinawa_desc: "By investing in naval infrastructure, we can transform these vital outposts into pillars of strength, securing our southern flank and projecting power across the ocean."

  # alt
  dominate_the_pacific: "Dominate the Pacific"

  demand_singapore: "Demand Singapore and Malaya"
  demand_singapore_desc: "Press Britain to cede Singapore and Malaya, establishing a key foothold in the Straits and asserting dominance over maritime trade routes."

  demand_american_islands: "Demand American Islands in the Pacific"
  demand_american_islands_desc: "To truly dominate the ocean, we must limit the influence of our main rival: [USA.GetNameDef]."

  american_neutrality: "Seek American and Australian Partnership"
  american_neutrality_desc: "Instead of antagonizing the United States, let us invite them and the Australians to and divide the expected Pacific spoils."

  # eco
  twenty_one_demands: "Twenty-One Demands"

  send_the_demands: "Demand Manchuria and Access to Chinese Mines"
  send_the_demands_desc: "Present our demands for Manchuria’s territory and mining rights in the south of their country, aiming to bind China closer to Japan’s strategic interests."

  introduce_advisors: "Align the [MAN.GetAdjective] Government"
  introduce_advisors_desc: "We will try to send trusted advisors to the [MAN.GetAdjective] government to guide policy and ensure alignment with Japanese goals."
