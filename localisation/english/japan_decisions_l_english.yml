l_english:
  # near
  pacific_claims: "Dominate the Pacific"

  demand_tsingtao: "Demand Tsingtao and Pacific Islands"
  demand_tsingtao_desc: "We shall assert our rightful claims over Tsingtao and scattered Pacific islands now held by [GER.GetNameDef]. These territories are essential stepping stones to securing dominance over the seas of Asia."

  demand_far_east: "Demand Far East"
  demand_far_east_desc: "Press our claims to expand influence over the Russian Far East territories, solidifying Japan’s presence as the dominant regional power."

  develop_okinawa: "Expand Naval Infrastructure in Okinawa"
  develop_okinawa_desc: "By investing in Okinawa’s infrastructure, we can transform this vital outpost into a pillar of strength, securing our southern flank and projecting power across the region."

  # alt
  asian_hegemony: "Asian Hegemony"

  assert_singapore: "Extend Our Claims in Malaya"
  assert_singapore_desc: "Assert control over Singapore and Malaya to secure vital rubber sources and challenge Western dominance in Southeast Asia."

  help_india: "Support Indian Autonomy"
  help_india_desc: "Supporting Indian autonomy will weaken European colonial powers in Asia, and help foster new allies who look to us for guidance and protection."

  # eco
  twenty_one_demands: "Twenty-One Demands"

  send_the_demands: "Demand Manchuria and Access to Chinese Mines"
  send_the_demands_desc: "Present our demands for Manchuria’s territory and mining rights in the south of their country, aiming to bind China closer to Japan’s strategic interests."

  introduce_advisors: "Align the [MAN.GetAdjective] Government"
  introduce_advisors_desc: "We will try to send trusted advisors to the [MAN.GetAdjective] government to guide policy and ensure alignment with Japanese goals."
