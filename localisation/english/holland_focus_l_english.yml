l_english:
  HOL_army: "Army"
  HOL_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  HOL_army_maneuvers: "Army Maneuvers"
  HOL_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  HOL_conscription: "Announce Mobilization"
  HOL_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  HOL_equipment_effort: "Equipment Effort"
  HOL_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  HOL_support_companies: "Support Companies"
  HOL_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  HOL_artillery: "Artillery"
  HOL_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  HOL_armor: "Armor"
  HOL_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  HOL_industrial_warfare: "Industrial Warfare"
  HOL_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  HOL_airfields: "Airfields"
  HOL_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  HOL_air_training: "Air Training"
  HOL_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  HOL_aerostats: "Aerostats"
  HOL_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  HOL_aces: "Learn from the Aces"
  HOL_aces_desc: ""

  HOL_ground_support: "Ground Support"
  HOL_ground_support_desc: ""

  HOL_air_doctrine: "Air Doctrine"
  HOL_air_doctrine_desc: ""

  HOL_expand_dockyards: "Expand Dockyards"
  HOL_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  HOL_shallow_waters: "Shallow Waters"
  HOL_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  HOL_high_seas: "High Seas"
  HOL_high_seas_desc: "Extend our operational reach beyond coastal waters."

  HOL_rule_the_waves: "Rule the Waves"
  HOL_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  HOL_the_dark_deep: "The Dark Deep"
  HOL_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  HOL_coastal_defense: "Coastal Defense"
  HOL_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  HOL_rationing: "Rationing"
  HOL_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  HOL_infrastructure_effort: "Infrastructure Effort"
  HOL_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  HOL_fuel: "Fuel Production"
  HOL_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  HOL_women_at_work: "Women at Work"
  HOL_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  HOL_construct_civilian: "Industrial Expansion"
  HOL_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  HOL_expand_mining: "Mining Operations"
  HOL_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  HOL_efficiency_studies: "Efficiency Studies"
  HOL_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  HOL_war_industry: "War Industry"
  HOL_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  HOL_telegraph: "Telegraph Network"
  HOL_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  HOL_political_ambitions: "Political Ambitions"
  HOL_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  HOL_international_affairs: "International Affairs"
  HOL_international_affairs_desc: "Engage in diplomacy to secure national interests."

  HOL_expansionism: "Expansionism"
  HOL_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  HOL_deterrence: "After the Intervention"
  HOL_deterrence_desc: ""

  HOL_seek_alliances: "Seek Alliances"
  HOL_seek_alliances_desc: "Form strategic partnerships to ensure national security."

