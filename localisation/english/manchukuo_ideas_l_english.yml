l_english:
  idea_unequal_treaties: "Unequal Treaties"
  idea_unequal_treaties_desc: "Treaties imposed on us by Europeans continue to draini our wealth and undermine China’s ability to govern itself as an equal among nations."

  idea_uneasy_agreement: "The Sun-Yuan Agreement" 
  idea_uneasy_agreement_desc: "After the Xinhai Revolution, Sun Yat-Sen’s Tongmenghui and Yuan Shikai’s Beiyang Army have reached a fragile understanding, but mutual suspicion keeps the peace unstable."

  # focus
  idea_yuans_loans: "Reorganisation Loans"
  idea_yuans_loans_desc: "Foreign loans strengthen the finances of the army, but bind the nation to external powers and fragile fiscal stability."

  idea_five_races_one_nation: "Five Races Under One Union"
  idea_five_races_one_nation_desc: "A vision of harmony among China’s diverse peoples aims to unify the nation, yet old rivalries remain a constant threat."

  # other
  idea_textile_unrest: "Unrest Among Textile Workers"
  idea_textile_unrest_desc: "Strikes and protests erupt among textile workers, highlighting the tension between the imperial government’s ambitions, poor working conditions, and growing social unrest."

  idea_sun_in_exile: "Sun in Exile"
  idea_sun_in_exile_desc: "As Japan shelters Sun Yat-Sen and his followers, we must make additional efforts so that his thought no longer inspires disobedience in the country."

  idea_warlordism: "Warlords in the Countryside"
  idea_warlordism_desc: "Warlords control vast swathes of the countryside, undermining central authority and perpetuating chaos throughout China."