l_english:
  engage_in_africa: "Engagement in Africa"

  align_morocco: "Align Morocco"
  align_morocco_desc: "Secure influence in Morocco through diplomatic and military ties, anchoring Spain’s foothold in North Africa."

  demand_congo: "Demand Congo" # from France
  demand_congo_desc: "Challenge French dominance by demanding control over the Congo, asserting Spain’s right to a greater colonial empire."

  demand_southwest_africa: "Demand Southwest Africa" # from Germany
  demand_southwest_africa_desc: "Exploit German vulnerabilities to demand Southwest Africa, expanding Spain’s reach in southern Africa."

  across_the_atlantic: "Across the Atlantic"

  expand_naval_capabilities: "Expand the Dockyards in the Atlantic"
  expand_naval_capabilities_desc: "Expand and modernize the Atlantic dockyards to support a stronger navy and overseas projection."

  alliance_with_colombia: "Alliance with Colombia"
  alliance_with_colombia_desc: "Establish military cooperation with Colombia, rekindling old bonds across the Atlantic and securing influence in South America and the Carribean."
  