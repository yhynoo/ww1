l_english:
  idea_agrarianist_threat: "Agrarianist Threat"
  idea_agrarianist_threat_desc: "After the 1911 elections, agrarian reform was expected but never enacted, leaving rural unrest spreading across the countryside. It is well too late to contain it now."

  idea_chiapas_defenses: "Defenses in Chiapas"
  idea_chiapas_defenses_desc: "Fortifications and troop deployments in Chiapas are strengthened to deter Colombian encroachment and secure our southern border."

  idea_deal_with_the_devil: "Deal with the Devil"
  idea_deal_with_the_devil_desc: "By granting the Church greater influence, the government gains war support and conservative compliance, though at the cost of liberal reform."

  # focus
  idea_concessions_to_church: "Concessions to the Church"
  idea_concessions_to_church_desc: "Material concessions to the Church stabilize domestic affairs, ensuring loyalty and social order in critical regions."

  idea_eagle_flies_again: "The Eagle Flies Again"
  idea_eagle_flies_again_desc: "Stability has returned to Mexico, allowing the nation to recover and project confidence internally and abroad."

  idea_collectivized_economy: "Collectivized Economy"
  idea_collectivized_economy_desc: ""