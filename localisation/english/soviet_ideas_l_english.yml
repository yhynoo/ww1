l_english:
  idea_anti_authoritarian_intelligentsia: "Anti-Authoritarian Intelligentsia"
  idea_anti_authoritarian_intelligentsia_desc: "Russia’s educated classes have grown increasingly disillusioned with autocracy. Writers, professors, and students now form a moral opposition to the regime — one that spreads dissent not with rifles, but with ideas."

  idea_corrupt_officers: "Corrupt Officers"
  idea_corrupt_officers_desc: "Patronage and personal ties remain the foundation of our officer corps — a time-honored tradition that secures loyalty, even if it slows modernization."

  idea_agitation_in_the_army: "Soldiers’ Councils"
  idea_agitation_in_the_army_desc: ""

  idea_defensive_approach: "Defensive Approach in the Army"
  idea_defensive_approach_desc: ""

  # focus tree ideas
  idea_okhrana: "Okhrana"
  idea_okhrana_desc: "The Okhrana, the Tsar’s secret police, works tirelessly to root out sedition and preserve the autocracy. Its methods are ruthless, and its shadow stretches across the empire, stifling dissent before it can take hold."
  
  idea_one_and_indivisible: "One and Indivisible"
  idea_one_and_indivisible_desc: "The empire is proclaimed indivisible under God and the Tsar — a single, immutable whole bound by loyalty to the crown. This unity, though sacred, demands the suppression of all national and liberal aspirations."

  idea_limited_autonomy: "Limited Autonomy of Subjects"
  idea_limited_autonomy_desc: "Concessions to regional elites and local assemblies have been granted in a bid to pacify unrest. Yet these measures are narrow and insincere — fostering resentment rather than genuine reconciliation."

  # external
  idea_unrest_in_tartu: "Unrest in Tartu"
  idea_unrest_in_tartu_desc: ""
  
  idea_unrest_in_ukraine: "Unrest in Ukraine"
  idea_unrest_in_ukraine_desc: "Nationalist fervor and anti-Russian sentiment are on the rise in Ukraine. Unrest threatens to undermine imperial authority, and unless addressed, could spark broader resistance against the Tsar’s rule."

  idea_unrest_in_central_asia: "Turanist Movement in Central Asia"
  idea_unrest_in_central_asia_desc: "The Turanist movement spreads among Central Asian subjects of the empire, calling for unity and self-determination. This growing current of thought poses a threat to Russian dominance in the region."
