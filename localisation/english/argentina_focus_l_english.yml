l_english:
  ARG_army: "Army"
  ARG_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  ARG_army_maneuvers: "Army Maneuvers"
  ARG_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  ARG_conscription: "Announce Mobilization"
  ARG_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  ARG_equipment_effort: "Equipment Effort"
  ARG_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  ARG_support_companies: "Support Companies"
  ARG_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  ARG_artillery: "Artillery"
  ARG_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  ARG_armor: "Armor"
  ARG_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  ARG_industrial_warfare: "Industrial Warfare"
  ARG_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  ARG_airfields: "Airfields"
  ARG_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  ARG_air_training: "Air Training"
  ARG_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  ARG_aerostats: "Aerostats"
  ARG_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  ARG_aces: "Learn from the Aces"
  ARG_aces_desc: ""

  ARG_ground_support: "Ground Support"
  ARG_ground_support_desc: ""

  ARG_air_doctrine: "Air Doctrine"
  ARG_air_doctrine_desc: ""

  ARG_expand_dockyards: "Expand Dockyards"
  ARG_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  ARG_shallow_waters: "Shallow Waters"
  ARG_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  ARG_high_seas: "High Seas"
  ARG_high_seas_desc: "Extend our operational reach beyond coastal waters."

  ARG_rule_the_waves: "Rule the Waves"
  ARG_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  ARG_the_dark_deep: "The Dark Deep"
  ARG_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  ARG_coastal_defense: "Coastal Defense"
  ARG_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  ARG_rationing: "Rationing"
  ARG_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  ARG_infrastructure_effort: "Infrastructure Effort"
  ARG_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  ARG_fuel: "Fuel Production"
  ARG_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  ARG_women_at_work: "Women at Work"
  ARG_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  ARG_construct_civilian: "Industrial Expansion"
  ARG_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  ARG_expand_mining: "Mining Operations"
  ARG_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  ARG_efficiency_studies: "Efficiency Studies"
  ARG_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  ARG_war_industry: "War Industry"
  ARG_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  ARG_telegraph: "Telegraph Network"
