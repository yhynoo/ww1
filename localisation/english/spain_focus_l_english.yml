l_english:
  SPA_army: "Army"
  SPA_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  SPA_army_maneuvers: "Army Maneuvers"
  SPA_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  SPA_conscription: "Announce Mobilization"
  SPA_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  SPA_equipment_effort: "Equipment Effort"
  SPA_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  SPA_support_companies: "Support Companies"
  SPA_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  SPA_artillery: "Artillery"
  SPA_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  SPA_armor: "Armor"
  SPA_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  SPA_industrial_warfare: "Industrial Warfare"
  SPA_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  SPA_airfields: "Airfields"
  SPA_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  SPA_air_training: "Air Training"
  SPA_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  SPA_aerostats: "Aerostats"
  SPA_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  SPA_aces: "Learn from the Aces"
  SPA_aces_desc: ""

  SPA_ground_support: "Ground Support"
  SPA_ground_support_desc: ""

  SPA_air_doctrine: "Air Doctrine"
  SPA_air_doctrine_desc: ""

  SPA_expand_dockyards: "Expand Dockyards"
  SPA_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  SPA_shallow_waters: "Shallow Waters"
  SPA_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  SPA_high_seas: "High Seas"
  SPA_high_seas_desc: "Extend our operational reach beyond coastal waters."

  SPA_rule_the_waves: "Rule the Waves"
  SPA_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  SPA_the_dark_deep: "The Dark Deep"
  SPA_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  SPA_coastal_defense: "Coastal Defense"
  SPA_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  SPA_rationing: "Rationing"
  SPA_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  SPA_infrastructure_effort: "Infrastructure Effort"
  SPA_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  SPA_fuel: "Fuel Production"
  SPA_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  SPA_women_at_work: "Women at Work"
  SPA_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  SPA_construct_civilian: "Industrial Expansion"
  SPA_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  SPA_expand_mining: "Mining Operations"
  SPA_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  SPA_efficiency_studies: "Efficiency Studies"
  SPA_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  SPA_war_industry: "War Industry"
  SPA_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  SPA_telegraph: "Telegraph Network"
  SPA_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  SPA_political_ambitions: "Political Ambitions"
  SPA_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  SPA_international_affairs: "International Affairs"
  SPA_international_affairs_desc: "Engage in diplomacy to secure national interests."

  SPA_expansionism: "Expansionism"
  SPA_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  SPA_deterrence: "African Aspirations"
  SPA_deterrence_desc: ""

  SPA_seek_alliances: "Seek Alliances"
  SPA_seek_alliances_desc: "Form strategic partnerships to ensure national security."

