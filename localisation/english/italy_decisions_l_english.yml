  # near
  avenge_libya: "Avenge Libya"

  demand_libya: "Demand Libya"
  demand_libya_desc: "We will press our claim on Libya, seeking to expand our colonial presence in North Africa. The sands of Tripolitania and Cyrenaica must belong to Italy."

  demand_aegean: "Assert Claims to Albania and the Aegean Islands"
  demand_aegean_desc: "It is time to extend our demands to Albania and the Aegean islands. Our control of the eastern Mediterranean demands that we get hold of these important strategic locations."

  develop_taranto: "Develop Dockyards in Taranto"
  develop_taranto_desc: "Expand and modernize Taranto’s dockyards to bolster Italy’s naval capacity and secure a dominant presence in the central Mediterranean."

