l_english:
  # near
  avenge_libya: "Avenge Libya"

  demand_libya: "Demand Libya"
  demand_libya_desc: "We will press our claim on Libya, seeking to expand our colonial presence in North Africa. The sands of Tripolitania and Cyrenaica must belong to Italy."

  demand_aegean: "Extend Claims to Crete and the Aegean Islands"
  demand_aegean_desc: "It is time to extend our demands to Crete and the Aegean islands. Italian dominance in the eastern Mediterranean will not be complete until these jewels are ours."

  # alt
  against_the_french: "Against the French"

  demand_tunisia: "Demand Tunisia"
  demand_tunisia_desc: "Tunisia, long considered within Italy’s rightful sphere of influence, must be brought under our control. By pressing our claim through diplomatic channels or force, we can strengthen our position in North Africa and signal our determination to defend Italian interests abroad."

  trieste_for_non_aggression: "Ask for Trieste for Non-Aggression"  # make limited demands to settle our border with Austria to focus on France
  trieste_for_non_aggression_desc: "Through limiting our demands to Trieste, we may secure peace with Austria and free our hands to confront France instead."

  expand_aviation_industry: "Expand the Aviation Industry"        # french aviation is great - we must keep up.
  expand_aviation_industry_desc: "To match French innovation in the skies, we must rapidly develop our aviation industry and ensure Italy is not left behind in modern warfare."

  # eco
  liberalize_the_economy: "Expand the Economy"

  develop_sicily: "Develop Dockyards in Sicily"
  develop_sicily_desc: "Expand and modernize Sicily’s dockyards to bolster Italy’s naval capacity and secure a dominant presence in the central Mediterranean."

  acquire_ethiopia: "Acquire Eritrea and Ethiopia"    # ask the british to sell colonies: it will take a toll on our industry to pay, but it's worth it.
  acquire_ethiopia_desc: "Though costly to our industry, purchasing Eritrea and Ethiopia from Britain will cement our colonial presence in the Horn of Africa and expand Italy’s imperial reach."