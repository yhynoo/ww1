l_english:

  # elections
  manchukuo_elections.1.d: "China faces its first democratic election. Sun Yat-Sen campaigns for democratic reform, while Yuan Shikai leverages his military prestige.\n\nCitizens wonder whether democracy will survive or the Beiyang generals will dominate the future of China."

  manchukuo_elections.2.d: "Political tensions rise as the 1917 election approaches. Sun Yat-Sen, the father of Kuomintang, seeks to reestablish his authority at the forefront of democratic China, while Tang Shaoyi positions himself as a conservative alternative.\n\nThe nation watches anxiously, unsure which path will secure stability or provoke unrest."

  manchukuo_elections.3.d: "By 1921, factional divisions have deepened. Wang Jingwei advocates continued democratic governance, while Tang Shaoyi appeals to monarchist sympathies.\n\nVoters in key provinces must decide between reform and tradition, shaping the fragile Republic’s future amidst ongoing uncertainty."

  # empire
  manchukuo_empire.1.d: "With democracy increasingly unpopular, and Yuan Shikai holding power, monarchists call for his enthronement as the Hongxian Emperor.\n\nThe nation now faces a choice between imperial restoration and limited representative government."

  # labor
  manchukuo_labor.1.d: "[MAN.GetName] has dispatched labor battalions to assist in industrial construction across its controlled regions.\n\nWhile presented as volunteer forces, reports suggest the program is compulsory in all but name."

  # textile
  manchukuo_textile.1.d: "Textile workers in key cities strike, demanding better conditions and local control. Rumors of Beiyang generals turning a blind eye stir fears of wider unrest.\n\nAuthorities worry that agitation could ignite a broader revolutionary movement, threatening fragile order across the provinces."

  manchukuo_textile.2.d: "Workers have seized factories and barricaded streets, declaring an armed uprising. Calls for solidarity echo through the industrial centers.\n\nThe provinces are in turmoil as local militias clash with loyalist forces, signaling that the unrest is spreading beyond peaceful protest."

  # transition
  manchukuo_transition.1.d: "After the Xinhai Revolution, Sun Yat-sen agreed to step aside for Yuan Shikai, the leader of the Beiyang Army, to unify the country. Honoring the agreement may secure peace, but resisting could preserve the revolutionary government — either path risks turmoil.\n\nThe nation waits, uncertain which vision will prevail."

  # treaties
  manchukuo_treaties.1.d: "Citing national dignity and independence, [MAN.GetNameDef] has announced its withdrawal from the unequal trade treaties imposed in earlier decades.\n\nForeign powers, long accustomed to favorable concessions, now face a government openly challenging established arrangements and asserting its sovereignty."

  # yuan
  manchukuo_yuan.1.d: "The sudden death of Yuan Shikai shocks the nation. Celebrated for his military abilities and political achievementes, his absence leaves a void among many of our citizens.\n\nProvincial leaders watch closely, weighing their next moves as uncertainty spreads across the country."

  manchukuo_yuan.2.d: "Without a strong central authority, regional military leaders seize power across our country’s provinces.\n\nThe threat of warlordism grows as rival generals carve out fiefdoms, and the dream of a stable Chinese state seems increasingly distant."

