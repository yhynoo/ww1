l_english:

  # elections
  manchukuo_elections.1.d: "China faces its first democratic election. Sun Yat-Sen campaigns for democratic reform, while Yuan Shikai leverages his military prestige.\n\nCitizens wonder whether democracy will survive or the Beiyang generals will dominate the future of China."

  manchukuo_elections.2.d: "Political tensions rise as the 1917 election approaches. Sun Yat-Sen, the father of Kuomintang, seeks to reestablish his authority at the forefront of democratic China, while Tang Shaoyi positions himself as a conservative alternative.\n\nThe nation watches anxiously, unsure which path will secure stability or provoke unrest."

  manchukuo_elections.3.d: "By 1921, factional divisions have deepened. Wang Jingwei advocates continued democratic governance, while Tang Shaoyi appeals to monarchist sympathies.\n\nVoters in key provinces must decide between reform and tradition, shaping the fragile Republic’s future amidst ongoing uncertainty."

  # transition
  manchukuo_transition.1.d: "The revolution has triumphed, yet the new republic stands on fragile ground. Yuan Shikai commands the armies; Sun Yat-sen commands the vision.\n\nNow comes the test — whether to honor the agreement and hand power to Yuan, or risk renewed division in pursuit of ideals."

  manchukuo_transition.2.d: "The reformer Song has been assassinated in mysterious circumstances, and Yuan Shikai moves swiftly to restore ‘order.’\n\nIn the capital, voices fall silent as the new regime gathers its strength — the democracy’s promise dimming into another age of autocracy."

  # treaties
  manchukuo_treaties.1.d: "Citing national dignity and independence, [MAN.GetNameDef] has announced its withdrawal from the unequal trade treaties imposed in earlier decades.\n\nForeign powers, long accustomed to favorable concessions, now face a government openly challenging established arrangements and asserting its sovereignty."

  # warlords
  manchukuo_warlords.1.d: "With China in turmoil and the central government faltering, Duan Qirui’s followers in Anhui proclaim their own command.\n\nThe so-called Anhui Clique rallies under banners of reform and order — but behind the rhetoric lies a familiar truth: power belongs to whoever can seize it."

  manchukuo_warlords.2.d: "Across the provinces, governors raise their own banners as faith in the capital fades.\n\nRail lines fall silent, soldiers change loyalties, and the unity once promised by the revolution gives way to something older and raw — the rule of men, not of institutions."

  # yuan
  manchukuo_yuan.1.d: "With Yuan Shikai’s sudden death, the machinery of the state stands still. Duan Qirui, soldier and pragmatist, steps into the void — but even he hesitates.\n\nShould China return to the democratic order, or preserve autocracy under Duan’s firmer command?"

  tt_warlordism: "During this time of instability, we must expect parts of our country to try to §tgain independence§!, and elements of our army to §tdesert§!.\n\n"