l_english:

  # labor
  manchukuo_labor.1.d: "[MAN.GetName] has dispatched labor battalions to assist in industrial construction across its controlled regions.\n\nWhile presented as volunteer forces, reports suggest the program is compulsory in all but name."

  # taiwan
  manchukuo_taiwan.1.d: "Officials in [MAN.GetName] have begun openly challenging Japanese claims over Taiwan, citing cultural ties and anti-colonial solidarity.\n\nThe declaration, though symbolic for now, risks inflaming tensions with Tokyo."

  # workers
  manchukuo_workers.1.d: "Textile workers across [MAN.GetName] have begun organizing against poor conditions, demanding better pay and legal protections.\n\nThe strikes, though still limited, have drawn the attention of radical agitators from the south."

  manchukuo_workers.2.d: "A massive general strike has paralyzed cities across South China, as discontent spreads far beyond the textile mills.\n\nThe authorities are divided: some demand a crackdown, others urge moderation to prevent full-scale revolt."

  manchukuo_workers.3.d: "Armed workers have seized factories and rail lines in multiple provinces, proclaiming a revolutionary government.\n\nThe region has collapsed into civil war, with rival factions and opportunistic neighbors all rushing in."
