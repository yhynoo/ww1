l_english:

  # aircraft
  holland_aircraft.1.d: "A new military airfield has opened in Soesterberg, marking a milestone in [HOL.GetAdjective] aviation.\n\nThough small, the base will provide a crucial testing ground for military aircraft and doctrine, ensuring the Netherlands keeps pace with modern aerial developments."

  # oostende
  holland_dunkirk.1.d: "A violent explosion ripped through the port of Dunkirk, injuring dozens and damaging warehouses.\n\nAuthorities avoid speculation, but whispers of sabotage to undermine local authority in French Flanders are spreading rapidly among officials, merchants, and ordinary residents alike."

  # south africa
  holland_south_africa.1.d: "In the veldt and the towns of the Transvaal, Afrikaner voices grow louder against foreign rule. Farmers speak in whispers of self-determination, veterans of old wars polish their rifles again.\n\nTo officials in London, it feels like someone is stirring the old embers." 

  holland_south_africa.2.d: "The unrest in the Transvaal has burst into open revolt. Bands of armed militiamen gather in dispersed outposts, proclaiming their right to govern themselves.\n\nThe news spreads fast — across the veldt, a familiar cry returns: ‘For our land, for our freedom!’"

  # withdraw
  holland_withdraw.1.d: "[HOL.GetName] has requested that we assume responsibility for Flanders, citing historic obligations and present strategic concerns.\n\nDutch forces are prepared to withdraw, provided we agree to take their place in administering the contested territory."

  holland_withdraw.2.d: "Dutch troops have withdrawn from Flanders under an understanding with France.\n\n[HOL.GetName] stressed their involvement was intended as temporary, leaving this territory’s future now squarely in French hands."

  holland_withdraw.3.d: "In a move upsetting to much of Europe, [HOL.GetNameDef] has officially authorized its intervention in Flanders.\n\nWhile celebrated among the Dutch militarists as a sign of their influence increasing, leaders of other European countries warn about establishing a dangerous precedent."
