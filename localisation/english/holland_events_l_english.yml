## -- HOLLAND
  # antwerp
  hol_antwerp.1.d: "The Dutch garrison in Antwerpen hesitates between duty and prudence. French officers suggest that their troops could assume responsibility for the city’s defenses, relieving the Netherlands of a dangerous burden.\n\nIn The Hague, ministers debate whether withdrawal would preserve neutrality — or appear as cowardice."
  hol_antwerp.2.d: "French columns marched into Anvers as Dutch troops quietly withdrew, their flags lowered and baggage trains rolling north.\n\nSome locals cheer the tricolour, others grumble at yet another change of uniforms. In cafés and chancelleries, questions arise about what this means for Dutch influence on the Scheldt."
  hol_antwerp.3.d: "Clashes in Antwerpen, erupting between Dutch soldiers, angry locals, and rumored French agents, have left the city tense and uneasy.\n\nAs shopkeepers clean up the smashed windows, across Europe, newspapers speak of the ‘Antwerpen Affair’ that may unsettle an already fragile peace."

  # airfield
  hol_airfield.1.d: "On a windswept field near Soesterberg, the first army aeroplanes lift uncertainly into the Dutch skies. Officers crane their necks as the machines circle, engines sputtering.\n\nThough modest in scale, this new airfield signals that the Netherlands will not be left behind in the age of flight."

  # dunkirk
  hol_dunkirk.1.d: "A powerful explosion has rocked the port of Dunkirk, destroying warehouses and damaging nearby facilities. French authorities whisper about sabotage and foreign intrigues aimed at disrupting their plans along the Channel coast.\n\nSuspicion falls on shadowy agents of those who prefer Flanders unsettled."

  # neutrality
  hol_neutrality.1.d: "With Europe sliding toward catastrophe, the Netherlands faces a grave decision. Powerful neighbours sharpen their swords, and trade routes grow perilous.\n\nStatesmen in The Hague argue whether to bind the country to strict neutrality or to prepare quietly for a moment that may demand action."
  hol_neutrality.2.d: "[HOL.GetNameDef] has proclaimed its neutrality in the growing European conflict. Diplomatic notes are dispatched to all belligerents, affirming that Dutch soil, harbours, and airspace are closed to war.\n\nMerchants breathe easier, yet generals worry that paper declarations may not stop marching armies."

  # transvaal
  hol_transvaal.1.d: "Reports from South Africa tell of growing unrest among the Afrikaners. Old grievances smoulder beneath British rule: land, language, and the memory of bitter war.\n\nMeetings in farmsteads and town halls stir the countryside, and some Dutch observers wonder if a distant kinship is reawakening."
