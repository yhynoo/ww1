l_english:

  # antwerp
  holland_antwerp.1.d: "[HOL.GetName] has formally requested that we assume responsibility for Belgian Flanders, citing our historic guarantees and current strategic obligations.\n\nDutch forces are prepared to withdraw, provided we agree to take their place."

  holland_antwerp.2.d: "Dutch troops have left the region of Flanders following an understanding with the French.\n\n[HOL.GetName] emphasized that their involvement had always been provisional — and that Belgium’s fate now rests in French hands."

  # shell
  holland_shell.1.d: "Representatives from [HOL.GetName] have proposed a long-term oil concession in Khuzestan, citing the need for industrial expansion and mutual prosperity.\n\nWhile modest on paper, the deal could greatly increase Dutch influence in the region."

  holland_shell.2.d: "Dutch engineers have arrived in Khuzestan to begin drilling operations under the recently signed oil agreement.\n\nThough officially a commercial venture, some believe [HOL.GetName] may have broader ambitions in the Near East."

  # soesterberg
  holland_soesterberg.1.d: "A new military airfield has opened in Soesterberg, marking a major milestone in [HOL.GetAdjective] aviation.\n\nThough small, the base will serve as a critical testing ground for future military aircraft and aerial doctrine."

  # south africa
  holland_south_africa.1.d: "A series of coordinated fires have torn through administrative buildings in Bloemfontein overnight, destroying archives and spreading panic among the colonial authorities.\n\nOfficials fear the act may mark the start of a wider Boer insurgency, shaking our already fragile control over the region."

  holland_south_africa.2.d: "With British administration in South Africa under strain, some voices in The Hague suggest that discreet support for Boer activists could strengthen Dutch influence in the region.\n\nOthers warn that such meddling risks a dangerous escalation with London."

  holland_south_africa.3.d: "Reports from Cape Town suggest Dutch envoys have been sighted among Boer leaders, offering quiet promises of support for independence from British rule.\n\nThe revelations have caused outrage in London, where officials accuse The Hague of flagrant interference in imperial affairs."

  holland_south_africa.4.d: "Louis Botha, a prominent Boer statesman, has approached British authorities with an offer to calm the unrest: the gradual release of a self-governing South African state under Dominion status.\n\nSome in London view this as a pragmatic solution; others see it as rewarding rebellion."

  holland_south_africa.5.d: "Tensions in southern Africa have erupted once more, as Boer militias declare their independence and seize control of key towns in Transvaal and Oranje.\n\nBritish columns mobilize in response, determined to avoid a humiliating loss of territory — even at the cost of another bloody war on the veldt."
