l_english:

  # aircraft
  holland_aircraft.1.d: "A new military airfield has opened in Soesterberg, marking a milestone in [HOL.GetAdjective] aviation.\n\nThough small, the base will provide a crucial testing ground for military aircraft and doctrine, ensuring the Netherlands keeps pace with modern aerial developments."

  # oostende
  holland_oostende.1.d: "A violent explosion ripped through the port of Oostende, injuring dozens and damaging warehouses.\n\nAuthorities avoid speculation, but whispers of sabotage to undermine Dutch authority in Flanders are spreading rapidly among officials, merchants, and ordinary residents alike."

  # shell
  holland_shell.1.d: "Dutch representatives propose a long-term oil concession in Iraq, citing industrial expansion and mutual prosperity.\n\nThough modest on paper, the deal could significantly strengthen [HOL.GetName]’s influence in the region, sparking debate over whether commerce masks a deeper strategic ambition."

  holland_shell.2.d: "Dutch engineers arrive in Iraq to begin drilling under the new oil concession.\n\nOfficially a commercial undertaking, the venture is already viewed by some as a bid to expand [HOL.GetName]’s presence and influence in the Near East."

  # south africa
  holland_south_africa.1.d: "Coordinated fires swept through administrative buildings in Bloemfontein overnight, destroying records and alarming officials.\n\nAuthorities fear this marks the beginning of renewed Boer resistance, threatening Dutch control in southern Africa at a moment when stability is already fragile."

  holland_south_africa.2.d: "Boer militias have declared independence, seizing towns across Transvaal and Oranje.\n\nBritish columns mobilize in response, determined to reassert control and prevent a humiliating loss of territory — even if it means plunging the veldt into another brutal conflict."

  # withdraw
  holland_withdraw.1.d: "[HOL.GetName] has requested that we assume responsibility for Flanders, citing historic obligations and present strategic concerns.\n\nDutch forces are prepared to withdraw, provided we agree to take their place in administering the contested territory."

  holland_withdraw.2.d: "Dutch troops have withdrawn from Flanders under an understanding with France.\n\n[HOL.GetName] stressed their involvement was intended as temporary, leaving this territory’s future now squarely in French hands."
