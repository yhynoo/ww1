l_english:

  # atacama
  argentina_atacama.1.d: "Argentina has publicly announced historical claims to the Atacama Desert, citing past disputes and unfulfilled treaties.\n\nThough no territory has changed hands, the move alarms neighbors, who see it as a provocation that could destabilize the region."

  # aviation
  argentina_aviation.1.d: "The Military Aviation School has opened at El Palomar, the first of its kind in South America. French aircraft and instructors help launch the program.\n\nSome doubt Argentina’s need for flight, yet others see it as a step toward modernization."

  # demonstrations
  argentina_demonstrations.1.d: "In Buenos Aires, groups sympathetic to the Allied cause gather to voice support. Their banners and speeches call for Argentina to abandon neutrality.\n\nThe government faces pressure, yet many warn against foreign entanglements in Europe’s war."

  argentina_demonstrations.2.d: "Crowds of German sympathizers rally in the capital, praising discipline and strength overseas. They demand that Argentina stand closer to Germany’s struggle.\n\nWhile tolerated by the authorities, the demonstrations deepen political divides and test the country’s neutrality."

  # elections
  argentina_elections.1.d: "The 1916 election is the first test of Sáenz Peña’s reform, granting broader suffrage.\n\nFor the first time, popular forces compete openly for power, challenging the dominance of traditional elites and setting Argentina on a new political path."

  argentina_elections.2.d: "By 1922, the reformist spirit still shapes Argentine politics, though factional rivalries remain.\n\nNew leaders step forward, promising modernization or stability. The electorate must decide whether to continue democratic experimentation or return to familiar traditions."

  # saenz
  argentina_saenz.1.d: "Roque Sáenz Peña, architect of the electoral reforms, has died while still in office. His passing leaves Argentina without a unifying figure.\n\nPoliticians and landowners alike now prepare to fight for influence in the unsettled landscape."

  argentina_saenz.2.d: "The powerful estancieros protest that their interests are ignored under democratic reforms. They demand a stronger say in national affairs and threaten resistance.\n\nThe government must decide whether to make concessions or risk inflaming old divisions within society."

  argentina_saenz.3.d: "The estancieros have taken up arms, proclaiming the defense of their traditions against unchecked reform. Fighting has broken out across the provinces.\n\nThe nation now faces a dangerous choice between preserving democracy or embracing the call for order and tradition."
