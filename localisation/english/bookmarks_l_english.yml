l_english:
 BM_HISTORY_TITLE: "Brief History"

 END_OF_AN_ERA_NAME: "The Echoes of Agadir"
 END_OF_AN_ERA_DESC: ""

 END_OF_AN_ERA_ARG_DESC: ""

 END_OF_AN_ERA_AUS_DESC: "Through clever diplomatic maneuvering, the Austrian monarchy has largely overcome its internal divisions — but it still struggles with a stagnant economy and an outdated army.\n\nYet how long can that fragile unity endure? The aging, beloved emperor casts a long shadow, and inflamed Magyar dissent threatens to tear the monarchy apart before it can meet the challenges of the modern world."

 END_OF_AN_ERA_COL_DESC: ""

 END_OF_AN_ERA_ENG_DESC: "Amidst the Agadir Crisis, Lloyd George’s anticipated speech faltered, and Germany walked into Wallonia unopposed, shaming London.\n\nThe fleet still guards Gibraltar, but doubts grow over whether the United Kingdom still can shape the world — or merely watch."

 END_OF_AN_ERA_FRA_DESC: "France’s advance against Moroccan tribes in 1911 drew Germany’s gunboat to Agadir, and with London hesitating, Paris stood alone.\n\nThen Wallonia was lost without a fight, and the shadow of 1871 looms once more over the Republic’s future."

 END_OF_AN_ERA_GER_DESC: "The Agadir Crisis of 1911 proved the Entente's weakness — after which a daring move brought Wallonia without a single shot.\n\nYet distant victories cannot fill empty stomachs: what if the hungry workers, instead of toast for the Kaiser, raise their fists?"

 END_OF_AN_ERA_HOL_DESC: "The hasty 1911 emergency intervention in Flanders revealed a chilling truth: the Dutch government cannot control its own military. It is clear that General Jo van Heutsz commands more than just troops — he may soon command the state itself.\n\nAs refugees from the south pour in and democracy wavers, the Netherlands stands at a crossroads between civilian rule and quiet authoritarianism."

 END_OF_AN_ERA_ITA_DESC: "The country is united, but only on paper. The recent failures in Libya exposed how fragile the kingdom still is, mocked even by the weak Ottomans.\n\nThe unredeemed lands — Tirol, Dalmatia — loom like a wound. And within, the deeper question remains: there is Italy, but are there Italians?"

 END_OF_AN_ERA_JAP_DESC: "The Meiji reforms lit a fire under Japan, and the triumph of 1905 confirmed it: the empire is strong, modern, unstoppable. Industrial growth and military pride push Japan toward a larger destiny.\n\nBut how far can the empire stretch before it snaps? The West watches warily — and one misstep could awaken the sleeping giants."

 END_OF_AN_ERA_MAN_DESC: ""

 END_OF_AN_ERA_MEX_DESC: "Mexico is young, fragile, and already bleeding. Its fledgling democracy stumbles as the war with Colombia drags on, and Washington’s hand weighs heavily on every decision.\n\nBeneath the surface, deeper dangers stir: whispers of communism, army defections, and a people unsure if their nation will survive — or collapse from within."

 END_OF_AN_ERA_RUS_DESC: "Despite the wounds of 1905, the Russian Empire marches into the new century with confidence. The tsar's grip seems firm, and industrial growth should eventually arrive in the vast interior.\n\nYet the empire’s wealth is built on others' backs. Its restless borderlands grow louder, and their patience — like their chains — will not last forever."

 END_OF_AN_ERA_SPA_DESC: "Spain gained nothing from the Agadir Crisis, still clinging to Ceuta and Melilla while the Rif remains out of reach.\n\nOld wounds from the Semana Trágica fester, and the nation’s gaze shifts uneasily between Morocco and its own streets."

 END_OF_AN_ERA_TUR_DESC: "After the tumultous 19th century, the Ottoman Empire has begun to stabilize under the Young Ottomans’ guidance. The sick man lives on, tired but not yet dead.\n\nThere is a long road ahead, but for the first time in years, there is reason to believe the empire might walk it."

 END_OF_AN_ERA_USA_DESC: "The United States stands tall — a colossus born of steel and victory. The war of 1898 proved its might, but now a bolder challenge rises from the south, where Colombia’s defiance threatens the hemispheric order America built.\n\nAt home, Christian fundamentalism tightens its grip, and abroad, resentment simmers in lands once shaped by American hands. The world watches: is this empire still ascending — or has it already peaked?"
