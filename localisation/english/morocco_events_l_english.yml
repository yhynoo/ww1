l_english:
  # war
  mor_war.1.d: "War erupts across Morocco as last years’ tensions finally ignite into open conflict.\n\nFrench columns advance from their strongholds in Algeria, while tribal leaders rally fighters in the interior. Reports from the front remain confused, but violence spreads rapidly.\n\nAcross the region, families flee uncertain borders, and diplomats warn that the struggle may reshape North Africa."

  mor_war.2.d: "Sahrawi volunteers arrive in Agadir, answering the call to defend Morocco in its hour of need. Their caravans bring fighters hardened by desert life.\n\nCommanders welcome the reinforcements, hoping their arrival will strengthen resistance where the fighting grows fiercest."
