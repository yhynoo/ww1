l_english:
  # near
  entente_integration: "Integration with the Entente"

  expel_germans: "Demand Qingdao"
  expel_germans_desc: "The presence of Germans in Qingdao is an affront to our sovereignty. We will drive them out and reclaim what is rightfully ours, sending a clear message to all foreign powers meddling in our affairs."

  labor_battalions: "Organize Labor Battalions"
  labor_battalions_desc: "Mobilize workers to support military efforts through construction, logistics, and essential labor behind the frontlines."

  # alt
  eight_banners: "Rally the Eight Banners"

  establish_korea: "Establish Korea"
  establish_korea_desc: "Reassert Chinese influence by establishing a protectorate over Korea, strengthening our position against Japanese ambitions."

  demand_dalian: "Demand Dalian"
  demand_dalian_desc: "Dalian must be restored to Chinese rule. This vital port is the key to controlling our northeastern coast and repelling foreign influence."

  extend_claims_to_taiwan: "Assert Our Claims to Taiwan"
  extend_claims_to_taiwan_desc: "Press our rightful claims to Taiwan, seeking to reunify the island with the motherland and secure strategic advantage in the region."

  # eco
  legacy_of_yuxian: "Legacy of Yuxian"

  develop_shanghai: "Develop the Shanghai Harbor"
  develop_shanghai_desc: "Invest heavily in Shanghai’s harbor facilities to enhance naval capacity and stimulate economic growth."

  expel_foreigners: "Expel the Foreign Agents"
  expel_foreigners_desc: "Foreign agents spread discord and undermine our sovereignty. It is time to expel these meddlers, break their networks, and restore control to the people of China."
