l_english:
  _american_influence.1.d: "Washington proposes a program of investment to “strenthen our country’s economy”. Banks and companies promise modern infrastructure and steady profit, though many question what influence might follow.\n\nFor some, it is an opportunity; for others, a quiet erosion of sovereignty."

  _american_influence.2.d: "The [FROM.GetAdjective] government has formally declined America’s offer of investment, citing national priorities and political caution. Negotiators in Washington express disappointment at the rejection.\n\nObservers note the decision may signal a desire for greater distance from U.S. economic influence."

  _american_influence.3.d: "Reports from [ROOT.GetNameDef] confirm that American firms have been expelled and their assets seized. Officials frame the action as a defense of national independence.\n\nAcross Washington, the move provokes anger and anxiety, with investors warning of lost markets and political instability."

  _american_influence.4.d: "American contracts across Central America have quietly lapsed, and with them much of Washington’s leverage. Local governments reassert control over industry and trade.\n\nThe loss marks the fading of a long-cultivated sphere of influence, once held together by commerce and convenience."

  _american_influence.5.d: "Sabotage has struck an American installation in [target_state.GetName], damaging vital equipment and alarming local authorities. The perpetrators remain unknown.\n\nOfficials in Washington suspect hostile agitation, while diplomats debate how far the United States should go to defend its private interests abroad."
