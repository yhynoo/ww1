l_english:
  # near
  eng_mediterranean_expansion: "Mediterranean Affairs"

  malta_cyprus: "Expand Naval Infrastructure in Malta"
  malta_cyprus_desc: "Our naval station in Malta is the key to securing the Mediterranean. Strengthening our presence there will project our might — and remind friend and foe alike of who rules the seas."

  support_aliyah: "Support the Aliyah"
  support_aliyah_desc: "By quietly encouraging Jewish settlement in the Levant, London advances both humanitarian and imperial aims. The growing aliyah may destabilize the region — but it also binds it ever closer to our interests."

  lawrence_of_arabia: "Send T. E. Lawrence to Arabia"
  lawrence_of_arabia_desc: ""

  tt_lawrence: "T. E. Lawrence will work to start a Hashemite Arab uprising, and we shall guarantee to come to their aid when §Y[TUR.GetNameDef]§! §Odeclares war§!.\n"

  # alt
  expand_the_empire: "Expand the Empire"

  align_afghanistan: "Align Afghanistan"
  align_afghanistan_desc: "Through diplomacy and incentives, Afghanistan may be drawn into our sphere, forming a vital buffer against rival influence in Central Asia."

  demand_east_indies: "Demand the East Indies"
  demand_east_indies_desc: "The riches of the East Indies should serve London. A firm demand may secure these territories without the need for conflict — or prepare us for it."
