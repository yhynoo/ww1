l_english:
  # near
  eng_mediterranean_expansion: "Mediterranean Expansion"

  malta_cyprus: "Expand Naval Infrastructure in Malta"
  malta_cyprus_desc: "Our naval station in Malta is the key to securing the Mediterranean. Strengthening our presence there will project our might — and remind friend and foe alike of who rules the seas."

  jaffa_unrest: "Support the Jewish Aliyah"
  jaffa_unrest_desc: "By quietly encouraging Jewish settlement in the Levant, Britain advances both humanitarian and imperial aims. The growing aliyah may destabilize the region — but it also binds it ever closer to London’s interests."

  # alt
  change_alliances: "Change Alliances"

  establish_arabia: "Establish an Arab State in the Levant"
  establish_arabia_desc: "We will support the creation of an Arab state in the Levant to weaken Ottoman claims and cultivate a loyal partner in the region."

  demand_east_indies: "Demand East Indies"
  demand_east_indies_desc: "The riches of the East Indies should serve London. A firm demand may secure these territories without the need for conflict — or prepare us for it."

  eng_align_afghanistan: "Align Afghanistan"
  eng_align_afghanistan_desc: "hrough diplomacy and incentives, Afghanistan may be drawn into our sphere, forming a vital buffer against rival influence in Central Asia."

  # eco 
  peoples_act: "Peoples' Act"

  wage_adjustments: "Wage Adjustments"
  wage_adjustments_desc: "Rising discontent among workers can be tempered with careful wage reforms, preserving both stability and industrial productivity."

  release_saf: "Establish [SAF.GetNameDef]"
  release_saf_desc: "Granting formal dominion status to [SAF.GetNameDef] will ease tensions in the region while securing our influence over its future governance and resources."
