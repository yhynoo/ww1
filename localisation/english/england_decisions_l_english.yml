l_english:
  # near
  mediterranean_expansion_eng: "Mediterranean Expansion"

  jaffa_unrest: "Support the Jewish Aliyah"
  jaffa_unrest_desc: "By quietly encouraging Jewish settlement in Palestine, Britain advances both humanitarian and imperial aims. The growing aliyah may destabilize the region — but it also binds it ever closer to London’s interests."

  malta_cyprus: "Expand Naval Infrastructure in Malta and Cyprus"
  malta_cyprus_desc: "Our naval stations in Malta and Cyprus are the key to securing the eastern Mediterranean. Strengthening these bases will project British might — and remind friend and foe alike of who rules the seas."

  arab_office: "Establish the Arab Office"
  arab_office_desc: "Set up a discreet intelligence hub in Cairo to monitor, influence, and exploit unrest within [TUR.GetAdjective] territories."

  close_arab_office: "Close the Arab Office"
  close_arab_office_desc: "Dismantle the Arab Office and withdraw operatives before detection or diplomatic fallout worsens."

  # alliances
  affirm_the_entente: "Affirm the Entente"

  announce_containment: "Announce the Containment Approach"
  announce_containment_desc: "We will declare a policy of containment to silence the echoes of the Agadir Crisis and signal that further aggression will be met with firm resistance — at a time and place of our choosing."

  seek_us_engagement: "Seek American Engagement"
  seek_us_engagement_desc: ""

  # alt
  change_alliances: "Change Alliances"

  demand_east_indies: "Demand East Indies"
  demand_east_indies_desc: "The riches of the East Indies should serve London. A firm demand may secure these territories without the need for conflict — or prepare us for it."

  intervene_congo: "Intervene in the Congo"
  intervene_congo_desc: "Under French rule, Congo descends into chaos. Our intervention will restore order — and help the locals take control over their destiny."

  # eco 
  peoples_act: "Peoples' Act"

  appease_unions_eng: "Appease the Unions"
  appease_unions_eng_desc: "The unions grow restless. A modest set of concessions might secure peace at home, buying us time to address deeper divisions."

  release_saf: "Establish [SAF.GetNameDef]"
  release_saf_desc: "Granting formal dominion status to [SAF.GetNameDef] will ease tensions in the region while securing our influence over its future governance and resources."
