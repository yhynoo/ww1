l_english:

  # uprising
  turkestan_uprising.1.d: "Reports from Tashkent describe armed men seizing railway stations and government offices. Local administrators plead for help, claiming the rebels invoke both Islam and national pride.\n\nIn the ministries, nervous officials dismiss it as a passing disturbance — yet the wires from the steppe fall silent."

  turkestan_uprising.2.d: "The revolt has spread across the plains. Rebels in Tashkent proclaim an independent Turkestan and rally under banners of faith and freedom.\n\nAt home, the news provokes alarm: our authority fades further, replaced by slogans carried on desert winds and whispered prayers for deliverance."
