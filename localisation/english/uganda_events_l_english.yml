l_english:
  # autonomy
  uganda_autonomy.1.d: "Reports surface from Windhoek and Lüderitz: old wounds are reopening. The question of the Herero uprising — and the atrocities that followed — has returned to public life.\n\nLiberal circles in the colonial administration call for an official investigation, while the old guard urges silence for the sake of unity."

  uganda_autonomy.2.d: "A monument stands on a wind-swept plateau — raised to commemorate the suppression of the Herero revolt.\n\nNow, with the inquiry underway, its meaning divides the colony: is it a relic of conquest, or a symbol of sacrifice? Its fate will speak loudly of the colony’s future course."

  uganda_autonomy.3.d: "From the unexpected colonial capital of Windhoek, the German settlers and local administrators proclaim a new arrangement — [UGA.GetName] shall govern itself, independently of the distant crown of the Kaiser.\n\nMittelafrika, once a far-flung outpost, now stands as a power of its own."

  # establish
  uganda_establish.1.d: "With the war in Europe consuming men and materiel at an unprecedented scale, voices in Berlin propose a radical measure — to grant the African colonies greater autonomy in their administration.\n\nBy entrusting local officials and loyal settlers to maintain order and supply, the Empire may relieve its burdens at home while strengthening its hold overseas."

  # kalahari
  uganda_kalahari.1.d: "As our expeditions push deeper into the Kalahari, they carve out new lines of communication between scattered outposts and trading posts.\n\nWhat once were isolated garrisons are now joined by a tenuous but vital chain of supply across the desert — a feat of endurance and engineering."

  tt_establish_mittelafrika: "All African states under our control will be transferred to §Y[UGA.GetName]§!.\n\n"