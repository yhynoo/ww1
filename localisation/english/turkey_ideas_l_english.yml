l_english:
  # unrest
  idea_dissent_in_the_army: "Dissent in the Army"
  idea_dissent_in_the_army_desc: "Despite the failure of the 1908 coup, the ideals of the Young Turks continue to resonate among officers and soldiers alike. Their influence, though suppressed, undermines the absolute loyalty the Sultan demands of his army."

  idea_unrest_in_adriatic: "Unrest in the Adriatic"
  idea_unrest_in_adriatic_desc: "The Adriatic coast seethes with ethnic unrest. Greek and Serbian agitators, emboldened by dreams of independence, challenge our authority and threaten to ignite south-eastern Europe.\n\n§WWill disappear when we find a way to pacify the§! §3Greeks§! §Wand the§! §tSerbs§! §W— or destroy their hopes once and for all.§!"

  # debt
  idea_amassed_foreign_debt: "Amassed Foreign Debt"
  idea_amassed_foreign_debt_desc: "Decades of borrowing to sustain the state and finance modernization have left the Empire shackled to foreign creditors. Our sovereignty now hangs in the balance of foreign banks and chancelleries."

  idea_significant_foreign_debt: "Significant Foreign Debt"
  idea_significant_foreign_debt_desc: "The Empire’s reliance on foreign loans has become a fact of life. Interest payments drain the treasury, and foreign oversight of our finances erodes what remains of our independence."

  # focus
  idea_sky_steppe: "Sky is the New Steppe"
  idea_sky_steppe_desc: "The Ottoman air corps represents a bold leap into the future, recalling the boundless freedom of the steppe riders of old. The skies are our new frontier, where daring and innovation may yet restore imperial pride."

  idea_jihad: "Jihad"
  idea_jihad_desc: "Declared in the name of faith and survival, the Sultan’s call to jihad seeks to unite the faithful across continents. It is both a spiritual command and a desperate bid to rally strength in the empire’s hour of need."

  idea_the_eternal_state: "The Eternal State"
  idea_the_eternal_state_desc: "For six centuries, the Ottoman order has withstood rebellion, invasion, and decay. Its endurance is not mere chance but faith — faith that God’s favor still guards the House of Osman."

  idea_ethnic_state: "Ethnic State"
  idea_ethnic_state_desc: "Disillusioned by failed reforms, the Young Turks now turn toward a vision of ethnic unity. Their policies promise national strength, but at the cost of the empire’s ancient mosaic of peoples and faiths."

  # unrest
  idea_unrest_in_arab_lands: "Unrest in Arab Lands"
  idea_unrest_in_arab_lands_desc: "Tensions simmer across the Empire’s Arab provinces, where tribal leaders, religious scholars, and foreign agents stir discontent. The loyalty of these lands can no longer be taken for granted."
