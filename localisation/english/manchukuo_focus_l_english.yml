l_english:
  MAN_army: "Army"
  MAN_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  MAN_army_maneuvers: "Army Maneuvers"
  MAN_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  MAN_conscription: "Announce Mobilization"
  MAN_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  MAN_equipment_effort: "Equipment Effort"
  MAN_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  MAN_support_companies: "Support Companies"
  MAN_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  MAN_artillery: "Artillery"
  MAN_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  MAN_armor: "Armor"
  MAN_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  MAN_industrial_warfare: "Industrial Warfare"
  MAN_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  MAN_airfields: "Airfields"
  MAN_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  MAN_air_training: "Air Training"
  MAN_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  MAN_aerostats: "Aerostats"
  MAN_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  MAN_aces: "Learn from the Aces"
  MAN_aces_desc: ""

  MAN_ground_support: "Ground Support"
  MAN_ground_support_desc: ""

  MAN_air_doctrine: "Air Doctrine"
  MAN_air_doctrine_desc: ""

  MAN_expand_dockyards: "Expand Dockyards"
  MAN_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  MAN_shallow_waters: "Shallow Waters"
  MAN_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  MAN_high_seas: "High Seas"
  MAN_high_seas_desc: "Extend our operational reach beyond coastal waters."

  MAN_rule_the_waves: "Rule the Waves"
  MAN_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  MAN_the_dark_deep: "The Dark Deep"
  MAN_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  MAN_coastal_defense: "Coastal Defense"
  MAN_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  MAN_rationing: "Rationing"
  MAN_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  MAN_infrastructure_effort: "Infrastructure Effort"
  MAN_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  MAN_fuel: "Fuel Production"
  MAN_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  MAN_women_at_work: "Women at Work"
  MAN_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  MAN_construct_civilian: "Industrial Expansion"
  MAN_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  MAN_expand_mining: "Mining Operations"
  MAN_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  MAN_efficiency_studies: "Efficiency Studies"
  MAN_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  MAN_war_industry: "War Industry"
  MAN_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  MAN_telegraph: "Telegraph Network"
  MAN_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  MAN_political_ambitions: "Political Ambitions"
  MAN_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  MAN_international_affairs: "International Affairs"
  MAN_international_affairs_desc: "Engage in diplomacy to secure national interests."

  MAN_expansionism: "Expansionism"
  MAN_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  MAN_deterrence: "The Eight Banners"
  MAN_deterrence_desc: ""

  MAN_seek_alliances: "Seek Alliances"
  MAN_seek_alliances_desc: "Form strategic partnerships to ensure national security."

  MAN_on_our_own: "Asia for Asians"
  MAN_on_our_own_desc: ""

  MAN_traditionalism: "Yuan’s Government"
  MAN_traditionalism_desc: ""

  MAN_public_support: "Support the War Effort"
  MAN_public_support_desc: "Ensure the backing of the people for government policies."

  MAN_mobilize_the_masses: "Loans for the Army"
  MAN_mobilize_the_masses_desc: ""

  MAN_strength_in_unity: "Strength in Unity"
  MAN_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  MAN_the_everlasting_spirit: "Five Races Under One Union"
  MAN_the_everlasting_spirit_desc: ""

  MAN_adjust_the_government: "The Manchu Spectre"
  MAN_adjust_the_government_desc: ""

  MAN_open_the_economy: "Appease the Warlords"
  MAN_open_the_economy_desc: ""

  MAN_state_reform: "State Reform"
  MAN_state_reform_desc: "Implement structural changes to modernize the nation."

  MAN_embrace_modernity: "Whampoa Imperial Academy"
  MAN_embrace_modernity_desc: ""

  MAN_over_the_edge: "Anarchist Movements"
  MAN_over_the_edge_desc: ""

