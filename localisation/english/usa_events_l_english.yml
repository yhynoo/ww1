l_english:

  # australia
  usa_australia.1.d: "American aid shipments have arrived in Australia, marking a significant increase in U.S. influence down under. \n\nWhile some see this as vital support, others fear that growing American involvement could undermine local autonomy and stir unrest."

  # india
  usa_india.1.d: "The United States has extended aid to India, raising concerns about foreign interference in colonial affairs. \n\nThough the assistance may ease hardships, many worry it might encourage nationalist movements and destabilize British authority."

  # jim crow
  usa_jim.1.d: "The U.S. government has officially abolished Jim Crow laws, signaling a major victory for civil rights activists. \n\nThe decision has stirred hope among progressives but provoked fierce opposition from segregationists across the country."

  usa_jim.2.d: "Violent confrontations have broken out in Lafayette following the repeal of Jim Crow laws. \n\nLocal authorities face resistance from entrenched racist groups, and tensions threaten to spiral into wider unrest in the region."

  # savannah
  usa_savannah.1.d: "A controversial sermon in Savannah has revived fundamentalist sympathies among some citizens, unsettling the political landscape. \n\nThis growing faction threatens stability, raising fears that the country may soon face internal conflict and deeper division."

  usa_savannah.2.d: "At the Atlanta Convention, a hastily called gathering of Southern Christian churces, heated debates exposed deep divisions over the nation’s direction. \n\nWith fundamentalist supporters demonstrating their strength, we are now forced to weigh intervention against this growing, dangerous trend."

  usa_savannah.3.d: "Fundamentalist violence escalates as crosses burn anew across Southern towns, signaling an ominous rise in extremism. \n\nThe government faces mounting pressure to restore order before the unrest further destabilizes the fragile peace."

  # withdraw
  usa_withdraw.1.d: "The United States has demanded our troops leave Mexico, asserting regional dominance and seeking to protect its interests. \n\nColombia faces a difficult choice: comply with U.S. demands or risk conflict in an increasingly volatile border zone."

  usa_withdraw.2.d: "Forces loyal to [COL.GetName] have begun their withdrawal from Mexico after intense pressure from the United States. \n\nThough welcomed by some, the pullout raises questions about future stability and shifting influence in the region."
