l_english:

  # australia
  usa_australia.1.d: "American supplies and advisors have arrived in Australia under the banner of friendship and reconstruction.\n\nWhile welcomed by officials, some fear the aid is a pretext for deeper influence from Washington in local affairs and future policy."

  # elections
  usa_elections.1.d: "The election of 1912 divides America: Woodrow Wilson promises reform and cautious internationalism, while Theodore Roosevelt rallies nationalists and progressives.\n\nThe result will shape not only domestic policy but also the nation’s role in world affairs."

  usa_elections.2.d: "In 1916, Woodrow Wilson campaigns on peace and stability. Yet industrialist Henry Ford challenges the political elite, promising order and efficiency.\n\nAmericans must choose between continuity or a strikingly unconventional new leader."

  usa_elections.3.d: "The 1920 election follows years of upheaval. Warren Harding calls for ‘normalcy,’ stability, and restraint. But Henry Ford, invoking Christian tradition and industrialist order, offers a tempting alternative.\n\nAmerica faces a crossroads between restoration and reinvention."

  # mexico
  usa_mexico.1.d: "Reports from the south tell of American volunteers joining agrarianist forces in Mexico’s civil war. They bring supplies, conviction, and defiance of Washington’s neutrality.\n\nLocal socialists hail them as heroes, while Washington fears their actions could drag the United States into a foreign stage."

  usa_mexico.2.d: "Among American lawmakers an idea circulates to offer aid to Mexican democrats. They speak of shared ideals and stability across the border.\n\nIn Washington, the question divides the Senate — whether to send help or let Mexico’s turmoil run its course."

  usa_mexico.3.d: "American aid trains arrived in Mexico today, unloading materiel, tools, and medicine for the democratic forces. Crowds cheered their arrival amid ruins and uncertainty.\n\nTo many, the gesture marks hope for recovery; to others, it hints at deeper U.S. entanglement."

  # savannah
  usa_savannah.1.d: "A firebrand preacher in Savannah has denounced our democratic order, calling for a Christian theocratic state.\n\nThe speech electrifies fringe groups and unsettles officials, who fear it may be the spark for a broader movement."

  usa_savannah.2.d: "Christian fundamentalist and segregationist delegates have gathered in Atlanta, seeking a path forward amid growing unrest.\n\nSome propose regional autonomy; others demand outright secession. The government now faces a crisis it can no longer ignore."

  usa_savannah.3.d: "In the dead of night, burning crosses have returned to the fields of Georgia and the Carolinas.\n\nThis chilling resurgence of political violence signals a hardening of fundamentalist extremism — and the return of an old terror."

  # tensions
  usa_tensions.1.d: "Washington has proclaimed the formal end of segregation, vowing equal access to institutions and protections for all citizens. The decree marks a historic shift in federal policy.\n\nCritics warn, however, that enforcement will be fiercely resisted across parts of the country."

  # withdraw
  usa_withdraw.1.d: "Washington has issued a formal ultimatum demanding all foreign troops leave Mexican territory at once.\n\nFramed as a defense of hemispheric sovereignty, the move places enormous pressure on Bogotá to back down — or face war."
