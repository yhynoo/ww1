l_english:
  COL_army: "Army"
  COL_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  COL_army_maneuvers: "Army Maneuvers"
  COL_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  COL_conscription: "Announce Mobilization"
  COL_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  COL_equipment_effort: "Equipment Effort"
  COL_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  COL_support_companies: "Support Companies"
  COL_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  COL_artillery: "Artillery"
  COL_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  COL_armor: "Armor"
  COL_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  COL_industrial_warfare: "Industrial Warfare"
  COL_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  COL_airfields: "Airfields"
  COL_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  COL_air_training: "Air Training"
  COL_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  COL_aerostats: "Aerostats"
  COL_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  COL_aces: "Learn from the Aces"
  COL_aces_desc: ""

  COL_ground_support: "Ground Support"
  COL_ground_support_desc: ""

  COL_air_doctrine: "Air Doctrine"
  COL_air_doctrine_desc: ""

  COL_expand_dockyards: "Expand Dockyards"
  COL_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  COL_shallow_waters: "Shallow Waters"
  COL_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  COL_high_seas: "High Seas"
  COL_high_seas_desc: "Extend our operational reach beyond coastal waters."

  COL_rule_the_waves: "Rule the Waves"
  COL_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  COL_the_dark_deep: "The Dark Deep"
  COL_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  COL_coastal_defense: "Coastal Defense"
  COL_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  COL_rationing: "Rationing"
  COL_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  COL_infrastructure_effort: "Infrastructure Effort"
  COL_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  COL_fuel: "Fuel Production"
  COL_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  COL_women_at_work: "Women at Work"
  COL_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  COL_construct_civilian: "Industrial Expansion"
  COL_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  COL_expand_mining: "Mining Operations"
  COL_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  COL_efficiency_studies: "Efficiency Studies"
  COL_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  COL_war_industry: "War Industry"
  COL_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  COL_telegraph: "Telegraph Network"
  COL_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  COL_political_ambitions: "Political Ambitions"
  COL_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  COL_international_affairs: "International Affairs"
  COL_international_affairs_desc: "Engage in diplomacy to secure national interests."

  COL_expansionism: "Expansionism"
