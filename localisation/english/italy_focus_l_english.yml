l_english:
  ITA_army: "Army"
  ITA_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  ITA_army_maneuvers: "Army Maneuvers"
  ITA_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  ITA_conscription: "Announce Mobilization"
  ITA_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  ITA_equipment_effort: "Equipment Effort"
  ITA_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  ITA_support_companies: "Support Companies"
  ITA_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  ITA_artillery: "Artillery"
  ITA_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  ITA_armor: "Armor"
  ITA_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  ITA_industrial_warfare: "Industrial Warfare"
  ITA_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  ITA_airfields: "Airfields"
  ITA_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  ITA_air_training: "Air Training"
  ITA_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  ITA_aerostats: "Aerostats"
  ITA_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  ITA_aces: "Learn from the Aces"
  ITA_aces_desc: ""

  ITA_ground_support: "Ground Support"
  ITA_ground_support_desc: ""

  ITA_air_doctrine: "Air Doctrine"
  ITA_air_doctrine_desc: ""

  ITA_expand_dockyards: "Expand Dockyards"
  ITA_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  ITA_shallow_waters: "Shallow Waters"
  ITA_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  ITA_high_seas: "High Seas"
  ITA_high_seas_desc: "Extend our operational reach beyond coastal waters."

  ITA_rule_the_waves: "Rule the Waves"
  ITA_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  ITA_the_dark_deep: "The Dark Deep"
  ITA_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  ITA_coastal_defense: "Coastal Defense"
  ITA_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  ITA_rationing: "Rationing"
  ITA_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  ITA_infrastructure_effort: "Infrastructure Effort"
  ITA_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  ITA_fuel: "Fuel Production"
  ITA_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  ITA_women_at_work: "Women at Work"
  ITA_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  ITA_construct_civilian: "Industrial Expansion"
  ITA_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  ITA_expand_mining: "Mining Operations"
  ITA_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  ITA_efficiency_studies: "Efficiency Studies"
  ITA_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  ITA_war_industry: "War Industry"
  ITA_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  ITA_telegraph: "Telegraph Network"
  ITA_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  ITA_political_ambitions: "Political Ambitions"
  ITA_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  ITA_international_affairs: "International Affairs"
  ITA_international_affairs_desc: "Engage in diplomacy to secure national interests."

  ITA_expansionism: "Expansionism"
  ITA_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  ITA_deterrence: "Avenge Libya"
  ITA_deterrence_desc: ""

  ITA_seek_alliances: "Seek Alliances"
