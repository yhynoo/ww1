l_english:

  # aif
  australia_aif.1.d: "In response to the outbreak of war, Australia has announced the formation of the Australian Imperial Force. Volunteers rally under the banner of empire and duty.\n\nFrom farms to cities, enlistment offices fill with men eager to prove the young nation’s strength abroad."

  # elections
  australia_elections.1.d: "Australians head to the polls as war looms large over the young Commonwealth. Debate centers on loyalty to London and readiness for conflict.\n\nAndrew Fisher promises unity and preparation, while Joseph Cook calls for resolve and national strength in uncertain times."

  australia_elections.2.d: "The 1918 election stirs fierce debate over Australia’s sacrifices and future direction. Soldiers’ families and workers alike question the cost of loyalty to [ENG.GetNameDef].\n\nAndrew Fisher seeks renewed mandate for stability, while Billy Hughes rallies voters behind a harder, more determined war policy."

  australia_elections.3.d: "Australians return to the polls in a time of reflection. The events of the last decade linger as calls for reform and recovery grow stronger.\n\nBilly Hughes still invokes unity through conflict, while new leaders promise a fresh vision for peace and progress."

  # tramways
  australia_tramways.1.d: "Workers at Sydney’s tramway workshops have walked off the job, protesting harsh management reforms and growing wartime strain. The strike quickly disrupts transport across the city.\n\nAuthorities hesitate — whether to negotiate or risk the unrest spreading to other industries already on edge."

  australia_tramways.2.d: "The strike that began in the tramways has spread across factories, docks, and rail lines. Production stalls as unions rally in solidarity.\n\nGovernment officials scramble to contain the crisis, fearing the paralysis could undermine both the war effort and public confidence."

  australia_tramways.3.d: "Mass gatherings in Sydney have drawn over a hundred thousand men demanding fair treatment and labor rights. The city stands still amid chants and banners.\n\nLeaders debate their next move — whether to restore order through force or concede to union demands."