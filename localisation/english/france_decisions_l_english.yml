l_english:

  # near
  echoes_of_agadir: "Echoes of Agadir"

  demand_flanders: "Ask the Dutch to Withdraw"
  demand_flanders_desc: "We will press the Netherlands to withdraw from Flanders. This move aims to restore order but risks inflaming tensions with our northern neighbor."

  demand_wallonie: "Demand Access to Wallonia and Alsace-Lorraine"
  demand_wallonie_desc: "France will insist on reclaiming Wallonia to secure peace and uphold treaty obligations, as well as the lands lost to Germany in 1871. Berlin’s expected refusal, however, may push us toward a dangerous confrontation."

  expand_mining_atlas: "Expand Mining in the Atlas"
  expand_mining_atlas_desc: "Through concentrated investments, we will tie North Africa closer to our economy again — and we will benefit from it twice."

  # alt
  the_eldest_daughter: "The Eldest Daughter of the Church"

  establish_two_sicilies: "Establish [TTS.GetNameDef]"
  establish_two_sicilies_desc: "Reinstate the Kingdom of the Two Sicilies under friendly rule to extend French influence deep into the Mediterranean."

  liberate_greeks: "Demand Greek Autonomy"
  liberate_greeks_desc: "Pressure the Ottomans to grant autonomy to Greece, framing France as the protector of Christian peoples in the East."

  # eco
  let_them_eat_cake: "Let Them Eat Cake"

  develop_algeria: "Develop Algerian Maritime Industry"
  develop_algeria_desc: "Invest in Algerian ports and shipbuilding to bind the colony’s economy more closely to France and strengthen its strategic value."

  appeal_to_church: "Charity Effort"
  appeal_to_church_desc: "Mobilize the Church’s charitable networks to provide relief and maintain social stability during times of unrest."