l_english:

  # near
  echoes_of_agadir: "Echoes of Agadir"

  demand_flanders: "Ask the Dutch to Withdraw"
  demand_flanders_desc: "We will press the Netherlands to withdraw from Flanders. This move aims to restore order but risks inflaming tensions with our northern neighbor."

  demand_wallonie: "Demand Germans Leave Wallonia and Alsace-Lorraine"
  demand_wallonie_desc: "France will insist on reclaiming Wallonia to secure peace and uphold treaty obligations, as well as the lands lost to Germany in 1871. Berlin’s expected refusal, however, may push us toward a dangerous confrontation."

  expand_cotton_morocco: "Expand Cotton in Morocco"
  expand_cotton_morocco_desc: "Through concentrated investments, we will tie Morocco closer to our economy again — and we will benefit from it twice."

  # entente
  establish_entente: "The Triple Entente"

  form_the_entente: "Coordinate the Alliance"
  form_the_entente_desc: "We will appeal to the English and the Russians to transform our mutual agreements into a military alliance."

  greece_for_aid: "Offer Economic Aid for Greek Independence"
  greece_for_aid_desc: "We propose to ease Ottoman debts in exchange for their consent to Greek independence, trading coin for compromise."

  # alt
  across_the_oceans: "Across the Oceans"

  align_netherlands: "Align the Netherlands"
  align_netherlands_desc: "Through diplomacy and shared interests, we can draw the Netherlands closer to France, strengthening our position in Europe and abroad."

  invade_india: "Liberate India"
  invade_india_desc: "Challenging British dominance in India could elevate France as the preeminent colonial power. The path is arduous — we must first build influence among India’s neighbors — yet the rewards are immense."

  assert_carribean: "Assert Our Claims in the Carribean"
  assert_carribean_desc: "Reaffirming our claims in the Caribbean will demonstrate French resolve in safeguarding colonial possessions and deterring rival powers."

  # eco
  let_them_eat_cake: "Let Them Eat Cake"

  develop_guyana: "Develop Guyana"
  develop_guyana_desc: "Investing in Guyana’s resources and infrastructure promises economic growth and greater colonial stability."

  ecole_royale_de_la_marine: "Establish the École Royale de la Marine"
  ecole_royale_de_la_marine_desc: "To truly challenge London, we must contest their naval dominance. And to do that, we need qualified naval officers."