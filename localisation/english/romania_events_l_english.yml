l_english:
  
  ## -- ROMANIA
  # orientalism
  rom_orientalism.1.d: "A liberal newspaper in Bucharest denounces ‘Orientalism’ in politics, mocking corrupt aristocrats and hinting at Turkish habits well entrenched in the country.\n\nYoung readers cheer the talk of Europe and progress; conservatives mutter that such rhetoric risks angering powerful protectors."

  # constanta
  rom_constanta.1.d: "Warehouses owned by Turkish army in Constanta have been broken into and looted. Crates vanish into alleyways; customs officials look the other way.\n\nSome call for an investigation, others shrug that fate has merely shifted a little wealth from one shore of the Black Sea to another."

  # aircraft
  rom_aircraft.1.d: "Romanian officers have discreetly inquired about purchasing modern aeroplanes in Paris. They speak of reconnaissance, prestige, and keeping pace with neighbours.\n\nIn foreign capitals, diplomats weigh profit against politics: arming Bucharest might strengthen a friend today — or complicate arrangements with Turkey tomorrow."
  rom_aircraft.2.d: "[FRA.GetName] has agreed to supply aeroplanes to Romania. Crates marked with foreign factories’ names are loaded onto flatcars and river barges.\n\nIn Bucharest, aviators pose proudly beside their new machines, while generals debate how these fragile contraptions might change a future war."

  # alliance
  rom_alliance.1.d: "Romanian envoys propose a mutual guarantee against [TUR.GetAdjective] pressure. They speak of shared frontiers, kin across the Balkans, and the need to deter old ambitions from Constantinople.\n\nSome see safety in such an understanding; others fear being dragged into someone else’s quarrel."
  rom_alliance.2.d: "[FROM.GetName] has accepted Romania’s proposal for mutual guarantees. Telegrams flash between foreign ministries; toasts are raised in discreet salons.\n\nNewspaper editors hail the anti-[TUR.GetAdjective] entente, while sceptics warn that words on paper may one day demand action."
  rom_alliance.3.d: "Guns thunder again in southeastern Europe. Armies cross the Danube, cities crowd with refugees, and railways strain under troop trains.\n\nFrom Bucharest, observers watch the struggle around [TUR.GetNameDef], wondering whether this is merely another small war in southeastern Europe — or the beginning of the empire’s final unravelling."

  # ferdinand
  rom_ferdinand.1.d: "With the old order passing, Prince Ferdinand now ascends as King of Romania. Church bells ring, troops present arms, and flags flutter above Bucharest.\n\nYet behind the solemn ceremony lies a question: can the new monarch guide the kingdom through gathering storms?"

  # neutrality
  rom_neutrality.1.d: "Having secured guarantees in southeastern Europe, Romania stands at a crossroads. Some ministers argue that, with immediate aims achieved, the country should step back from entanglements.\n\nOthers warn that neutrality is fragile in a region where alliances shift as quickly as borders."
  rom_neutrality.2.d: "Romania has proclaimed a policy of neutrality, signalling an intent to stay clear of further military adventures. Notes are dispatched, speeches speak of peace and consolidation.\n\nInvestors and peasants alike hope this means fewer mobilizations — though neighbours quietly wonder how long it will last."
