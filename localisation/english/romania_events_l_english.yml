l_english:
  
  ## -- ROMANIA

  # aircraft
  rom_aircraft.1.d: "Romanian envoys have approached with an offer to purchase aeroplanes, eager not to be left behind in the new age of flight.\n\nSome see the deal as a minor matter of prestige and profit; others quietly note that each machine sold may tilt the balance of power in Eastern Europe."
  rom_aircraft.2.d: "[FRA.GetName] has agreed to provide aeroplanes to Romania. Contracts are signed, hangars prepared, and pilots selected.\n\nIn Bucharest, the deal is hailed as a small but meaningful step toward an air arm — and closer ties with a great power."

  # alliance
  rom_alliance.1.d: "From Bucharest comes a proposal: a mutual pledge with [ROOT.GetName] against any renewed designs from [TUR.GetNameDef].\n\nThe idea stirs old memories of Ottoman rule and current threats from the surrounding empires. The question is whether shared fear can be forged into shared resolve."
  rom_alliance.2.d: "[FROM.GetName] has accepted our proposal for mutual guarantees against [TUR.GetName]. Notes are exchanged, and public declarations follow.\n\nIn Romania, many greet the news with quiet satisfaction: when danger comes from the south, they will not stand alone."
  rom_alliance.3.d: "Gunfire and marching columns once again disturb the fragile peace of southeastern Europe. Borders that were only lines on maps yesterday are today traced by trenches and burning farms.\n\nIn Bucharest, observers ask whether this is merely another Balkan quarrel — or the beginning of the final unravelling of [TUR.GetNameDef]."

  # neutrality
  rom_neutrality.1.d: "With autonomy from Turks seemingly secured, voices in Bucharest begin to speak of restraint. Romania has seen enough of fire and destruction to know how easily they spread.\n\nSome argue that stepping back now will spare the country from ruin; others warn that neutrality may leave our friends exposed and enemies emboldened."
  rom_neutrality.2.d: "[ROM.GetNameDef] has announced a policy of strict neutrality, stepping away from entanglements in the turbulent affairs in Southeastern Europe. Notes are dispatched to foreign chancelleries, affirming Romania’s desire for peace.\n\nIn other capitals, this move is read in many ways: as prudence, as fatigue, or as a sign that Romania has already achieved what it sought."