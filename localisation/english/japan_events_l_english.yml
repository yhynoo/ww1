l_english:

  # demands
  japan_demands.1.d: "[JAP.GetAdjective] officials have delivered a list of economic and territorial demands to [ROOT.GetName], citing historical grievances and strategic necessity.\n\nTheir tone leaves little room for negotiation — either we comply, or we resist."

  japan_demands.2.d: "[MAN.GetName] has agreed to the full list of [JAP.GetAdjective] demands, including the transfer of key territories and access to industrial resources.\n\nIn Tokyo, the move is being hailed as a bloodless triumph for national expansion."

  # elections
  japan_elections.1.d: "The death of Emperor Meiji has left the nation unsettled, and the 1912 election comes at a moment of transition. Katsura Tarō, the veteran statesman, seeks to maintain imperial authority.\n\nOpposing him, the current prime minister Saionji Kinmochi represents parliamentary leadership and civil institutions."

  japan_elections.2.d: "The 1916 election pits Saionji Kinmochi, respected liberal, against General Terauchi Masatake, candidate of discipline and military strength. Many see the contest as a struggle over the role of generals in politics.\n\nWhichever path is chosen, Japan’s fragile democracy hangs in the balance."

  japan_elections.3.d: "By 1920, Japan faces social unrest, rising labor movements, and questions of suffrage. Hara Takashi, leader of the Seiyūkai, offers reform through elected government.\n\nKiyoura Keigo, however, embodies a more cautious, monarchist line, promising order through careful stewardship of imperial power."

  # pacific
  japan_pacific_agreement.1.d: "An offer from Tokyo has arrived, quietly suggesting a mutual understanding in the Pacific. The proposal would prevent clashes over strategic islands and colonial outposts, creating a fragile framework of neutrality.\n\nCritics warn such promises may only trigger future rivalries, not resolve them."

  japan_pacific_agreement.2.d: "Diplomatic envoys in [JAP.capital.GetCapitalVictoryPointName] and [ROOT.capital.GetCapitalVictoryPointName] have confirmed an agreement of mutual neutrality in the Pacific. Both parties have pledged not to interfere with each other’s immediate interests.\n\nObservers remain uncertain whether this is stability — or merely a setup."

  # sun
  japan_sun.1.d: "Following the violent suppression of the Tongmenghui movement in China, Sun Yat-Sen has fled abroad. His journey has taken him to Japan, where many now wonder what to expect from his presence.\n\nIt is certain that after years of continued activism, he still influences Asian politics like few others do."

  japan_sun.2.d: "Sun’s arrival forces Tokyo to decide whether he is a destabilizing agitator or a valuable political ally. Some call for his arrest to appease Yuan’s government, while others see a chance to champion Asian democracy.\n\nWhichever path is taken, consequences will follow."

  japan_sun.3.d: "The death of Yuan Shikai has changed the political atmosphere in China. With the old strongman gone, Sun Yat-Sen has returned from exile, unexpectedly landing at Shanghai docks to welcomes from supporters.\n\nHis return may herald new political struggles ahead."

  # taisho
  japan_taisho.1.d: "Emperor Taishō appeared before the Imperial Diet today, yet his words were halting and confused, leaving assembled statesmen in uneasy silence. What was meant as a dignified ceremony instead drew whispers of frailty.\n\nFor many, the spectacle raised doubts about the throne’s role in public life."

  japan_taisho.2.d: "Stories of the Emperor’s faltering address now circulate in both court and countryside, magnified with each retelling. To some, it is a sign that politicians must step forward; to others, a warning that authority is slipping.\n\nHow this moment is framed could reshape Japan’s politics for years to come."