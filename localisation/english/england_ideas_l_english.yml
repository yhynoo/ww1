l_english:
  idea_mansion_house: "Disaster of the Mansion House"
  idea_mansion_house_desc: "Our weak stance during the Agadir Crisis, ultimately leading to the collapse of Belgium, has left allies questioning our resolve."

  idea_controlled_decolonization: "Controlled Decolonization"
  idea_controlled_decolonization_desc: "By training communist leaders among our colonial subjects, we will lead them to autonomy under true socialism."

  # focus
  idea_white_feathers: "White Feathers"
  idea_white_feathers_desc: "Women’s campaigns of shame drive our youth into the ranks, as white feathers are pressed into the hands of those who refuse to serve."

  idea_god_save_the_king: "God Save the King"
  idea_god_save_the_king_desc: "Loyalty to crown and country steels the nation’s spirit and emboldens our soldiers to do their duty in the trenches."

  idea_the_sun_never_sets: "The Sun Never Sets"
  idea_the_sun_never_sets_desc: "The empire spans the globe, its flag flying from distant shores. This vast dominion brings unmatched prestige and wealth — but also constant challenges to maintain control and unity."

  idea_syndicate_of_coal: "Syndicate of Coal and Naval Yards"
  idea_syndicate_of_coal_desc: ""

  idea_world_union: "World Union"
  idea_world_union_desc: "We are set to liberate the workers all around the world — and to that end, we must mobilize all our resoueces, for the tyranny stands strong."

  # external
  idea_unrest_in_transvaal: "Unrest in Transvaal"
  idea_unrest_in_transvaal_desc: "Discontent simmers in the Transvaal, where resistance to our rule is rising. Left unchecked, this unrest could spark a wider rebellion, threatening our position in southern Africa."
