l_english:

  # army
  idea_modern_warfare: "Modern Warfare"
  idea_modern_warfare_desc: ""

  idea_rule_the_waves: "Rule the Waves"
  idea_rule_the_waves_desc: ""

  # economic
  idea_industrial_expansion: "Industrial Expansion"
  idea_industrial_expansion_desc: "Rapid investment in factories and infrastructure has expanded our industrial base to meet wartime needs."
  
  idea_rationing: "Rationing"
  idea_rationing_desc: "To ensure our resources last through the war, we have implemented rationing, limiting civilian access to goods."

  idea_women_at_work: "Women at Work"
  idea_women_at_work_desc: "With so many men at the front, women have taken their place in the factories, keeping production alive."

  idea_efficiency_studies: "Efficiency Studies"
  idea_efficiency_studies_desc: "Scientific management and organizational reforms have increased output, ensuring every resource is used to its fullest."

  idea_steady_growth: "Steady Growth"
  idea_steady_growth_desc: "Through careful economic management, we have mobilized all our industry — ensuring stability in uncertain times."

  # political
  idea_international_affairs: "International Affairs"
  idea_international_affairs_desc: "By focusing on expanding our diplomatic corps, developing alliances and manipulating rivalries, we strive to secure our position in the world."

  idea_expansionism: "Expansionism"
  idea_expansionism_desc: "We seek to expand our influence and territory, bringing more nations under our control to secure our place in the world."

  idea_deterrence: "Deterrence"
  idea_deterrence_desc: "By strengthening our military might, we hope to dissuade potential enemies from challenging us, maintaining peace through fear of retaliation."

  idea_seek_alliances: "Seek Alliances"
  idea_seek_alliances_desc: "To ensure our survival and prosperity, we must seek out alliances with powerful nations who share our interests."

  idea_on_our_own: "On Our Own"
  idea_on_our_own_desc: "We will rely on our own strength, preferring self-sufficiency over entanglements with foreign powers."

  idea_mobilize_the_masses: "Mobilize the Masses"
  idea_mobilize_the_masses_desc: "Total mobilization of our society is needed to secure victory."

  idea_strength_in_unity: "Strength in Unity"
  idea_strength_in_unity_desc: "Our greatest asset is the unity of our people. Together, we are stronger than the sum of our parts."

  idea_the_everlasting_spirit: "The Everlasting Spirit"
  idea_the_everlasting_spirit_desc: "The resolve of our people is unbreakable. No matter the hardships, our spirit will endure and lead us to victory."

  idea_open_the_economy: "Open the Economy"
  idea_open_the_economy_desc: "We must open our economy to the world, encouraging trade and investment to fuel our growth and development."

  idea_state_reform: "State Reform"
  idea_state_reform_desc: "To meet the demands of modernity, we must reform our state structure, streamlining governance and modernizing our institutions."

  # war
  idea_widespread_hunger: "Widespread Hunger"
  idea_widespread_hunger_desc: "The war puts an enormous strain on civilian supplies. When we send everything we can to the frontlines, not much is left for those at home."

  idea_army_mutinies: "Army Mutinies"
  idea_army_mutinies_desc: "Discipline within the army is deteriorating. Orders are ignored, desertions rise, and commanders struggle to maintain even basic authority."

  idea_spanish_flu: "Influenza Epidemic"
  idea_spanish_flu_desc: "The influenza pandemic of 1918–1920, known as the Spanish Flu, is among the deadliest outbreaks in human history. Striking young and healthy populations as well as the vulnerable, it spreads rapidly through armies, cities, and villages alike, leaving millions dead and entire nations weakened."

  # the great war
  idea_war_enthusiasm: "War Enthusiasm"
  idea_war_enthusiasm_desc: ""

  idea_loser_of_the_great_war: "Loser of the Great War"
  idea_loser_of_the_great_war_desc: ""

  # tribal
  idea_tribal_state: "Tribal Loyalties"
  idea_tribal_state_desc: "Large part of our population is more loyal to their traditional leaders than to state administration."

  # tendencies
  idea_democratic_tendencies: "Democratic Tendencies"
  idea_democratic_tendencies_desc: "Popular sentiment is shifting toward democracy. The people demand greater political participation and rights."

  idea_monarchism_tendencies: "Support for the Monarchy"
  idea_monarchism_tendencies_desc: "Support for the monarchy remains strong. The people look to the crown for stability and direction in these uncertain times."

  idea_authoritarianism_tendencies: "Authoritarian Tendencies"
  idea_authoritarianism_tendencies_desc: "A growing number of people advocate for a strong, centralized state with decisive leadership — even at the cost of political freedoms."

  idea_communism_tendencies: "Communist Propaganda"
  idea_communism_tendencies_desc: "Communist ideals are gaining traction, fueled by propaganda and the desire for revolutionary change among the working class."

  # puppet
  idea_underground_state: "Underground State"
  idea_underground_state_desc: "Though the occupiers hold the surface, a hidden nation thrives beneath. Secret administrations, clandestine schools, and covert militias have woven an invisible web of resistance, and built the framework of a free state ready to rise."
