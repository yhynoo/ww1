l_english:
  MOR_army: "Army"
  MOR_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  MOR_army_maneuvers: "Army Maneuvers"
  MOR_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  MOR_conscription: "Announce Mobilization"
  MOR_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  MOR_equipment_effort: "Equipment Effort"
  MOR_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  MOR_support_companies: "Support Companies"
  MOR_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  MOR_artillery: "Artillery"
  MOR_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  MOR_armor: "Armor"
  MOR_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  MOR_industrial_warfare: "Industrial Warfare"
  MOR_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  MOR_airfields: "Airfields"
  MOR_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  MOR_air_training: "Air Training"
  MOR_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  MOR_aerostats: "Aerostats"
  MOR_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  MOR_aces: "Learn from the Aces"
  MOR_aces_desc: ""

  MOR_ground_support: "Ground Support"
  MOR_ground_support_desc: ""

  MOR_air_doctrine: "Air Doctrine"
  MOR_air_doctrine_desc: ""

  MOR_expand_dockyards: "Expand Dockyards"
  MOR_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  MOR_shallow_waters: "Shallow Waters"
  MOR_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  MOR_high_seas: "High Seas"
  MOR_high_seas_desc: "Extend our operational reach beyond coastal waters."

  MOR_rule_the_waves: "Rule the Waves"
  MOR_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  MOR_the_dark_deep: "The Dark Deep"
  MOR_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  MOR_coastal_defense: "Coastal Defense"
  MOR_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  MOR_rationing: "Rationing"
  MOR_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  MOR_infrastructure_effort: "Infrastructure Effort"
  MOR_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  MOR_fuel: "Fuel Production"
  MOR_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  MOR_women_at_work: "Women at Work"
  MOR_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  MOR_construct_civilian: "Industrial Expansion"
  MOR_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  MOR_expand_mining: "Mining Operations"
  MOR_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  MOR_efficiency_studies: "Efficiency Studies"
  MOR_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  MOR_war_industry: "War Industry"
  MOR_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  MOR_telegraph: "Telegraph Network"
  MOR_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  MOR_political_ambitions: "Political Ambitions"
  MOR_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  MOR_international_affairs: "International Affairs"
  MOR_international_affairs_desc: "Engage in diplomacy to secure national interests."

  MOR_expansionism: "Expansionism"
  MOR_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  MOR_deterrence: "Dominion of the Atlas"
  MOR_deterrence_desc: ""

