l_english:
  ROM_army: "Army"
  ROM_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  ROM_army_maneuvers: "Army Maneuvers"
  ROM_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  ROM_conscription: "Announce Mobilization"
  ROM_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  ROM_equipment_effort: "Equipment Effort"
  ROM_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  ROM_support_companies: "Support Companies"
  ROM_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  ROM_artillery: "Artillery"
  ROM_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  ROM_armor: "Armor"
  ROM_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  ROM_industrial_warfare: "Industrial Warfare"
  ROM_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  ROM_airfields: "Airfields"
  ROM_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  ROM_air_training: "Air Training"
  ROM_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  ROM_aerostats: "Aerostats"
  ROM_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  ROM_aces: "Learn from the Aces"
  ROM_aces_desc: ""

  ROM_ground_support: "Ground Support"
  ROM_ground_support_desc: ""

  ROM_air_doctrine: "Air Doctrine"
  ROM_air_doctrine_desc: ""

  ROM_expand_dockyards: "Expand Dockyards"
  ROM_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  ROM_shallow_waters: "Shallow Waters"
  ROM_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  ROM_high_seas: "High Seas"
  ROM_high_seas_desc: "Extend our operational reach beyond coastal waters."

  ROM_rule_the_waves: "Rule the Waves"
  ROM_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  ROM_the_dark_deep: "The Dark Deep"
  ROM_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  ROM_coastal_defense: "Coastal Defense"
  ROM_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  ROM_rationing: "Rationing"
  ROM_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  ROM_infrastructure_effort: "Infrastructure Effort"
  ROM_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  ROM_fuel: "Fuel Production"
  ROM_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  ROM_women_at_work: "Women at Work"
  ROM_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  ROM_construct_civilian: "Industrial Expansion"
  ROM_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  ROM_expand_mining: "Mining Operations"
  ROM_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  ROM_efficiency_studies: "Efficiency Studies"
  ROM_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  ROM_war_industry: "War Industry"
  ROM_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  ROM_telegraph: "Telegraph Network"
  ROM_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  ROM_political_ambitions: "Political Ambitions"
  ROM_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  ROM_international_affairs: "International Affairs"
  ROM_international_affairs_desc: "Engage in diplomacy to secure national interests."

  ROM_expansionism: "Expansionism"
  ROM_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  ROM_deterrence: "Romanian, Awake!"
  ROM_deterrence_desc: ""

  ROM_seek_alliances: "Seek Alliances"
  ROM_seek_alliances_desc: "Form strategic partnerships to ensure national security."

  ROM_on_our_own: "On Our Own"
  ROM_on_our_own_desc: "Adopt a self-reliant approach to national defense and policy."

  ROM_traditionalism: "Democratization"
  ROM_traditionalism_desc: ""

  ROM_public_support: "Support the War Effort"
  ROM_public_support_desc: "Ensure the backing of the people for government policies."

  ROM_mobilize_the_masses: "Liberal Government"
  ROM_mobilize_the_masses_desc: ""

  ROM_strength_in_unity: "Strength in Unity"
  ROM_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  ROM_the_everlasting_spirit: "The Everlasting Spirit"
  ROM_the_everlasting_spirit_desc: "Preserve the ideals and determination of our people."

  ROM_adjust_the_government: "Maintain the Duchy"
  ROM_adjust_the_government_desc: ""

  ROM_open_the_economy: "Agrarian Investments"
  ROM_open_the_economy_desc: ""

  ROM_state_reform: "State Reform"
  ROM_state_reform_desc: "Implement structural changes to modernize the nation."

  ROM_embrace_modernity: "Embrace Modernity"
  ROM_embrace_modernity_desc: "Advance technological and cultural progress for a new era."

  ROM_over_the_edge: "Over the Edge"
  ROM_over_the_edge_desc: "We already are at the brink of revolution — shall we make the next step?"
