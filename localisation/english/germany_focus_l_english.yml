l_english:
  GER_adjust_the_military: "Adjust the Military"
  GER_adjust_the_military_desc: "Reevaluate and reallocate military expenditures to ensure efficiency and sustainability."

  GER_focus_army: "Army"
  GER_focus_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  GER_extend_conscription: "Extend Conscription"
  GER_extend_conscription_desc: "Increase the pool of available manpower by expanding the nation's conscription laws."

  GER_army_maneuvers: "Army Maneuvers"
  GER_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  GER_equipment_effort: "Equipment Effort"
  GER_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  GER_artillery: "Artillery"
  GER_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."

  GER_aircraft: "Aircraft"
  GER_aircraft_desc: "Develop and expand the air force to secure dominance in the skies."

  GER_armor: "Armor"
  GER_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  GER_modern_warfare: "Modern Warfare"
  GER_modern_warfare_desc: "Adapt our military strategies to the demands of contemporary combat."

  GER_focus_navy: "Navy"
  GER_focus_navy_desc: "Enhance our naval power to protect sea lanes and project influence abroad."

  GER_expand_dockyards: "Expand Dockyards"
  GER_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  GER_naval_exercises: "Naval Exercises"
  GER_naval_exercises_desc: "Conduct training drills to improve the efficiency of our naval forces."

  GER_high_seas: "High Seas"
  GER_high_seas_desc: "Extend our operational reach beyond coastal waters."

  GER_the_dark_deep: "The Dark Deep"
  GER_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  GER_seaborne_operations: "Seaborne Operations"
  GER_seaborne_operations_desc: "Prepare for amphibious warfare and long-range naval engagements."

  GER_rule_the_waves: "Rule the Waves"
  GER_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  GER_economic_development: "Economic Development"
  GER_economic_development_desc: "Strengthen the nation's economy through industrial and financial reforms."

  GER_rationing: "Rationing"
  GER_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  GER_fuel: "Fuel Production"
  GER_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  GER_women_at_work: "Women at Work"
  GER_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  GER_infrastructure_effort: "Infrastructure Effort"
  GER_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  GER_construct_civilian: "Industrial Expansion"
  GER_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  GER_expand_mining: "Mining Operations"
  GER_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  GER_steady_growth: "Steady Growth"
  GER_steady_growth_desc: "Ensure stable and continuous economic expansion."

  GER_efficiency_studies: "Efficiency Studies"
  GER_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  GER_war_industry: "War Industry"
  GER_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  GER_telegraph: "Telegraph Network"
  GER_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  GER_political_ambitions: "Political Ambitions"
  GER_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  GER_international_affairs: "International Affairs"
  GER_international_affairs_desc: "Engage in diplomacy to secure national interests."

  GER_expansionism: "Expansionism"
  GER_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  GER_oriental_investments: "Oriental Aspirations"
  GER_oriental_investments_desc: "Expand German influence in the Near East and North Africa through strategic investments and covert support, undermining rival empires in the process."

  GER_seek_alliances: "A Place in the Sun"
  GER_seek_alliances_desc: "Secure Germany’s “place in the sun” by expanding our power against Britain, France, and Russia."

  GER_on_our_own: "Abandon Weltpolitik"
  GER_on_our_own_desc: "Abandon Weltpolitik and find a different course, free from unnecessary conflict and adventurism."

  GER_traditionalism: "Heil Dir im Siegerkranz"
  GER_traditionalism_desc: ""

  GER_public_support: "Support the War Effort"
  GER_public_support_desc: "Ensure the backing of the people for government policies."

  GER_mobilize_the_masses: "Die Wacht am Rhein"
  GER_mobilize_the_masses_desc: ""

  GER_strength_in_unity: "Strength in Unity"
  GER_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  GER_the_everlasting_spirit: "Deutschland über Alles"
  GER_the_everlasting_spirit_desc: ""

  GER_adjust_the_government: "Democratic Opposition"
  GER_adjust_the_government_desc: ""

  GER_open_the_economy: "Afrika-Amt"
  GER_open_the_economy_desc: ""

  GER_state_reform: "State Reform"
