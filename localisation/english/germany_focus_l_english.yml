l_english:
  XXX_army: "Army"
  XXX_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  XXX_army_maneuvers: "Army Maneuvers"
  XXX_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  XXX_conscription: "Announce Mobilization"
  XXX_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  XXX_equipment_effort: "Equipment Effort"
  XXX_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  XXX_support_companies: "Support Companies"
  XXX_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  XXX_artillery: "Artillery"
  XXX_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  XXX_armor: "Armor"
  XXX_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  XXX_industrial_warfare: "Industrial Warfare"
  XXX_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  XXX_airfields: "Airfields"
  XXX_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  XXX_air_training: "Air Training"
  XXX_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  XXX_aerostats: "Aerostats"
  XXX_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  XXX_aces: "Learn from the Aces"
  XXX_aces_desc: ""

  XXX_ground_support: "Ground Support"
  XXX_ground_support_desc: ""

  XXX_air_doctrine: "Air Doctrine"
  XXX_air_doctrine_desc: ""

  XXX_expand_dockyards: "Expand Dockyards"
  XXX_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  XXX_shallow_waters: "Shallow Waters"
  XXX_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  XXX_high_seas: "High Seas"
  XXX_high_seas_desc: "Extend our operational reach beyond coastal waters."

  XXX_rule_the_waves: "Rule the Waves"
  XXX_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  XXX_the_dark_deep: "The Dark Deep"
  XXX_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  XXX_coastal_defense: "Coastal Defense"
  XXX_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  XXX_rationing: "Rationing"
  XXX_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  XXX_infrastructure_effort: "Infrastructure Effort"
  XXX_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  XXX_fuel: "Fuel Production"
  XXX_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  XXX_women_at_work: "Women at Work"
  XXX_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  XXX_construct_civilian: "Industrial Expansion"
  XXX_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  XXX_expand_mining: "Mining Operations"
  XXX_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  XXX_efficiency_studies: "Efficiency Studies"
  XXX_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  XXX_war_industry: "War Industry"
  XXX_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  XXX_telegraph: "Telegraph Network"
  XXX_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  XXX_political_ambitions: "Political Ambitions"
  XXX_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  GER_international_affairs: "International Affairs"
  GER_international_affairs_desc: "Engage in diplomacy to secure national interests."

  GER_expansionism: "Expansionism"
  GER_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  GER_deterrence: "Oriental Aspirations"
  GER_deterrence_desc: "Expand German influence in the Near East and North Africa through strategic investments and covert support, undermining rival empires in the process."

  GER_seek_alliances: "Establish the Alliance"
  GER_seek_alliances_desc: ""

  GER_on_our_own: "Embrace Weltpolitik"
