l_english:

  # expel
  sau_expel.1.d: "A delegation of sheikhs has confronted the Ottoman governor over insults, heavy levies and contempt for local customs.\n\nThe Emir is urged to defend honour; expelling the governor would please the tribes but risks open rupture with Constantinople and punitive consequences."
  sau_expel.2.d: "Reports from [SAU.GetNameDef] confirm the local emir has expelled the Ottoman governor.\n\nMinisters in Constantinople mutter about insubordination, yet few wish to send troops into the desert. Still, the affront demands a reply or some show of authority."
  
  # ikhwan
  sau_ikhwan.1.d: "In recent days, a group of preachers travels among Arabian tribes, spreading strict Wahhabi doctrine and urging obedience to local sheikhs.\n\nSome leaders welcome the unity their zeal promises; others fear an 'Ikhwan' spirit that answers only to religious commanders and undermines the emir's authority."
  
  # tribes
  sau_tribalism.1.d: "Our realm rests on ancestral loyalties — fragile, shifting, and easily inflamed. Reformers urge courts and taxation; tribal sheikhs demand retained privileges.\n\nChallenging them could modernize the state, or provoke revolts that fracture authority across the desert and plains."
  sau_tribalism.2.d: "Several tribes have rejected the emir's attempts to curb traditional powers. Reports tell of raids, ambushes and defections along caravan routes.\n\nIf these disturbances go unchecked, entire districts may slip from central control and plunge the region into prolonged insecurity."
  sau_tribalism.3.d: "A vision long whispered by poets seems realized: disparate tribes swear loyalty beneath a single banner. For the first time an Arab kingdom claims unity across old feuds.\n\nThe challenge now is to turn this stirring promise of solidarity into stable government."
  
  # mecca
  sau_mecca.1.d: "[SAU.GetNameDefCap] proclaims a sacred duty to liberate Mecca and Medina from misrule. Pilgrims murmur approval; rivals grow uneasy.\n\nWhoever controls the Holy Cities gains huge moral authority — a northern protector of the Hijaz alarms distant courts and local rulers."
  sau_mecca.2.d: "With Mecca secured, ministers debate moving the capital from Ha'il to the Holy City. Supporters argue the shift would confer unrivalled religious legitimacy; opponents fear alienating tribal backers rooted in the old heartland.\n\nThe decision will shape the emirate's identity and alliances."