l_english:
  SAU_army: "Army"
  SAU_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  SAU_army_maneuvers: "Army Maneuvers"
  SAU_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  SAU_conscription: "Announce Mobilization"
  SAU_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  SAU_equipment_effort: "Equipment Effort"
  SAU_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  SAU_support_companies: "Support Companies"
  SAU_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  SAU_artillery: "Artillery"
  SAU_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  SAU_armor: "Armor"
  SAU_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  SAU_industrial_warfare: "Industrial Warfare"
  SAU_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  SAU_airfields: "Airfields"
  SAU_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  SAU_air_training: "Air Training"
  SAU_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  SAU_aerostats: "Aerostats"
  SAU_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  SAU_aces: "Learn from the Aces"
  SAU_aces_desc: ""

  SAU_ground_support: "Ground Support"
  SAU_ground_support_desc: ""

  SAU_air_doctrine: "Air Doctrine"
  SAU_air_doctrine_desc: ""

  SAU_expand_dockyards: "Expand Dockyards"
  SAU_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  SAU_shallow_waters: "Shallow Waters"
  SAU_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  SAU_high_seas: "High Seas"
  SAU_high_seas_desc: "Extend our operational reach beyond coastal waters."

  SAU_rule_the_waves: "Rule the Waves"
  SAU_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  SAU_the_dark_deep: "The Dark Deep"
  SAU_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  SAU_coastal_defense: "Coastal Defense"
  SAU_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  SAU_rationing: "Rationing"
  SAU_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  SAU_infrastructure_effort: "Infrastructure Effort"
  SAU_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  SAU_fuel: "Fuel Production"
  SAU_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  SAU_women_at_work: "Women at Work"
  SAU_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  SAU_construct_civilian: "Industrial Expansion"
  SAU_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  SAU_expand_mining: "Mining Operations"
  SAU_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  SAU_efficiency_studies: "Efficiency Studies"
  SAU_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  SAU_war_industry: "War Industry"
  SAU_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  SAU_telegraph: "Telegraph Network"
  SAU_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  SAU_political_ambitions: "Political Ambitions"
  SAU_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  SAU_international_affairs: "International Affairs"
  SAU_international_affairs_desc: "Engage in diplomacy to secure national interests."

  SAU_expansionism: "Expansionism"
  SAU_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  SAU_deterrence: "End Arab Tribalism"
  SAU_deterrence_desc: ""

  SAU_seek_alliances: "Seek Alliances"
  SAU_seek_alliances_desc: "Form strategic partnerships to ensure national security."

  SAU_on_our_own: "United Arabia"
  SAU_on_our_own_desc: ""

  SAU_traditionalism: "Islamic Authority"
  SAU_traditionalism_desc: ""

  SAU_public_support: "Support the War Effort"
  SAU_public_support_desc: "Ensure the backing of the people for government policies."

  SAU_mobilize_the_masses: "Summon the Mujahedeen"
  SAU_mobilize_the_masses_desc: ""

  SAU_strength_in_unity: "Strength in Unity"
  SAU_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  SAU_the_everlasting_spirit: "Claim the Caliphate"
  SAU_the_everlasting_spirit_desc: ""

  SAU_adjust_the_government: "Secularization"
  SAU_adjust_the_government_desc: ""

  SAU_open_the_economy: "Open the Economy"
  SAU_open_the_economy_desc: ""

  SAU_state_reform: "State Reform"
  SAU_state_reform_desc: "Implement structural changes to modernize the nation."

  SAU_embrace_modernity: "Embrace Modernity"
  SAU_embrace_modernity_desc: "Advance technological and cultural progress for a new era."

  SAU_over_the_edge: "Over the Edge"
  SAU_over_the_edge_desc: "We already are at the brink of revolution — shall we make the next step?"
