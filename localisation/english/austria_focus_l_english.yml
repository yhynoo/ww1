l_english:
  AUS_army: "Army"
  AUS_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  AUS_army_maneuvers: "Army Maneuvers"
  AUS_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  AUS_conscription: "Announce Mobilization"
  AUS_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  AUS_equipment_effort: "Equipment Effort"
  AUS_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  AUS_support_companies: "Support Companies"
  AUS_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  AUS_artillery: "Artillery"
  AUS_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  AUS_armor: "Armor"
  AUS_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  AUS_industrial_warfare: "Industrial Warfare"
  AUS_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  AUS_airfields: "Airfields"
  AUS_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  AUS_air_training: "Air Training"
  AUS_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  AUS_aerostats: "Aerostats"
  AUS_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  AUS_aces: "Learn from the Aces"
  AUS_aces_desc: ""

  AUS_ground_support: "Ground Support"
  AUS_ground_support_desc: ""

  AUS_air_doctrine: "Air Doctrine"
  AUS_air_doctrine_desc: ""

  AUS_expand_dockyards: "Expand Dockyards"
  AUS_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  AUS_shallow_waters: "Shallow Waters"
  AUS_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  AUS_high_seas: "High Seas"
  AUS_high_seas_desc: "Extend our operational reach beyond coastal waters."

  AUS_rule_the_waves: "Rule the Waves"
  AUS_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  AUS_the_dark_deep: "The Dark Deep"
  AUS_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  AUS_coastal_defense: "Coastal Defense"
  AUS_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  AUS_rationing: "Rationing"
  AUS_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  AUS_infrastructure_effort: "Infrastructure Effort"
  AUS_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  AUS_fuel: "Fuel Production"
  AUS_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  AUS_women_at_work: "Women at Work"
  AUS_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  AUS_construct_civilian: "Industrial Expansion"
  AUS_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  AUS_expand_mining: "Mining Operations"
  AUS_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  AUS_efficiency_studies: "Efficiency Studies"
  AUS_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  AUS_war_industry: "War Industry"
  AUS_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  AUS_telegraph: "Telegraph Network"
  AUS_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  AUS_political_ambitions: "Political Ambitions"
  AUS_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  AUS_international_affairs: "International Affairs"
  AUS_international_affairs_desc: "Engage in diplomacy to secure national interests."

  AUS_expansionism: "Expansionism"
  AUS_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  AUS_contain_eastern_threats: "Contain the Eastern Threat"
  AUS_contain_eastern_threats_desc: "The Tsar’s shadow looms over our vulnerable eastern frontier; we must tighten our grip on Galicia and the south-east, and prepare for the inevitable test of strength."

  AUS_seek_alliances: "Seek Alliances"
  AUS_seek_alliances_desc: ""

  AUS_on_our_own: "Denounce German Adventurism"
  AUS_on_our_own_desc: "Germany’s reckless ambitions threaten to drag us into the disaster along their side. By charting an independent course, we safeguard the monarchy’s survival and reclaim diplomatic freedom."

  AUS_traditionalism: "Obstruct the Imperial Council"
  AUS_traditionalism_desc: "We will encourage Count von Stürgkh’s obstructionist tactics and paralyze the Imperial Council, allowing us to rule directly, without the parliament's interference."

  AUS_public_support: "Support the War Effort"
  AUS_public_support_desc: "Ensure the backing of the people for government policies."

  AUS_mobilize_the_masses: "An Meine Völker"
  AUS_mobilize_the_masses_desc: "The Emperor’s proclamation “An Meine Völker” calls upon every subject of the monarchy to rise in loyalty. Let us summon the strength of our peoples to wage total war."

  AUS_strength_in_unity: "Strength in Unity"
  AUS_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  AUS_the_everlasting_spirit: "Alles Erdreich ist Österreich"
  AUS_the_everlasting_spirit_desc: "“Alles Erdreich ist Österreich” — all the world is Austria. In unity of crown and peoples, the empire will proclaim its eternal mission and unshakable destiny."

  AUS_adjust_the_government: "Centralization"
  AUS_adjust_the_government_desc: "The dual character of Austro-Hungarian monarchy enforced by the Hungarian opposition has long obstructed any meaningful development. It is time to use the guise of guided democratization to unite the Empire as a unitary state."

  AUS_open_the_economy: "Equal Development"
  AUS_open_the_economy_desc: "Investments in Czechia and Galicia will ensure more equal development across the Dual Monarchy. Industry and infrastructure must bind the empire together as much as law and crown."

  AUS_state_reform: "State Reform"
  AUS_state_reform_desc: "Implement structural changes to modernize the nation."

  AUS_embrace_modernity: "The Last Ausgleich"
  AUS_embrace_modernity_desc: "The compromise of [Get.Year] envisions the transformation of Austria-Hungary into a federation of equal nations — a true “United States of Greater Austria.” Though radical, it may be the only path to preserve the monarchy in the modern age."

  AUS_over_the_edge: "Red Vienna"
  AUS_over_the_edge_desc: "From Vienna’s tenements and factories, the cry of revolution will spread: communist agitators already speak of a red republic rising from the ashes of the old order."
