l_english:

  # agraristas
  mexico_agraristas.1.d: "A widespread agrarian uprising has erupted in the Mexican countryside, led by revolutionaries demanding radical land reform.\n\nThe state teeters on the edge of civil war — and both sides are preparing for a long and bitter conflict."

  # church
  mexico_church.1.d: "Whispers grow of a secret alliance between the Church and regional caudillos, aiming to influence politics in Mexico. Democratic monarchists watch with concern as old powers stir once more.\n\nObservers warn this could reshape the balance of power, challenging reforms and stability across the nation."

  mexico_church.2.d: "Speculation mounts over a possible deal between Mexico’s government and the Church. Concessions may secure influence for clerical leaders, but critics call it a dangerous compromise.\n\nDebates rage in political circles: should the state bend to tradition, or uphold democratic principles at all costs?"

  mexico_church.3.d: "Anti-clerical protests erupt in Sonora, with crowds denouncing the Church’s influence on the country. Demonstrations grow in size and intensity, spreading unease among officials.\n\nAuthorities face a dilemma: suppress the dissent with force or risk letting unrest undermine national stability and public confidence."
