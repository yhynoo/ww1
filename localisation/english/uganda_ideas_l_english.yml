l_english:
  idea_memory_of_herero: "Memory of the Herero Uprising"
  idea_memory_of_herero_desc: "The military campaign against the Herero and Nama people and the unspeakable atrocities that followed it still casts a long shadow over our rule in Africa."

  idea_askari: "Askari Troops"
  idea_askari_desc: "Loyal African soldiers form the backbone of our colonial forces, blending local knowledge with German discipline."

  idea_heia_safari: "Heia, Safari!"
  idea_heia_safari_desc: "Echoing the daring spirit of early explorers and soldiers, ‘Heia Safari!’ has become the rallying cry of German Africa — a symbol of endurance, adventure, and the relentless push of empire into untamed lands."

  idea_place_in_the_sun: "A Place in the Sun"
  idea_place_in_the_sun_desc: "Here, in the heart of Africa, we carve out Germany’s rightful place among the empires of the world — a vision of prestige paid for in sweat and steel."
