l_english:
## -- GREECE

  # delegation / Crete
  gre_delegation.1.d: "A Cretan delegation arrives in Athens, demanding to be seated as deputies in the Vouli. They speak of the 1908 declaration of union and insist that Crete is already Greek in everything but paperwork.\n\nMinisters hesitate between legal caution and — de facto — confirming the annexation."
  gre_delegation.2.d: "News spreads that [GRE.GetNameDef] has formally annexed Crete. The blue-and-white flag flies openly over the island, and Cretan deputies rejoice with their unexpected success.\n\nIn Constantinople, anger simmers; in Athens, crowds celebrate union at last."

  # assassination
  gre_assassination.1.d: "King Geórgios I has been shot while walking in Athens, the royal promenade shattered by a sudden pistol shot. The assassin — a local drunk and socialist agitator — was seized on the spot.\n\nShock turns quickly to uncertainty, and various factions are now expected to compete for the King’s legacy."
  gre_assassination.2.d: "With the old king gone, Greece feels suddenly unmoored. Konstantínos’ partisans invoke dynasty and honour; Venizelos’ supporters talk of progress and national ambition.\n\nFrom cafés to officers’ messes, Greeks begin to choose sides — and to whisper about a looming ‘national schism’."

  # schism
  gre_schism.1.d: "Monarchist officers, claiming to defend throne and tradition, have taken up arms. Loyal units seize barracks and telegraph offices, raising the royal flag over key towns.\n\nThey denounce their opponents as usurpers who would trade crown and faith for foreign approval."
  gre_schism.2.d: "Democratic leaders, convinced the palace has betrayed Greece’s future, rally volunteers under reformist banners. Speeches in public squares turn swiftly into calls to arms.\n\nThey vow that only a liberal, parliamentary Greece can speak for the nation — even at the price of civil war."

  # officers
  gre_officers.1.d: "With the King’s influence in retreat and Eleftherios Venizelos firmly at the helm, the young officers’ cliques quietly signal their approval. The men who once plotted against the palace now nod along with the new government.\n\nFor the moment, the army, the navy, and the government all march in the same direction."

  # enosis / Cyprus
  gre_enosis.1.d: "In villages and ports alike, word spreads that Cyprus has joined [GRE.GetNameDef]. Icons are garlanded, flags unfurled, and old songs of union sung anew.\n\nFor many Greeks, this feels less like conquest than the belated correction of history."
