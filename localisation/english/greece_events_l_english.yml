l_english:
  ## -- GREECE

  # enosis
  gre_enosis.1.d: "Church bells ring and crowds pour into the streets as news spreads that Cyprus has formally joined [GRE.GetNameDef]. Flags appear in windows; old songs of union and liberation are sung with new fervour.\n\nStatesmen speak of a historic injustice finally set right, while in distant capitals some wonder what further claims might yet be awakened."

  # assassination
  gre_assassination.1.d: "During an afternoon walk on the Thessaloniki quay, King Geórgios I was approached from behind and shot at close range. He died soon afterward.\n\nThe assassin — a local drunk and communist — was seized, and Greece reels between grief, anger, and whispered talk of plots."
  gre_assassination.2.d: "After King Geórgios’ death, Greece drifts into bitter rivalry between Prime Minister Venizélos and the young King Konstantínos. Officers, priests, and newspapers quietly choose sides.\n\nIn cafés and barracks alike, arguments grow sharper as the nation splits into hostile camps."

  # schism
  gre_schism.1.d: "Royalist officers and their followers have taken up arms, proclaiming themselves defenders of crown and tradition. They occupy key buildings, raise the royal flag, and denounce their opponents as traitors to the nation.\n\nStreets crackle with rumours of arrests and skirmishes as Greece slides toward fratricidal war."
  gre_schism.2.d: "Democratic leaders, shut out and denounced, have called their supporters to arms. Volunteer bands gather under banners of liberty and national renewal, swearing that they fight not against Greece, but for her future.\n\nAs neighbours eye one another with suspicion and rifles appear in doorways, the Greek people brace for a conflict in which brother may face brother."
