l_english:

  # komisja
  komisja_likwidacyjna: "Liquidation Committee"

  establish_administration_in_galicia: "Establish Administration in Galicia-Lodomeria"
  komisja_likwidacyjna_desc: "Formed in Kraków, the Liquidation Committee seeks to dismantle Austro-Hungarian authority in Galicia and lay the groundwork for a reborn Polish state."

  announce_poland: "Announce Polish Independence"
  announce_poland_desc: "Through declaring the reestablishment of independent Poland, we affirm to the world that the Polish nation lives again — free and sovereign after more than a century of partition."  

  # assembling the lands
  assembling_the_lands: "Assembling the Lands"
  
  demand_galicia: "Demand Galicia"
  demand_galicia_desc: "Galicia — once the heart of Polish culture under foreign rule — must return to Polish hands. By pressing our claim, we continue the work of national restoration and secure our southern frontier."

  develop_gdynia: "Develop Gdynia"
  develop_gdynia_desc: "To ensure Poland’s access to the sea, we will transform Gdynia from a modest village into a modern harbor. A strong maritime presence will free our trade from dependence on foreign shores."

  defender_of_europe: "Announce ‘The Defense of Europe’"
  defender_of_europe_desc: "For centuries, Poland has stood as the bulwark of Europe — from Vienna to Warsaw, a line between East and West. Once more, we must take up that mantle, defending civilization itself from the specter of communism."
