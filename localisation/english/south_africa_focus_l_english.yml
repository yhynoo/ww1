l_english:
  SAF_army: "Army"
  SAF_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  SAF_army_maneuvers: "Army Maneuvers"
  SAF_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  SAF_conscription: "Announce Mobilization"
  SAF_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  SAF_equipment_effort: "Equipment Effort"
  SAF_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  SAF_support_companies: "Support Companies"
  SAF_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  SAF_artillery: "Artillery"
  SAF_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  SAF_armor: "Armor"
  SAF_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  SAF_industrial_warfare: "Industrial Warfare"
  SAF_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  SAF_airfields: "Airfields"
  SAF_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  SAF_air_training: "Air Training"
  SAF_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  SAF_aerostats: "Aerostats"
  SAF_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  SAF_aces: "Learn from the Aces"
  SAF_aces_desc: ""

  SAF_ground_support: "Ground Support"
  SAF_ground_support_desc: ""

  SAF_air_doctrine: "Air Doctrine"
  SAF_air_doctrine_desc: ""

  SAF_expand_dockyards: "Expand Dockyards"
  SAF_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  SAF_shallow_waters: "Shallow Waters"
  SAF_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  SAF_high_seas: "High Seas"
  SAF_high_seas_desc: "Extend our operational reach beyond coastal waters."

  SAF_rule_the_waves: "Rule the Waves"
  SAF_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  SAF_the_dark_deep: "The Dark Deep"
  SAF_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  SAF_coastal_defense: "Coastal Defense"
  SAF_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  SAF_rationing: "Rationing"
  SAF_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  SAF_infrastructure_effort: "Infrastructure Effort"
  SAF_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  SAF_fuel: "Fuel Production"
  SAF_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  SAF_women_at_work: "Women at Work"
  SAF_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  SAF_construct_civilian: "Industrial Expansion"
  SAF_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  SAF_expand_mining: "Mining Operations"
  SAF_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  SAF_efficiency_studies: "Efficiency Studies"
  SAF_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  SAF_war_industry: "War Industry"
  SAF_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  SAF_telegraph: "Telegraph Network"
  SAF_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  SAF_political_ambitions: "Political Ambitions"
  SAF_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  SAF_international_affairs: "International Affairs"
  SAF_international_affairs_desc: "Engage in diplomacy to secure national interests."

  SAF_expansionism: "Expansionism"
  SAF_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  SAF_deterrence: "Defend the Independence"
  SAF_deterrence_desc: ""

  SAF_seek_alliances: "Seek Alliances"
  SAF_seek_alliances_desc: "Form strategic partnerships to ensure national security."

  SAF_on_our_own: "On Our Own"
  SAF_on_our_own_desc: "Adopt a self-reliant approach to national defense and policy."

  SAF_traditionalism: "Against Albion"
  SAF_traditionalism_desc: ""

  SAF_public_support: "Support the War Effort"
  SAF_public_support_desc: "Ensure the backing of the people for government policies."

  SAF_mobilize_the_masses: "Heroes of the Veld"
  SAF_mobilize_the_masses_desc: ""

  SAF_strength_in_unity: "Strength in Unity"
  SAF_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  SAF_the_everlasting_spirit: "The Everlasting Spirit"
  SAF_the_everlasting_spirit_desc: "Preserve the ideals and determination of our people."

  SAF_adjust_the_government: "Adjust the Government"
  SAF_adjust_the_government_desc: "Reform administrative structures to improve governance."

  SAF_open_the_economy: "Open the Economy"
  SAF_open_the_economy_desc: "Encourage trade and investment to foster economic prosperity."

  SAF_state_reform: "State Reform"
  SAF_state_reform_desc: "Implement structural changes to modernize the nation."

  SAF_embrace_modernity: "Embrace Modernity"
  SAF_embrace_modernity_desc: "Advance technological and cultural progress for a new era."

  SAF_over_the_edge: "Over the Edge"
  SAF_over_the_edge_desc: "We already are at the brink of revolution — shall we make the next step?"
