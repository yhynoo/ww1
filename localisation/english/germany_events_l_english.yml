l_english:

  # airships
  germany_airships.1.d: "An impressive parade of airships took place above Johannisthal today, showcasing Germany’s advancements in aerial engineering.\n\nCrowds gathered to watch the zeppelins and experimental craft glide gracefully across the sky — a display of national pride and technological ambition."

  germany_airships.2.d: "Under the quiet direction of Otto Lilienthal, the famous aviation pioneer and engineer, the War Ministry has unveiled a prototype glider battalion.\n\nThough still limited in range and deployment, the concept hints at a revolutionary new frontier in military mobility."

  # algeria
  germany_algeria.1.d: "A remote French outpost in the Atlas Mountains has been overrun by armed insurgents.\n\nThough Paris blames local discontent, some suspect a foreign hand behind the operation — a troubling sign of unrest far from Europe’s front lines."

  germany_algeria.2.d: "Following weeks of violence and sabotage, open rebellion has erupted across Algeria.\n\nNationalist leaders have declared independence, sparking a colonial war with implications far beyond North Africa."

  # germany_appease_french
  germany_appease_french.1.d: "Berlin has put forth a startling proposal: Wallonia, Luxembourg, and Alsace-Lorraine would be handed over to France in exchange for Paris abandoning its guarantees for Russia and their neutrality in Europe.\n\nThough tempting for the troubled nation, many fear the offer hides a deeper German design — a trap disguised as peace."

  germany_appease_french.2.d: "A shocking accord has reportedly been reached between France and Germany.\n\nAs Paris relinquishes its ties to Russia and assumes a neutral position in Europe, France has received vast territorial concessions — changing the balance of power on the continent overnight. The specter of a Franco-German understanding now haunts Europe."

  # approack uk
  germany_approach_uk.1.d: "A German delegation has arrived in London proposing British neutrality in the event of a European conflict.\n\nAs part of their proposal, they’ve suggested the United Kingdom withdraw its guarantees to France, framing the move as one of peace rather than provocation. In exchange, the offer to tone down the Tirpitz plan: the expansion of their navy which has threatened our naval dominance for years."

  germany_approach_uk.2.d: "In a surprising move, [ENG.GetName] has officially withdrawn its guarantees to [FRA.GetName].\n\nWhile the British government claims neutrality, many suspect that Berlin’s quiet diplomacy has borne fruit."

  # cotton
  germany_cotton.1.d: "[GER.GetName] has proposed a trade agreement to access cotton grown in Egypt.\n\nIn exchange, they offer economic incentives and potential debt restructuring — an appealing offer for nations struggling to manage foreign creditors."

  germany_cotton.2.d: "A deal has been struck: [GER.GetName] now holds exclusive access to cotton harvested in Egypt.\n\nThe agreement has raised eyebrows across Europe, where fears of German economic penetration are growing."

  # east
  germany_east.1.d: "Reports from Riga and Tallinn suggest coordinated unrest, with German agents rumored to be agitating nationalist movements in the Baltic region.\n\nPetersburg remains silent — for now."

  germany_east.2.d: "Baltic German representatives have arrived in Berlin pleading for protection from Russian persecution.\n\nTheir appeal has stirred debate within Germany’s leadership about intervening under the guise of a protectorate."

  germany_east.3.d: "German diplomats have issued a stern demand to Petersburg: recognize an independent Baltic protectorate or face consequences.\n\nWhether the Russians will yield or resist remains uncertain."

  germany_east.4.d: "Germany has proclaimed the establishment of [UBD.GetNameDef], drawing together the peoples of Latvia, Estonia, and Lithuania under its protection.\n\nThe move has sparked international outcry — and admiration among nationalist circles."

  germany_east.5.d: "Uprisings have exploded across the Baltic coast as German nationalist militias launch a coordinated rebellion against Russian rule.\n\nSupported by German advisors and arms, the independence movement may finally seize its chance."

  # egypt
  germany_egypt.1.d: "A German archaeological team has unveiled a remarkable discovery at the site El-Amarna: the nearly intact bust of Nefertiti, the famous ancient queen, wife of the controversial king Akhenaten.\n\nThe expedition’s success is hailed as a cultural triumph for Berlin — and a soft-power victory abroad."

  # naval
  germany_naval.1.d: "In an unexpected move, [GER.GetName] has approached London with a proposal to ease tensions at sea.\n\nBerlin seeks to de-escalate the ongoing naval arms race, citing rising costs and mutual exhaustion."

  germany_naval.2.d: "[ENG.GetName] has welcomed German overtures to end the naval arms race, signaling a potential thaw in Anglo-German relations.\n\nThe announcement is already drawing cautious praise from other European capitals."

  # wassmuss
  germany_wassmuss.1.d: "Wilhelm Wassmuss, once dubbed the 'German Lawrence', has recently arrived in the Fao harbor and disappeared on the eastern side of the Gulf.\n\nLocal officials report increased tribal activity and mysterious visitors — signs that intrigue is once again afoot."

  germany_wassmuss.2.d: "Germany has struck a covert deal with Qashqai tribal leaders: arms in exchange for oil.\n\nThe arrangement is expected to shift the balance of power in the Near East — and deepen German influence in the region."

  germany_wassmuss.3.d: "While Berlin remains silent, it is widely believed that Germany has secured access to critical oil reserves in Persia.\n\nThe deal may mark a turning point in Central Asian geopolitics."

  germany_wassmuss.4.d: "A foreign advisor has risen rapidly in influence at the Persian court, guiding the Shah through delicate reforms and foreign policy maneuvers.\n\nSome suspect the man is none other than Wassmuss — operating under a new identity."

  germany_wassmuss.5.d: "Wassmuss has vanished once again, leaving behind only rumors and speculation.\n\nSome say he was assassinated; others claim he departed willingly. Regardless, his legend continues to grow."