l_english:

## -- GERMANY
  # airships
  ger_airships.1.d: "At Johannisthal, the skies filled with graceful leviathans of silver canvas and gas. Zeppelin’s latest creation took to the air, inspiring enthusiasm in the crowd.\n\nAs the airship circled above Berlin, onlookers sensed a future where the heavens themselves would bear the German flag."
  ger_airships.2.d: "Disaster struck today at the Johannisthal airfield. One of the massive airships caught fire and fell in flames before horrified spectators.\n\nThe tragedy has shaken confidence in this daring new science of flight, casting a dark shadow over Germany’s dreams of aerial mastery."

  # alsace
  ger_alsace.1.d: "French newspapers report growing unrest in Alsace-Lorraine, describing marches, barricades, and tense confrontations. \n\nWitnesses claim that clashes between locals and soldiers have erupted in several towns, though details remain uncertain. German authorities insist the situation is under control.\n\nBehind the official statements, few doubt that casualties are being quietly ignored."

  # amarna
  ger_amarna.1.d: "German archaeologists at Amarna uncover a remarkable cache of artifacts, stirring excitement at home and in Cairo alike. Among the finds lies a striking painted bust, its craftsmanship suggesting a royal figure of great significance.\n\nScholars hail the discovery as a triumph of German science, promising new insight into Egypt’s ancient world."

  # atlantic
  ger_atlantic.1.d: "As the war drags on, the Admiralty has suggested to wage unrestricted submarine warfare against British commerce. Admirals promise swift results; diplomats urge caution.\n\nThe depths of the sea may let us either end this war in victory — or draw enemies to fight against us."
  ger_atlantic.2.d: "News reaches the world that the liner Lusitania has been sunk by a German submarine, with terrible loss of civilian life. The outcry is immediate and immense.\n\nNewspapers speak of barbarity at sea, and neutral nations begin to question their silence."
  ger_atlantic.3.d: "Merchant vessels flying [ROOT.GetAdjective] flags have been torpedoed without warning in the Atlantic. Survivors tell of steel hulls emerging from the mist and vanishing again into the deep\n\nThe attacks have stirred outrage in the ports and parliaments of the neutral world."

  # east
  ger_east.1.d: "German strategists and scholars alike turn their gaze eastward, speaking of vast lands, untapped resources, and destiny. Newspapers echo old ambitions of settlement and renewal.\n\nYet beneath these lofty words, some sense unease — an awareness that Germany can’t get these lands without war."

  # harvest
  GER_harvest.1.d: "The harvest of 1916 has come, but the fields yield too little for a nation still at war. Grain is scarce, livestock thinned.\n\nSome ministers urge demobilization of the economy to feed the people; others insist endurance alone can secure victory."
  GER_harvest.2.d: "‘Durchhalten!’ — to endure — has become the word of the hour. Posters urge sacrifice; kitchens grow emptier by the week. Mothers stretch rations, soldiers march on thinner bread.\n\nThe will of the people is tested as hunger becomes yet another front of the war."

  # oil
  ger_oil.1.d: "Envoys from Berlin have proposed an ambitious arrangement: access to Arabian oil in exchange for cooperation and investment.\n\nThe offer appeals to both pragmatism and prestige, yet whispers abound that such influence might bind our fortunes too closely to those of the Kaiser’s empire."
  ger_oil.2.d: "German engineers and financiers have secured rights to Arabian oil, a triumph for industry and diplomacy alike.\n\nThe arrangement promises to fuel new ambitions across the empire, though in distant capitals, unease grows at this deepening German presence in the Middle East."
  
  # wallonia
  ger_wallonia.1.d: "After the 1911 invasion, our forces occupy Wallonia, their advance meeting little resistance after France’s humiliation in the Agadir crisis. Newspapers in Berlin speak of opportunity, while diplomats note London’s silence.\n\nThe government must decide whether occupation becomes annexation, administration, or withdrawal."
  ger_wallonia.2.d: "[GER.GetName] proclaims the annexation of Wallonia, presenting the move as essential for national security\n\nCelebrations erupt in some cities, while others greet the news with wary silence. Foreign correspondents note the muted reaction in Paris.\n\nAcross Europe, many conclude that France’s weakness has invited a new continental order."
  ger_wallonia.3.d: "Despite a successful invasion last fall, [GER.GetNameDef] unexpectedly withdraws from Wallonia, leaving the territory to French control. Officials frame the move as prudent statesmanship, though critics call it hesitation.\n\nForeign observers wonder whether the former aggressor seeks stability, or only prepares for a different contest yet to come."

  # weimar
  ger_weimar.1.d: "The democrats propose adjustments to the German constitution, arguing that the country must modernise its institutions to meet new political realities. Conservatives warn that such changes weaken authority and invite instability.\n\nThe deputees now debates whether limited reform strengthens the Empire or undermines its foundations."
  ger_weimar.2.d: "Following the proposed reforms, socialist deputies insist that the changes do guarantee workers’ rights as much as they should. They demand greater oversight and a more accountable government.\n\nTheir pressure stirs unease among traditionalists, raising questions about how much compromise Germany’s political system can withstand."

  ## TOOLTIPS:
  tt_iraqi_oil: "We will agree to exchange the rights to oil in §Y[291.GetName]§! for §O[FROM.GetAdjective] security guarantees§!.\n\n"