l_english:

  # algeria
  germany_algeria.1.d: "Skirmishes erupt along the Atlas Mountains, as German agents stoke unrest among local groups. Outposts are attacked, and French authority struggles to maintain control over distant provinces.\n\nRumors of foreign support embolden insurgents, making the situation increasingly precarious for colonial administrators."

  germany_algeria.2.d: "Algeria edges toward independence, aided by German advisers and funding. French forces face mounting pressure as local leaders assert their autonomy and German influence grows.\n\nThe war in North Africa is looming, and Germany watches closely for strategic opportunities."

  # atlantic
  germany_atlantic.1.d: "After months of grueling war at sea, the Kaiserliche Marine demands freedom to expand unrestricted submarine warfare against [ENG.GetNameDef]. Admirals argue that targeting merchant vessels will choke London’s lifeline.\n\nOthers warn such a step risks provoking neutral powers, particularly the United States, whose ships increasingly traverse dangerous waters."

  germany_atlantic.2.d: "News spreads that the ocean liner *Lusitania* has been sunk by a German submarine, with heavy loss of civilian life. Shock and outrage follow across the Atlantic.\n\nIn London and Washington alike, voices grow louder demanding retribution, threatening to push neutral powers closer to open conflict with Berlin."

  germany_atlantic.3.d: "German U-boats have struck deep into [ROOT.GetAdjective] commercial shipping, crippling trade routes and alarming investors. Entire fleets of merchant vessels now face sudden destruction at sea.\n\nPublic outrage mounts, with calls to respond decisively against [GER.GetNameDef]’s tactics — even if that means abandoning neutrality and declaring war outright."

  # east
  germany_east.1.d: "[GER.GetNameDefCap] has proclaimed sweeping ambitions in the East, seeking to take direct control over Poland and to establish an independent state for the Baltic Germans.\n\nThe announcement signals an effort to reshape the region, unsettling both neighbors and allies alike — and an invasion is expected to follow."

  # end
  germany_end.1.d: "As the war — assumed quick and swift — turns towards a complete disaster, opposition voices grow louder by the day.\n\nDeputies in the Reichstag demand an armistice, claiming the Fatherland bleeds for nothing while generals, incompetent and vain, still dream of victory."

  germany_end.2.d: "In the ports of Hamburg and Wilhelmshaven, communist agitators are active among the sailors. Flyers, flags, and makeshift weapons are circling around, as unrest spreads into the cities.\n\nCrowds gather in the streets, torn between fear and hope, as whispers spread that the war itself is coming apart."

  germany_end.3.d: "The mutiny has turned to open revolt. Sailors seize their ships and raise the red flag, calling workers to arms.\n\nAcross Germany, the sound of gunfire echoes beneath church bells — as the empire trembles on the edge of collapse."

  # harvest 1916
  germany_harvest.1.d: "Across Germany, reports from the countryside warn of a poor harvest. The war has drained labor and resources, and food shortages deepen by the week.\n\nOfficials debate whether to ease wartime restrictions — or to demand continued sacrifice in the name of victory."

  germany_harvest.2.d: "With food supply dwindling and hardship spreading, the government calls upon the nation to endure — until the victorious end. Propaganda urges calm and loyalty despite hunger.\n\nFor many, it is a test of faith in the cause; for others, a weary echo of endless struggle."

  # johannisthal
  germany_johannisthal.1.d: "Thousands gathered yesterday at Johannisthal to witness a daring air show. They looked on as the military airships, shining in the morning sun, showcased Germany’s growing mastery of the skies.\n\nThe spectacle inspires confidence, suggesting aviation will play a vital role in the nation’s future."

  # morocco
  germany_morocco.1.d: "Shipments of German rifles and artillery have reached Moroccan ports, accompanied by technical advisers and officers. Their arrival strengthens local forces and raises hopes for modernization.\n\nObservers see this cooperation as opportunity and a subtle challenge to colonial rivals."

  # oil
  germany_oil.1.d: "[GER.GetName] has proposed a trade agreement to access the Iraqi oil.\n\nIn exchange, they offer economic incentives and potential debt restructuring — an appealing offer for nations struggling to manage foreign creditors."

  germany_oil.2.d: "A deal has been struck: [GER.GetName] now holds exclusive access to oil extracted in Ottoman-held Iraqi territories.\n\nThe agreement has raised eyebrows across Europe, where fears of German economic penetration are growing."

  # tooltips
  tt_demobilize_economy: "Demobilizing our economy means §tcancelling the rationing regime§!, and §treverting to civilian economy§!. Also, we won't be able to mobilize for another §Y6 months§!."
