l_english:
  # airships
  germany_airships.1.d: "In a dazzling show of aerial might, airships of every shape and banner passed low over Johannisthal airfield today. Crowds cheered as crews saluted from gondolas, their great engines humming above the capital.\n\nFor a fleeting moment, the future of flight seemed both inevitable and elegant."

  germany_airships.2.d: "A small experimental glider unit, the Versuchs-Luftsegelstaffel, has been formed near Anklam under the direction of forward-thinking aviation officers.\n\nIntended for reconnaissance and light sabotage missions, the unit currently exercises with lightweight single-man gliders launched from airships. Though unconventional, the idea has drawn attention from military observers intrigued by its daring and stealth."

  # cotton
  germany_cotton.1.d: "In a bid to secure strategic resources for its burgeoning industry, [GER.GetNameDef] has formally requested access to Egyptian cotton, citing mutual benefit and regional stability.\n\nThe proposal arrives at a time of mounting financial strain for [TUR.GetNameDef], whose economic entanglements with European powers grow ever deeper. Acceptance may ease [TUR.capital.GetCapitalVictoryPointName]'s fiscal burdens — but not without ceding a measure of sovereignty."

  germany_cotton.2.d: "Germany has successfully negotiated access to Egyptian cotton, marking a diplomatic success for Berlin and a potential turning point for its wartime logistics.\n\nThough the agreement is framed as mutually advantageous, critics warn of increasing German influence over the [TUR.GetAdjective] commerce. For now, German manufacturers rejoice as fresh bales are readied for shipment."

  germany_cotton.3.d: "[TUR.GetNameDefCap] has declined Germany’s overtures for cotton rights, rebuffing what some in [TUR.GetNameDef], whose economic entanglements with European powers grow ever deeper. Acceptance may ease [TUR.capital.GetCapitalVictoryPointName] viewed as an overreach by a distant power.\n\nThe decision, while principled, may carry economic consequences for an already debt-laden state. In Berlin, the refusal is met with frustration and recalculated ambitions."

  # egypt
  germany_egypt.1.d: "German archaeologists have unearthed a remarkable discovery deep in the sands of Egypt — a well-preserved statue believed to be of the legendary Queen Nefertiti herself. The find has ignited excitement among Berlin’s scholarly circles and stirred nationalist pride.\n\nThis triumph offers an opportunity to showcase Germany’s cultural prestige on the world stage, but it also raises delicate questions about the rightful ownership and the ancient mysteries that may come with disturbing such relics."

  germany_egypt.2.d: "Shortly after the statue's arrival in Berlin, rumors of an ancient curse have begun to spread among the populace and diplomatic circles alike.\n\nWhispers tell of misfortune befalling those who disturbed the queen’s resting place, casting a shadow of superstition over what should have been a moment of triumph. Though skepticism remains, the unease threatens to unsettle political stability at home."

  # france
  germany_france.1.d: "In a bold diplomatic move, [GER.GetNameDef] has formally requested that we revoke our guarantees of French sovereignty.\n\nBerlin asserts that it seeks no quarrel with London, but views British commitments to Paris as an obstacle to lasting continental peace. The British Cabinet is now forced to weigh neutrality against honor, and interest against obligation."

  germany_france.2.d: "[ENG.GetNameDefCap] has acquiesced to the German request and withdrawn its guarantees to France, declaring itself a neutral party in continental disputes.\n\nThe announcement has sent shockwaves through European capitals, with Paris reeling and Berlin cautiously satisfied. Though war is yet distant, the diplomatic map has been unmistakably redrawn."

  germany_france.3.d: "[ENG.GetNameDefCap] has rejected the German request and reaffirmed its protective stance toward France.\n\nCiting historic ties and the need to preserve the balance of power, London has chosen to stand firm. Berlin’s gambit has failed — for now."

  # naval
  germany_naval.1.d: "In an unexpected act of diplomatic restraint, the German Empire has declared its intention to halt further naval expansion and ease tensions with [ENG.GetNameDef].\n\nBerlin affirms it harbors no enmity toward the British Empire and invites a spirit of mutual non-interference, particularly in matters of colonial policy. The declaration is seen as both a concession and a calculated bid for freedom of action abroad."

  germany_naval.2.d: "Germany’s declaration of naval restraint has been met with cautious optimism in London, where policymakers welcome the gesture as a step toward stability.\n\nThough no formal treaty has been signed, the announcement may cool tempers along the shipping lanes and shift attention to diplomatic accommodation in the colonial sphere. For now, Europe breathes a little easier."

  germany_naval.3.d: "London has issued no official response to our declaration of goodwill, and privately remains skeptical of Berlin’s motives.\n\nWithout reciprocal commitment, the arms race is likely to persist, and suspicions linger over the Reich’s true intentions in the colonies. The gesture, though sincere, appears to have fallen on guarded ears."

  # spartakus
  germany_spartakus.1.d: "German communists, emboldened by public unrest and military collapse, have launched an open uprising in major cities.\n\nLed by the Spartakus Alliance and backed by segments of the fleet and factory workers, they call for the overthrow of the old order and the creation of a socialist republic. Germany now faces a moment of reckoning — to embrace revolution or to crush it with steel."

  # south africa
  germany_south_africa.1.d: "[GER.GetNameDefCap] has made a bold demand for control over South African territories currently held by [ENG.GetNameDef]. The rich resources and strategic position make these lands highly coveted.\n\n[ENG.capital.GetCapitalVictoryPointName] must decide whether to cede these territories peacefully or prepare for conflict with a rising German power."

  germany_south_africa.2.d: "[ENG.GetNameDefCap] has agreed to transfer control of South African colonies to Germany, marking a significant shift in regional power.\n\nThis concession may ease tensions for now, but it sets a precedent that could reshape imperial boundaries across the globe."

  germany_south_africa.3.d: "[ENG.GetNameDefCap] has firmly rejected Germany’s demands for South African territories, unwilling to give up these valuable holdings.\n\nThis refusal risks escalating into open conflict as both empires assert their interests in Africa."

  # war supplies
  germany_war_supplies.1.d: "With the war dragging on and resources dwindling, industrialist Walther Rathenau has proposed a sweeping plan to centralize and rationalize the Empire’s material supply.\n\nCritics accuse him of alarmism, but others see in his vision the organization Germany sorely lacks. The question now is whether to empower a civilian technocrat — or rely on martial resolve alone."

  # wassmuss
  germany_wassmuss.1.d: "Wilhelm Wassmuss, Germany’s most enigmatic envoy, has landed on the shores of Khuzestan under a veil of discretion.\n\nArmed with charm, codebooks, and a curious sense of destiny, he begins weaving a web of influence among tribal leaders and anti-colonial forces. The stage is set for intrigue in the sands."

  germany_wassmuss.2.d: "Wassmuss has vanished into the rugged hills of southern Fars, where he now parley with the proud Qashqai tribes.\n\nGifts are offered, promises whispered — some speak of oil for rifles, others of ancient kinship between desert and Reich. Tehran watches nervously as this stranger gathers friends."

  germany_wassmuss.3.d: "Germany has secured access to Persian oil through backchannels and bold diplomacy, brokered in the wild hills by the mysterious Wassmuss.\n\nBerlin hails the deal as a triumph of statecraft; London sees only a gathering storm. The empire’s shadow stretches further east."

  germany_wassmuss.4.d: "One of Wassmuss's satchels has gone missing — and with it, a bundle of precious codebooks.\n\nBritish agents whisper of interception, while Berlin censors remain tight-lipped. The loss may compromise more than messages."

  germany_wassmuss.5.d: "A daring proposal arrives from Wassmuss in Teheran: he claims to have secured influence at the highest levels, and seeks permission to act.\n\nHis contacts promise alignment, but his methods remain opaque. The Foreign Office debates whether to empower the agent — or recall the risk."

  germany_wassmuss.6.d: "A veiled envoy has arrived in Teheran, bearing unexpected gifts and carefully worded offers of cooperation.\n\nWhile some in the court see opportunity, others see a trap. In the dark, [GER.GetNameDef] waits for word from its desert chessboard."

  germany_wassmuss.7.d: "In a quiet shift of allegiance, Teheran has embraced alignment with the German Empire — the work, it is whispered, of a lone diplomat in a desert cloak.\n\nGermany celebrates; [ENG.GetNameDef] fumes. In the bazaars, they speak of Wassmuss as more myth than man."

  germany_wassmuss.8.d: "The last sighting of Wilhelm Wassmuss was near a Teheran café, flanked by silent companions in tribal garb.\n\nWhether arrested, vanished, or vanished by design, none can say. What remains is legend — of the spy who walked the desert with empire in his pocket."

  # wheat
  germany_wheat.1.d: "Wheat prices have surged, and workers in Essen are no longer willing to endure empty tables and broken promises. Mass protests, led by trade unions and hungry families, have paralyzed the city’s industrial districts.\n\nTension simmers: either the army intervenes, or concessions must be made."

  germany_wheat.2.d: "What began as scattered incidents turned deadly in Hamburg after troops opened fire towards looters near one of the harbor granaries. Six were killed or injured, with photographs already circulating in communist newspapers.\n\nPublic trust in the government has taken a staggering blow."

  germany_wheat.3.d: "The ‘wheat unrest’ has stirred deeper discontent, and anti-government leaflets now speak not just of hunger, but of change. Strikes have multiplied across the country, especially in the Ruhr and Rhineland.\n\nPolitical figures are calling for society-wide stabilization — or a new economic direction altogether."

  germany_wheat.4.d: "A group of dissidents centered around journalist Kurt Eisner has established the Argonauten-Verein, declaring their intent to leave Germany behind in search of a freer, fairer life overseas.\n\nTheir departure is both a protest and a quiet scandal, especially among the press. Whether utopians or deserters, they capture the restless spirit of a nation adrift."

  germany_wheat.5.d: "In an unprecedented session of the Reichstag, opposition members questioned whether the monarchy still holds the people’s confidence. Though framed cautiously, the implication was clear — reform, or abdicate.\n\nOutside the chamber, demonstrators chant slogans that just months ago would have been unthinkable."
