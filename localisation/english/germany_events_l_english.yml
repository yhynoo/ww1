l_english:

  # algeria
  germany_algeria.1.d: "A remote French outpost in the Atlas Mountains has been overrun by armed insurgents.\n\nThough Paris blames local discontent, some suspect a foreign hand behind the operation — a troubling sign of unrest far from Europe’s front lines."

  germany_algeria.2.d: "Following weeks of violence and sabotage, open rebellion has erupted across Algeria.\n\nNationalist leaders have declared independence, sparking a colonial war with implications far beyond North Africa."

  # amarna
  germany_amarna.1.d: "A German archaeological team has unveiled a remarkable discovery at the site El-Amarna: the nearly intact bust of Nefertiti, the famous ancient queen, wife of the controversial king Akhenaten.\n\nThe expedition’s success is hailed as a cultural triumph for Berlin — and a soft-power victory abroad."

  # approack uk
  germany_approach_uk.1.d: "A German delegation has arrived in London proposing British neutrality in the event of a European conflict.\n\nAs part of their proposal, they’ve suggested the United Kingdom withdraw its guarantees to France, framing the move as one of peace rather than provocation. In exchange, the offer to tone down the Tirpitz plan: the expansion of their navy which has threatened our naval dominance for years."

  germany_approach_uk.2.d: "In a surprising move, [ENG.GetName] has officially withdrawn its guarantees to [FRA.GetName].\n\nWhile the British government claims neutrality, many suspect that Berlin’s quiet diplomacy has borne fruit."

  # atlantic
  germany_atlantic.1.d: "After months of grueling war at sea, the Kaiserliche Marine demands freedom to expand unrestricted submarine warfare against [ENG.GetNameDef]. Admirals argue that targeting merchant vessels will choke London’s lifeline.\n\nOthers warn such a step risks provoking neutral powers, particularly the United States, whose ships increasingly traverse dangerous waters."

  germany_atlantic.2.d: "News spreads that the ocean liner *Lusitania* has been sunk by a German submarine, with heavy loss of civilian life. Shock and outrage follow across the Atlantic.\n\nIn London and Washington alike, voices grow louder demanding retribution, threatening to push neutral powers closer to open conflict with Berlin."

  germany_atlantic.3.d: "German U-boats have struck deep into [ROOT.GetAdjective] commercial shipping, crippling trade routes and alarming investors. Entire fleets of merchant vessels now face sudden destruction at sea.\n\nPublic outrage mounts, with calls to respond decisively against Berlin’s tactics — even if that means abandoning neutrality and declaring war outright."

  # cotton
  germany_cotton.1.d: "[GER.GetName] has proposed a trade agreement to access cotton grown in Egypt.\n\nIn exchange, they offer economic incentives and potential debt restructuring — an appealing offer for nations struggling to manage foreign creditors."

  germany_cotton.2.d: "A deal has been struck: [GER.GetName] now holds exclusive access to cotton harvested in Egypt.\n\nThe agreement has raised eyebrows across Europe, where fears of German economic penetration are growing."

  # east
  germany_east.1.d: "Reports from Riga, Libau, and Tallinn describe rising tensions among the German landowning and industrial elite. They petition local authorities, organize boycotts, and challenge imperial directives.\n\nBerlin quietly supports these efforts, hoping elite unrest will weaken Russian control and advance German influence in the region."

  germany_east.2.d: "A delegation from Tallinn has arrived in Petrograd, demanding recognition of German autonomy on the Baltic coast. They claim continued unrest is inevitable unless their demands are met.\n\nWhile moderates urge negotiation, hardliners argue that any concession would embolden separatists and undermine the unity of [SOV.GetNameDef] in wartime."

  germany_east.3.d: "With imperial consent, [UBD.GetNameDef] has been proclaimed on the Baltic coast. Nationalists celebrate what they call liberation, while German agents whisper of greater ambitions.\n\nThough the new state’s survival is uncertain, its birth marks a serious blow to Russia’s authority in the region."

  # johannisthal
  germany_johannisthal.1.d: "During a test flight near Johannisthal airfield, an airship caught fire and crashed, killing all of its crew. The accident has horrified the onlookers and cast doubt on the future of Germany’s ambitious air program.\n\nWhile officials stress technical progress, critics warn that reckless experimentation risks lives, resources, and national prestige."

  # trotha
  germany_trotha.1.d: "The Krolloper trial of General von Trotha has begun. Monarchists hail him as a patriot who did what was necessary, while critics denounce the massacres committed under his command.\n\nThe court proceedings have ignited fierce debate over Germany’s colonial past and its moral responsibility."

  germany_trotha.2.d: "As the Krolloper trial reaches its conclusion, Ehrhardt’s supporters rally outside, chanting for imperial honor and denouncing critics as traitors.\n\nThough the verdict is still pending, the spectacle has already shaken Berlin, exposing dangerous fractures within the country’s political fabric."
