l_english:
  POL_army: "Army"
  POL_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  POL_army_maneuvers: "Army Maneuvers"
  POL_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  POL_conscription: "Announce Mobilization"
  POL_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  POL_equipment_effort: "Equipment Effort"
  POL_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  POL_support_companies: "Support Companies"
  POL_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  POL_artillery: "Artillery"
  POL_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  POL_armor: "Armor"
  POL_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  POL_industrial_warfare: "Industrial Warfare"
  POL_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  POL_airfields: "Airfields"
  POL_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  POL_air_training: "Air Training"
  POL_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  POL_aerostats: "Aerostats"
  POL_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  POL_aces: "Learn from the Aces"
  POL_aces_desc: ""

  POL_ground_support: "Ground Support"
  POL_ground_support_desc: ""

  POL_air_doctrine: "Air Doctrine"
  POL_air_doctrine_desc: ""

  POL_expand_dockyards: "Expand Dockyards"
  POL_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  POL_shallow_waters: "Shallow Waters"
  POL_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  POL_high_seas: "High Seas"
  POL_high_seas_desc: "Extend our operational reach beyond coastal waters."

  POL_rule_the_waves: "Rule the Waves"
  POL_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  POL_the_dark_deep: "The Dark Deep"
  POL_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  POL_coastal_defense: "Coastal Defense"
  POL_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  POL_rationing: "Rationing"
  POL_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  POL_infrastructure_effort: "Infrastructure Effort"
  POL_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  POL_fuel: "Fuel Production"
  POL_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  POL_women_at_work: "Women at Work"
  POL_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  POL_construct_civilian: "Industrial Expansion"
  POL_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  POL_expand_mining: "Mining Operations"
  POL_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  POL_efficiency_studies: "Efficiency Studies"
  POL_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  POL_war_industry: "War Industry"
  POL_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  POL_telegraph: "Telegraph Network"
  POL_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  POL_political_ambitions: "Political Ambitions"
  POL_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  POL_international_affairs: "International Affairs"
  POL_international_affairs_desc: "Engage in diplomacy to secure national interests."

  POL_expansionism: "Expansionism"
  POL_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  POL_deterrence: "Assembling the Lands"
  POL_deterrence_desc: ""

  POL_seek_alliances: "Seek Alliances"
