l_english:

  # communism
  communism: "Communists"
  communism_noun: "Communism"
  communism_desc: "Communist State"

  agrarianism: "Agrarianism"
  agrarianism_desc: "§HAgrarianism§! is a rural-based socialist movement focused on land reform, peasant rights, and opposition to industrial exploitation by landowning elites."

  vanguardism: "Vanguardism"
  vanguardism_desc: "In §HVanguardism§!, a disciplined party leads the working class towards communism through strict organization and centralized power."

  anarchism: "Anarchism"
  anarchism_desc: "§HAnarchism§! proposes a decentralized system rejecting hierarchical rule, favoring local councils, voluntary cooperation, and freedom from centralized authority."

  # democracy
  democratic: "Democrats"
  democratic_noun: "Democracy"
  democratic_desc: "Democratic State"

  conservatism: "Conservatism"
  conservatism_desc: "§HConservatism§! is a democratic ideology rooted in tradition, gradual reform, and maintaining national unity under stable parliamentary governance."

  liberalism: "Liberalism"
  liberalism_desc: "§HLiberalism§! is an ideology based on civil liberties, free markets, and pluralism, promoting individual rights and representative government."

  # monarchy
  monarchism: "Monarchists"
  monarchism_noun: "Monarchism"
  monarchism_desc: "Monarchy"

  absolutism: "Absolutism"
  absolutism_desc: "In §HAbsolutism§!, the monarch wields unchecked power, claiming divine right or historic legitimacy to rule without constitutional limitations."

  constitutional_monarchy: "Constitutional Monarchy"
  constitutional_monarchy_desc: "Under §HConstitutional Monarchy§!, the ruler shares power with an elected parliament, balancing royal tradition with modern representative governance."
