l_english:
  HOL_dutch_neutrality: "The Question of Neutrality"

  HOL_GER_alignment: "Alignment with [GER.GetNameDef]"
  HOL_ENG_alignment: "Alignment with [ENG.GetNameDef]"

  # levels
  HOL_very_GER: "Open Cooperation with Germany"
  HOL_slightly_GER: "Limited Cooperation with Germany"
  HOL_neutral: "Neutrality"
  HOL_slightly_ENG: "Limited Cooperation with the UK"
  HOL_very_ENG: "Open Cooperation with the UK"

  # ideas
  idea_trade_alignment_england: "Trade Alignment with [ENG.GetNameDef]"
  idea_trade_alignment_germany: "Trade Alignment with [GER.GetNameDef]"
  idea_unlimited_grain_imports: "Grain Imports Through [HOL.GetNameDef]"

  # decisions
  allow_unlimited_grain_trade: "Allow Grain Imports to [GER.GetNameDef]"
  allow_unlimited_grain_trade_desc: "Allowing unrestricted grain exports to Germany will ease tensions on our western border and help our economy, though it will certainly lead to accusations from the Entente."

  invite_german_entrepreneurs: "Invite German Entrepreneurs"
  invite_german_entrepreneurs_desc: "Encourage German industrialists to invest in Dutch enterprises, strengthening our economy but tightening their economic influence over our markets."

  declare_impartiality: "Declare Impartiality"
  declare_impartiality_desc: "Declare our neutrality in the ongoing conflict, and emphasize our commitment to peace and sovereignty."

  impound_german_assets: "Impound German Assets"
  impound_german_assets_desc: "In response to mounting pressure from the Entente, we will seize German holdings within the Netherlands to demonstrate our independence — at the cost of straining relations with Berlin."

  inspect_international_trade_ventures: "Inspect International Trade Companies"
  inspect_international_trade_ventures_desc: "Tighten oversight over international trade firms to reassure the Entente that Dutch neutrality is not a cover for German supply networks, preserving access to Allied markets and goodwill."

  # events
  _dutch_neutrality.1.d: "As the great powers of Europe descend into war, voices in The Hague grow divided.\n\nSome urge the defense of strict neutrality to safeguard the kingdom’s peace and trade, while others whisper that neutrality is but an illusion when the guns are so near."

  _dutch_neutrality.2.d: "The Dutch merchant fleet, still operating under a flag of neutrality, remains a vital link between Europe and the wider world.\n\nIn London, ministers debate whether these ships might be requisitioned in response to their lenient treatment of German trade — a decision sure to anger The Hague."

  _dutch_neutrality.3.d: "News spreads quickly through Amsterdam’s harbors — British authorities have seized Dutch vessels, claiming they were aiding the enemy.\n\nOutrage follows, and calls for defending the nation’s honor grow louder than before."

  _dutch_neutrality.4.d: "Dutch neutrality has grown suspect, their trade routes serving Berlin as much as London.\n\nSome in Westminster now urge the government to demand control over the East Indies, lest their precious resources — oil and rubber — feed the enemy’s war machine."

  _dutch_neutrality.5.d: "Berlin grows impatient with The Hague’s sympathies toward the Entente.\n\nA proposal is raised: we shall demand that the Dutch government abandon its pretense of neutrality and surrender its sovereignty to us — or face the threat of invasion."

  _dutch_neutrality.6.d: "The Dutch authorities have lifted restrictions on food exports to Germany, allowing vital grain and livestock to cross the border.\n\nNeutrality, it seems, bends ever closer toward one side — to the growing alarm of the Allies."

