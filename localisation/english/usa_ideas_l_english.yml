l_english:

  idea_isolationist_society: "Isolationist Society"
  idea_isolationist_society_desc: "Shaped by decades of non-interventionism, the public remains wary of foreign entanglements — and deeply resistant to joining distant conflicts."

  idea_influence_in_central_america: "Influence in Central America"
  idea_influence_in_central_america_desc: "Through commerce, diplomacy, and force, the United States exerts decisive influence over Central America. This sphere of control, born of the Monroe Doctrine, safeguards our interests — but breeds resentment among those who see only exploitation."

  idea_lusitania: "The Sinking of Lusitania"
  idea_lusitania_desc: "The tragic sinking of the Lusitania by a German submarine has shocked the nation. Though many still call for peace, outrage is growing — and the clamor for justice grows louder by the day."

  idea_labor_unrest: "Labor Unrest"
  idea_labor_unrest_desc: "Strikes, protests, and industrial sabotage shake the foundations of American industry. The working class demands fair wages and humane conditions, while employers and authorities respond with suspicion and force. The nation stands divided between labor and capital."

  idea_crosses_alight: "Crosses Alight"
  idea_crosses_alight_desc: "A dark resurgence of nativism and racial terror spreads through the heartland. The Ku Klux Klan rises once more, cloaked in patriotism but fueled by fear, dividing communities and undermining national unity."

  # focus tree
  idea_four_minute_men: "Four-Minute Men"
  idea_four_minute_men_desc: "A corps of volunteer speakers, the 'Four-Minute Men' deliver brief patriotic addresses across the country, rallying public opinion behind the war effort and promoting civic duty in every town and city."
  
  idea_arsenal_of_liberty: "Arsenal of Liberty"
  idea_arsenal_of_liberty_desc: "American industry stands ready to arm democracy. From rifles to battleships, our factories become the beating heart of freedom’s defense, sustaining both our allies and our ideals."

  idea_anti_trust_laws: "Anti-Trust Laws"
  idea_anti_trust_laws_desc: "Through rigorous enforcement of anti-trust legislation, the government seeks to curb the excesses of monopolies and protect fair competition — though industrialists warn it may slow wartime mobilization."

  
