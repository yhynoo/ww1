l_english:
  USA_army: "Army"
  USA_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  USA_army_maneuvers: "Army Maneuvers"
  USA_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  USA_conscription: "Announce Mobilization"
