l_english:
  SER_army: "Army"
  SER_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  SER_army_maneuvers: "Army Maneuvers"
  SER_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  SER_conscription: "Announce Mobilization"
  SER_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

