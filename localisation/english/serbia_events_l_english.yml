l_english:

  ## -- SERBIA
  # agrarianists
  ser_agrarianists.1.d: "Leaders of the agrarian movement arrive in the capital with petitions and statistics: bad roads, empty markets, land exhausted by neglect.\n\nThey demand state investment in the countryside, arguing that Serbia’s strength lies in its fields rather than in speeches."

  # avijatika
  ser_avijatika.1.d: "Near Niš, a rough field has been marked out for a new air corps. Mechanics tinker with fragile machines brought from France, while curious villagers watch them lift into the sky.\n\nOfficers boast that Serbia now has its own air force to guard the homeland."

  # aristocrats
  ser_aristocrats.1.d: "Whispers run across the aristocrats’ clubs across the country. Although the King is still popular among the masses, his liberal worldview is contested among the conservatives.\n\nAs days go by, it is more and more apparent that a movement is growing in the shadowy corridors, aiming to restore what was lost in 1903."
  ser_aristocrats.2.d: "Dragutin Dimitrijević, the head of army intelligence, has been killed in a uncertain circumstances. Silence surrounds the event, with some calling it justice for his involvement in the 1903 coup.\n\nIt seems that the Karađorđević dynasty’s grip on Serbia is loosening day by day."
  ser_aristocrats.3.d: "After a series of murky events in Serbia, a new king ascends to their throne. Observers call him an Austrophile while the world watches how old international arrangements are quietly cast aside.\n\nAlthough the path Serbia will now take is still unknown, the chessboard of southeastern Europe is alive again."

  # drina
  ser_drina.1.d: "Reports reach the government of shadowy operations across the Drina: pamphlets, money, and weapons trickling into Austro-Hungarian lands.\n\nSome ministers warn that such games might invite catastrophe; others insist that national duty demands risks."
  ser_drina.2.d: "In Mostar, Austro-Hungarian authorities claim to have uncovered a Serbian spy network, complete with weapons caches and secret couriers.\n\nNewspapers thunder about Belgrade’s intrigues, and some in Vienna mutter that patience has nearly run out."

  # albania
  ser_albania.1.d: "Serbian troops now march openly under the national flag in the lands once claimed as Albania. Maps are redrawn, and officials begin speaking of ‘historic frontiers’ restored.\n\nSupporters celebrate, while critics warn that new subjects bring new troubles."

  # yugoslavia
  ser_yugoslavia.1.d: "A new state called Yugoslavia has been proclaimed, uniting Serbs, Croats, Slovenes and others under a single crown and flag.\n\nTo some it is the fulfillment of a long dream; to others, a fragile experiment in holding many peoples together as one."
