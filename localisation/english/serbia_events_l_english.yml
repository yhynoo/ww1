l_english:

  # austria
  ser_austria.1.d: "In Vienna’s war offices, General Conrad von Hötzendorf speaks of Serbia with near-obsessive fervor. Again and again he urges a final reckoning, claiming the monarchy’s survival demands it.\n\nHis constant calls for war turn ‘Serbien muß sterbien’ into a chilling personal mantra."

  # intervention
  ser_intervention.1.d: "In Serbia, an uprising rages against Ottoman rule, the countryside aflame and villages filled with partisans. Some Russian ministers argue that Slavs cannot be abandoned; others fear provoking a wider war.\n\nGifts of rifles and ammunition might tip the balance — and bind Serbia’s gratitude."

  # war
  ser_war.1.d: "With Austria-Hungary locked in a struggle against Russia, some Serbian officers insist that history offers a narrow window for revenge. Maps of Bosnia and the Drina crossings cover war room tables.\n\nYet wiser heads warn that one misstep could doom the young country entirely."

  ser_war.2.d: "Reports from the front speak of the Serbian king walking the muddy trenches, sharing hardship with the soldiers. He eats their rations, listens to their grumbling, and stands under enemy fire.\n\nSuch gestures kindle fierce devotion — and expectations of equal sacrifice from all."
