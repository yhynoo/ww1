l_english:
  # albania
  serbia_albanians.1.d: "In Kosovo and the western mountains, Albanian leaders have gathered, demanding autonomy and recognition of their language and faith.\n\nTo us, these lands are sacred soil; yet, to the Albanians, they are home long before Serbia’s banners ever flew here."

  serbia_albanians.2.d: "Last night, an old church near Mitrovica was found in flames. By dawn, rumors spread faster than the fire — that it was arson, that it was revenge, that it was staged.\n\nThe government now fears what such a spark might yet ignite in the future."

  # king
  serbia_king.1.d: "King Petar I has visited the our troops on the line today, walking among the trenches and speaking with the men as an equal.\n\nHis frail figure and calm words remind the soldiers what they are fighting for — not glory, but the endurance of Serbia itself."
