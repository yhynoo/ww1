l_english:
  ## -- AUSTRIA-HUNGARY

  # archduke
  aus_archduke.1.d: "News races along telegraph wires and railway lines: Archduke Franz Ferdinand has been assassinated during a visit to Sarajevo.\n\nAcross the continent, chancelleries fall tense and quiet. Many sense that this crime, born of Slavic intrigue, may soon draw in powers far beyond southeastern Europe."

  # karl
  aus_karl.1.d: "The long reign of Emperor Franz Joseph draws to its close, and a new monarch ascends the throne: Karl I. Church bells toll, flags hang at half-mast and then rise again in imperial colours.\n\nSome hope that fresh hands might yet steady the faltering Dual Monarchy; others suspect that not even a young emperor can mend an ageing empire."

  # oil
  aus_oil.1.d: "Envoys from abroad arrive with polite smiles and very precise proposals: access to the oil fields in exchange for guarantees and friendship.\n\nSome in Vienna see this as a prudent bargain, trading a distant resource for much-needed security. Others warn that once foreign interests take root, reclaiming control may prove impossible."
  aus_oil.2.d: "A deal has been struck in Vienna: Concessions in the oil fields of Romania are granted, and in return, solemn promises of protection are signed and sealed.\n\nTo optimists, this is a masterstroke of diplomacy; to skeptics, a sign that the empire’s fate is increasingly tied to forces beyond its borders."

  # treason in evidenzbureau
  aus_treason.1.d: "Whispers have begun to circulate through Vienna’s cafés and corridors of power: something is rotten inside the Evidenzbureau. Files gone missing, coded messages intercepted, and a few too many coincidences for comfort.\n\nSome demand arrests and public trials; others insist that a quiet cover-up would better preserve the prestige of the Austria’s intelligence service."
  aus_treason.2.d: "The scandal can no longer be contained. Newspapers report that high-ranking officers have betrayed secrets to foreign powers, their names spoken in shocked tones from Prague to Trieste.\n\nEvery rumour erodes trust a little further: in the army, in the ministries, and in the fragile unity of the country itself."

  # unrest
  aus_unrest.1.d: "Reports from the Slavic provinces speak of unruly regiments, discontented students, and priests preaching loyalty with ever less conviction. Pamphlets circulate that praise neighbours and condemn Vienna.\n\nThe government senses that what was once mere grumbling is hardening into something more dangerous — a quiet refusal to believe in the empire’s future."
  aus_unrest.2.d: "From the Tarnopol garrison come troubling dispatches: soldiers slipping away in the night, units reluctant to march, officers unsure whom they can trust.\n\nEach desertion is a small act, but together they suggest an army whose loyalties are fraying along the empire’s oldest fault lines."
  aus_unrest.3.d: "While travelling in Sarajevo, Archduke Franz Ferdinand has been struck down by an assassin’s bullet. Crowds gather in stunned silence as warlike announcements are posted on city walls.\n\nIn Vienna, shock quickly gives way to rage. Some demand that Serbia be crushed at once; others, more cautious, fear that a single gunshot could set all of Europe ablaze."
