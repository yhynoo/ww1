l_english:

  # ausgleich
  austria_ausgleich.1.d: "After Vienna announced the ‘United States of Greater Austria’, the Hungarian aristocracy has issued an ultimatum: maintain their special status or go to war.\n\nWith the ‘Universal Ausgleich’ collapsing, Austria now stands at a crossroads between humiliating retreat and a war that could tear the monarchy apart."

  # emperor
  austria_emperor.1.d: "Following the death of Emperor Franz Joseph, Archduke Karl has ascended to the throne as Emperor Karl I of Austria.\n\nHis youth and reformist reputation mark a new chapter for the empire — one that may steer away from the cautious conservatism of the old guard."

  # end
  austria_end.1.d: "Tensions within [AUS.GetNameDef] have boiled over: Hungary has declared independence. Vienna faces the collapse of centuries-old arrangements as Budapest asserts full control over its territory.\n\nThe Kaiser’s advisors scramble to respond, weighing surrender, negotiation, or a desperate attempt to maintain unity."

  austria_end.2.d: "Polish administrators move to take control of Galicia-Lodomeria, prompting a dilemma in Vienna. Officials must decide whether to accept the transfer or contest it with force.\n\nThe decision carries high stakes: conceding may stabilize the region, but resisting risks a new conflict at Austria’s eastern border."

  austria_end.3.d: "Reports confirm that Austrian forces are withdrawing from Galicia-Lodomeria. Polish administrators now oversee governance, marking a significant shift in Central European borders.\n\nObservers note this as both a triumph for Polish nationalists and a clear sign of Austria’s waning influence in its eastern territories."

  # france
  austria_france.1.d: "In a surprising turn, Austrian diplomats have extended an offer of mutual defense to Paris. Such an agreement would mark a new chapter between the two historic rivals.\n\nSome hope this pact could stabilize Central Europe — others see hidden ambitions."

  austria_france.2.d: "France has accepted Austria’s proposal for a defensive agreement, committing both nations to stand together if threatened.\n\nThough framed as a gesture of stability, the pact alters Europe’s fragile balance — unsettling neighbors who fear shifting loyalties in the heart of the continent."

  # integration
  austria_integration.1.d: "Once a proud outpost of the Ottoman world, Sarajevo still breathes the air of mosques and Orthodox churches. Now, Vienna moves to draw it fully into the Hungarian half of the monarchy.\n\nTo administrators, this is order. To the city’s Muslims and Slavs though, a reminder that the empire’s reach extends deeper than its understanding of the people it governs."

  austria_integration.2.d: "Austria-Hungary has announced the integration of Sarajevo under Hungarian administration, extending imperial order over a city steeped in Ottoman memory and Slavic identity.\n\nAcross Europe, the move is seen as both routine and reckless: routine in Vienna’s quest for efficiency, reckless in a region where faith and allegiance still smolder beneath every stone façade."

  # serbia
  austria_serbia.1.d: "Among Vienna’s general staff, talk grows ever darker. To some, the South Slavic minorities are the most dangerous threat to the empire’s fragile order.\n\nField Marshal Hötzendorf repeats his grim refrain — ‘Serbien muss sterbien’ — and now, with Serbia independent, few dare to contradict him."

  # sudetenland
  austria_sudetenland.1.d: "Our informators from Vienna claim that ethnic Germans in the Sudetenland face growing unrest and reprisals as Austria struggles with war against Hungary.\n\nSome demand intervention to protect our kin, while others warn that such action could ignite a broader conflict."

  austria_sudetenland.2.d: "German troops have entered the Sudetenland, taking control of the region with ease. Crowds in German towns celebrate the move as a triumph of unity and protection.\n\nIn Vienna, officials protest the annexation, accusing Berlin of exploiting Austria’s weakness during its war in the east."

  # ukraine
  austria_ukraine.1.d: "Trains arrive from the west laden with rifles, engineers, and the quiet precision of Austrian order.\n\nTo some, it is a lifeline; to others, a reminder that every gift carries a price, and that Vienna’s generosity seldom comes without strings."
