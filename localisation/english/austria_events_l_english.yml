l_english:
## -- AUSTRIA-HUNGARY
  # annexations
  aus_annexation.1.d: "Today, [AUS.GetName] has formally annexed Sarajevo. In cafés and chanceries, diplomats argue whether this is a mere technicality or a bold challenge to the old order.\n\nIn Constantinople, the move stirs quiet anger, as statesmen weigh how far they dare go in response."

  # archduke
  aus_archduke.1.d: "The assassination of Archduke Franz Ferdinand in Lemberg has stunned Europe. Newspapers print grim sketches of the attack and speculate endlessly about its conspirators.\n\nMany fear that this murder will not remain a local affair, but rather serve as a spark in a region already drenched in powder."

  # emperor
  aus_emperor.1.d: "The long reign of Emperor Franz Joseph has come to its solemn close, and Karl I now ascends the throne of the Habsburg lands. Bells toll, black crepe hangs from public buildings, and prayers are offered for the old monarch’s soul.\n\nThe new emperor inherits an empire strained by nationalism, war scares, and social change — and must decide whether to cling to tradition or attempt cautious reform."

  # evidenzbureau
  aus_evidenzbureau.1.d: "Rumors circulate through Vienna’s corridors of power: sensitive files missing, coded messages intercepted, and whispers that the Evidenzbureau itself has been infiltrated.\n\nIf spies are hiding among the officers, it would mean not just betrayal of secrets, but betrayal at the very heart of the empire’s intelligence service."
  aus_evidenzbureau.2.d: "A scandal has erupted: senior officers linked to foreign intelligence, their loyalties called sharply into question. Newspapers hint at treason in the highest ranks.\n\nPublic confidence in the army’s leadership wavers, and the government struggles to balance punishment, discretion, and the empire’s already fragile unity."

  # galicia
  aus_galicia.1.d: "Reports from Galicia tell of unrest, sabotage, and whispered agitation. Anonymous pamphlets circulate in towns and villages, hinting at foreign agents stirring trouble.\n\nOfficials suspect the Okhrana’s hand, yet proof is elusive. For now, the province smolders in discontent beneath a veneer of order."
  aus_galicia.2.d: "The garrison at Tarnopol has reported a worrying number of desertions. Men slip away at night, vanishing into forests and villages along the frontier.\n\nOfficers speak of fraying loyalty, of soldiers torn between imperial duty and local ties — and of enemies eager to exploit the rift."
  aus_galicia.3.d: "Shocking news from Lemberg: Archduke Franz Ferdinand has been assassinated during an official visit. Shots rang out in the street, and within moments, the future of the dynasty was irrevocably altered.\n\nGrief and fury sweep the empire, while diplomats across Europe brace for the consequences of this single, fatal act."

  # oil
  tt_romanian_oil: "We will agree to exchange the rights to oil in §Y[46.GetName]§! for §O[FROM.GetAdjective] security guarantees§!."