l_english:

  # ausgleich
  austria_ausgleich.1.d: "Debate has erupted in Vienna over whether to revise the terms of the Ausgleich — the dual monarchy's foundational treaty. Hungarian officials are demanding greater autonomy and economic concessions.\n\nSome in the imperial court view these demands as blackmail, while others urge compromise to preserve unity in an increasingly fragile empire."

  austria_ausgleich.2.d: "Reports from Budapest suggest that radical elements within Hungary are actively undermining imperial policy. Strikes, railway disruptions, and anonymous pamphlets call for open defiance of Vienna’s authority.\n\nThe government now suspects a campaign of coordinated sabotage, raising tensions across the realm."

  # emperor
  austria_emperor.1.d: "Following the death of Emperor Franz Joseph, Archduke Karl has ascended to the throne as Emperor Karl I of Austria.\n\nHis youth and reformist reputation mark a new chapter for the empire — one that may steer away from the cautious conservatism of the old guard."

  # sicily
  austria_sicily.1.d: "A sudden uprising in [TTS.GetNameDef] has driven out Italian loyalists, with reports of Austrian agents supporting the revolt from behind the scenes.\n\nAustria has moved quickly to guarantee the fledgling regime, prompting a sharp escalation and plunging Europe into yet another regional war."

  # ukraine
  austria_ukraine.1.d: "With Kyiv firmly under its control, [AUS.GetNameDef] has declared the formation of an independent Ukrainian state, backed and overseen by Vienna.\n\nThe move is hailed as liberation by some and manipulation by others — but it firmly extends [AUS.GetAdjective] influence deep into the East."
