l_english:

  # anschluss
  austria_anschluss.1.d: "Voices from Austria’s German-speaking population have begun openly calling for Anschluss with Berlin. Such demands echo the rhetoric of German chauvinists, unsettling Vienna’s fragile balance of nationalities.\n\nWhat some hail as destiny, others denounce as betrayal — not renewal, but the prelude to imperial disintegration."

  # ausgleich
  austria_ausgleich.1.d: "Vienna has announced a reform which it calls the ‘United States of Greater Austria’ or ‘The Universal Compromise,’ abolishing Hungary’s special status and unifying the monarchy under a single parliament.\n\nProponents hail it as the dawn of a fairer, more equal state for all nationalities, though skeptics fear the lofty promise will quickly clash with reality."

  austria_ausgleich.2.d: "Outraged by Vienna’s push to centralize authority, the Hungarian aristocracy has issued an ultimatum: restore their privileges or face open conflict.\n\nWith the ‘Last Ausgleich’ collapsing, Austria now stands at a crossroads between humiliating retreat and a war that could tear the monarchy apart."

  # emperor
  austria_emperor.1.d: "Following the death of Emperor Franz Joseph, Archduke Karl has ascended to the throne as Emperor Karl I of Austria.\n\nHis youth and reformist reputation mark a new chapter for the empire — one that may steer away from the cautious conservatism of the old guard."

  # france
  austria_france.1.d: "In a surprising turn, Austrian diplomats have extended an offer of mutual defense to Paris. Such an agreement would mark a new chapter between the two historic rivals.\n\nSome hope this pact could stabilize Central Europe — others see hidden ambitions."

  austria_france.2.d: "France has accepted Austria’s proposal for a defensive agreement, committing both nations to stand together if threatened.\n\nThough framed as a gesture of stability, the pact alters Europe’s fragile balance — unsettling neighbors who fear shifting loyalties in the heart of the continent."

  # ukraine
  austria_ukraine.1.d: "Austrian officials have issued statements in favor of Ukrainian national aspirations, drawing attention across Europe. While framed as moral support, the announcement carries clear political weight.\n\nSome suspect Vienna seeks leverage against Russia — others see only empty words."

  austria_ukraine.2.d: "A wave of arson attacks has struck Yekaterinoslav, with granaries and landlords' estates set ablaze overnight.\n\nPeasant delegates demand radical reforms, while the army is placed on alert for further outbreaks of violence."

  austria_ukraine.3.d: "Open rebellion has erupted across the Ukrainian steppe as various militias proclaim independence from the empire.\n\nLocal troops declare allegiance to neither Tsar nor foreign powers, raising the specter of full-scale war to restore order in the region."

