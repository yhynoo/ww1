l_english:
  JAP_army: "Army"
  JAP_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  JAP_army_maneuvers: "Army Maneuvers"
  JAP_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  JAP_conscription: "Announce Mobilization"
  JAP_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  JAP_equipment_effort: "Equipment Effort"
  JAP_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  JAP_support_companies: "Support Companies"
  JAP_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  JAP_artillery: "Artillery"
  JAP_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  JAP_armor: "Armor"
  JAP_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  JAP_industrial_warfare: "Industrial Warfare"
  JAP_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  JAP_airfields: "Airfields"
  JAP_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  JAP_air_training: "Air Training"
  JAP_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  JAP_aerostats: "Aerostats"
  JAP_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  JAP_aces: "Learn from the Aces"
  JAP_aces_desc: ""

  JAP_ground_support: "Ground Support"
  JAP_ground_support_desc: ""

  JAP_air_doctrine: "Air Doctrine"
  JAP_air_doctrine_desc: ""

  JAP_expand_dockyards: "Expand Dockyards"
  JAP_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  JAP_shallow_waters: "Shallow Waters"
  JAP_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  JAP_high_seas: "High Seas"
  JAP_high_seas_desc: "Extend our operational reach beyond coastal waters."

  JAP_rule_the_waves: "Rule the Waves"
  JAP_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  JAP_the_dark_deep: "The Dark Deep"
  JAP_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  JAP_coastal_defense: "Coastal Defense"
  JAP_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  JAP_rationing: "Rationing"
  JAP_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  JAP_infrastructure_effort: "Infrastructure Effort"
  JAP_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  JAP_fuel: "Fuel Production"
  JAP_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  JAP_women_at_work: "Women at Work"
  JAP_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  JAP_construct_civilian: "Industrial Expansion"
  JAP_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  JAP_expand_mining: "Mining Operations"
  JAP_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  JAP_efficiency_studies: "Efficiency Studies"
  JAP_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  JAP_war_industry: "War Industry"
  JAP_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  JAP_telegraph: "Telegraph Network"
  JAP_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  JAP_political_ambitions: "Political Ambitions"
  JAP_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  JAP_international_affairs: "International Affairs"
  JAP_international_affairs_desc: "Engage in diplomacy to secure national interests."

  JAP_expansionism: "Expansionism"
  JAP_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  JAP_deterrence: "The Area of Security"
  JAP_deterrence_desc: ""

  JAP_seek_alliances: "Seek Alliances"
  JAP_seek_alliances_desc: "Form strategic partnerships to ensure national security."

  JAP_on_our_own: "On Our Own"
  JAP_on_our_own_desc: ""

  JAP_traditionalism: "Triumph in Korea"
  JAP_traditionalism_desc: ""

  JAP_public_support: "Support the War Effort"
  JAP_public_support_desc: "Ensure the backing of the people for government policies."

  JAP_mobilize_the_masses: "Economic Expansionism"
  JAP_mobilize_the_masses_desc: ""

  JAP_strength_in_unity: "Strength in Unity"
  JAP_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  JAP_the_everlasting_spirit: "Tennō Heika Banzai!"
  JAP_the_everlasting_spirit_desc: ""

  JAP_adjust_the_government: "Uphold the Compromise"
  JAP_adjust_the_government_desc: ""

  JAP_open_the_economy: "The Legacy of Meiji"
  JAP_open_the_economy_desc: ""

  JAP_state_reform: "State Reform"
