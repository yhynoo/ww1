l_english:
  colombia_americans.1.d: "American companies hold investments across Central America, extracting resources and influencing politics. Our governmant works on their expulsion, claiming foreign dominance undermines sovereignty.\n\nYet economists and liberals warn that forcing them out risks economic disruption and retaliation from the United States."

  colombia_americans.2.d: "News spreads that Colombia has ordered American investors to leave, seizing their interests.\n\nThe bold move alarms Washington and raises questions abroad: will Colombia face retaliation, or can it assert control over its own economic destiny?"
