l_english:
  colombia_transandean.1.d: "Across the mountains, surveyors and engineers labor to connect the coasts with iron and steam.\n\nThe Trans-Andean Railway promises a new age of commerce and unity, connecting the vast country into a single modern nation — as long as we can truly mobilize ourselves to do it."

  colombia_dignity.1.d: "Among military school cadets, fiery speeches echo across Latin America. As they say, ‘Colombia will no longer bow to foreign dictates or Yankee threats.’\n\nThe call is for dignity, sovereignty, and strength — but such pride may bring admiration from neighbors, and suspicion from across the Caribbean."

  colombia_dignity.2.d: "In the barracks, officers whisper that the government has grown timid, that its hesitation shames the country. Whispers spread faster than orders, and the generals watch the capital with cold eyes, wondering if it is time once again for soldiers to teach politics courage."
