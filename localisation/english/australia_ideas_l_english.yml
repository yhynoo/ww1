l_english:
  idea_defense_act_1903: "Defense Act of 1903"
  idea_defense_act_1903_desc: "The Defense Act established the army as a citizen militia, restricting overseas deployment but laying the foundation for Australia’s independent military organization."

  idea_the_diggers: "The Diggers"
  idea_the_diggers_desc: "The Diggers embody Australia’s fighting spirit — resilient, loyal, and egalitarian soldiers whose courage defines the nation’s military legacy."

  idea_unionized_industry: "Unionized Industry"
  idea_unionized_industry_desc: "Strong trade unions dominate the industrial landscape, protecting workers’ rights but often clashing with employers over productivity and reform."

  idea_aboriginal_integration: "Aboriginal Integration"
  idea_aboriginal_integration_desc: "New policies promote education, labor rights, and limited representation for Aboriginal Australians,   marking the first steps toward true civic equality."
