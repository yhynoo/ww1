l_english:
  # near
  contain_eastern_threats: "Contain the Eastern Threat"

  demand_serbia: "Demand Serbia"
  demand_serbia_desc: "Serbia and Montenegro under Ottoman rule have long threatened our influence in southeastern Europe. We must secure these lands and settle the matter for good."

  support_ukrainian_independence: "Support the Independence of Ukraine"
  support_ukrainian_independence_desc: "By backing Ukrainian independence, we can weaken Russian control in the east and establish a friendly buffer state under our influence."

  defenses_in_the_east: "Expand Defenses in the East"
  defenses_in_the_east_desc: ""

  tt_defenses_east: "Adds a supply hub and a railway to §Y[76.GetCapitalVictoryPointName]§!.\n\n"

  # alt
  denounce_adventurism: "Denounce German Adventurism"

  guarantees_to_france: "Offer Mutual Guarantees to [FRA.GetNameDef]"
  guarantees_to_france_desc: "A defense with France would counterbalance German aggression, safeguarding our empire by anchoring it to stability in the West."

  operational_directive_d: "Enact Operational Directive ‘D’"
  operational_directive_d_desc: ""

  tt_directive_d: "Adds land forts to §YLinz§! and §Y[9.GetCapitalVictoryPointName]§!.\n\n"

  # economic
  equal_development: "Equal Development"

  galician_oil: "Develop Galician Oil Industry"
  galician_oil_desc: "Tapping into Galicia’s oil reserves promises economic growth and energy security, vital for modernizing our empire’s industry and military."

  tatra_trucks: "Subsidize Tatra Automobiles"
  tatra_trucks_desc: "Supporting the domestic automobile industry through subsidies will spur innovation, create jobs, and improve our military’s logistical capabilities."
