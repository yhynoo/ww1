l_english:
  # near
  contain_eastern_threats: "Contain Eastern Threats"

  demand_serbia: "Demand Serbia"
  demand_serbia_desc: "Serbia and Montenegro under Ottoman rule have long threatened our influence in southeastern Europe. We must secure these lands and settle the matter for good."

  expand_defenses_in_carpathians: "Expand Our Defenses in the Carpathians"
  expand_defenses_in_carpathians_desc: "The Carpathian Mountains form our natural barrier in the east, and strengthening our defenses in the mountain passes will secure this frontier even further."

  establish_ukraine: "Establish [UKR.GetNameDef]"
  establish_ukraine_desc: "With Kyiv under our control, we can shape a friendly Ukrainian administration. A loyal government in the region will serve as both a buffer and a symbol of restored order."

  # alt
  second_vienna_treaty: "Second Vienna Treaty"

  wallachian_oil: "Access Wallachian Oil"
  wallachian_oil_desc: ""

  two_sicilies: "Stage an Insurgence in Southern Italy"
  two_sicilies_desc: "Instigating unrest in Southern Italy could expand Habsburg influence in the Mediterranean — if we manage it carefully."

  # economic
  equal_development: "Equal Development"

  galician_oil: "Develop Galician Oil Industry"
  galician_oil_desc: "Tapping into Galicia’s oil reserves promises economic growth and energy security, vital for modernizing our empire’s industry and military."

  tatra_trucks: "Subsidize Tatra Automobiles"
  tatra_trucks_desc: "Supporting the domestic automobile industry through subsidies will spur innovation, create jobs, and improve our military’s logistical capabilities."
