l_english:
  AST_army: "Army"
  AST_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  AST_army_maneuvers: "Army Maneuvers"
  AST_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  AST_conscription: "Announce Mobilization"
  AST_conscription_desc: "Organize draft to quickly expand the army and adjust it to the needs of the day."

  AST_equipment_effort: "Equipment Effort"
  AST_equipment_effort_desc: "Focus on research and production to equip our troops with modern weaponry."

  AST_support_companies: "Support Companies"
  AST_support_companies_desc: "Develop specialized support units — engineers, medics, and logistics corps — to enhance our army’s mobility, resilience, and effectiveness on the battlefield."

  AST_artillery: "Artillery"
  AST_artillery_desc: "Invest in superior firepower to support infantry and break enemy lines."
  
  AST_armor: "Armor"
  AST_armor_desc: "Prioritize the development of armored vehicles to spearhead offensives."

  AST_industrial_warfare: "Industrial Warfare"
  AST_industrial_warfare_desc: "Harness the nation’s industrial capacity to sustain prolonged warfare, transforming factories into engines of military power."

  AST_airfields: "Airfields"
  AST_airfields_desc: "Construct new airbases and expand existing ones to provide greater operational range and logistical support for our air squadrons."

  AST_air_training: "Air Training"
  AST_air_training_desc: "Establish dedicated aviation schools to train pilots and crew, ensuring our air force is ready for modern combat."

  AST_aerostats: "Aerostats"
  AST_aerostats_desc: "Deploy observation balloons and airships to gather intelligence, direct artillery fire, and attack enemy ships, as well as urban and industrial areas to strengthen our command of the skies."

  AST_aces: "Learn from the Aces"
  AST_aces_desc: ""

  AST_ground_support: "Ground Support"
  AST_ground_support_desc: ""

  AST_air_doctrine: "Air Doctrine"
  AST_air_doctrine_desc: ""

  AST_expand_dockyards: "Expand Dockyards"
  AST_expand_dockyards_desc: "Increase shipbuilding capacity to support naval expansion."

  AST_shallow_waters: "Shallow Waters"
  AST_shallow_waters_desc: "Strengthen our coastal defense fleets and patrol craft to secure nearby seas against raiders and invasions."

  AST_high_seas: "High Seas"
  AST_high_seas_desc: "Extend our operational reach beyond coastal waters."

  AST_rule_the_waves: "Rule the Waves"
  AST_rule_the_waves_desc: "Establish absolute naval supremacy on the world's oceans."
  
  AST_the_dark_deep: "The Dark Deep"
  AST_the_dark_deep_desc: "Enhance submarine warfare capabilities to control the depths of the ocean."

  AST_coastal_defense: "Coastal Defense"
  AST_coastal_defense_desc: "Expand our system of coastal fortifications and the naval air corps."

  AST_rationing: "Rationing"
  AST_rationing_desc: "Implement controlled distribution of resources to sustain the war effort."

  AST_infrastructure_effort: "Infrastructure Effort"
  AST_infrastructure_effort_desc: "Improve roads, railways, and facilities to strengthen national connectivity and support mobilization."

  AST_fuel: "Fuel Production"
  AST_fuel_desc: "Expand fuel production to secure the energy supplies required for modern warfare."

  AST_women_at_work: "Women at Work"
  AST_women_at_work_desc: "With men away at the front, women take on vital roles in industry, ensuring the economy does not falter."

  AST_construct_civilian: "Industrial Expansion"
  AST_construct_civilian_desc: "Expand civilian industry to improve production capacity and prepare for long-term growth."

  AST_expand_mining: "Mining Operations"
  AST_expand_mining_desc: "Develop natural resource extraction to support industrial needs."

  AST_efficiency_studies: "Efficiency Studies"
  AST_efficiency_studies_desc: "Conduct technological research to streamline production and maximize industrial output."

  AST_war_industry: "War Industry"
  AST_war_industry_desc: "Expand our capacity to produce guns, munitions, and all other kinds of military equipment."

  AST_telegraph: "Telegraph Network"
  AST_telegraph_desc: "Expand and modernize the telegraph network to ensure rapid communication across the nation and its armed forces."

  AST_political_ambitions: "Political Ambitions"
  AST_political_ambitions_desc: "Pursue policies that shape the nation's future and global standing."

  AST_international_affairs: "International Affairs"
  AST_international_affairs_desc: "Engage in diplomacy to secure national interests."

  AST_expansionism: "Expansionism"
  AST_expansionism_desc: "Advocate for territorial growth and increased influence abroad."

  AST_deterrence: "Oceanian Dominion"
  AST_deterrence_desc: ""

  AST_seek_alliances: "Seek Alliances"
  AST_seek_alliances_desc: "Form strategic partnerships to ensure national security."

  AST_on_our_own: "On Our Own"
  AST_on_our_own_desc: ""

  AST_traditionalism: "The Commonwealth"
  AST_traditionalism_desc: ""

  AST_public_support: "Support the War Effort"
  AST_public_support_desc: "Ensure the backing of the people for government policies."

  AST_mobilize_the_masses: "The Diggers"
  AST_mobilize_the_masses_desc: ""

  AST_strength_in_unity: "Strength in Unity"
  AST_strength_in_unity_desc: "Foster national cohesion to withstand any challenge."

  AST_the_everlasting_spirit: "The Everlasting Spirit"
  AST_the_everlasting_spirit_desc: ""

  AST_adjust_the_government: "Concessions to the Unions"
