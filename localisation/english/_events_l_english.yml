l_english:

## -- atmosphere

  # 1912
  _atmosphere.1.d: "News breaks that the Titanic has vanished beneath the Atlantic. Survivors speak of chaos, cold waters, and a ship once thought unsinkable.\n\nThe scale of the disaster shocks the world, prompting grief, disbelief, and urgent questions about maritime safety."
  _atmosphere.2.d: "A brilliant meteor shower streaks across the Arizona night sky, illuminating the desert in shimmering arcs. Locals gather outside to watch the spectacle.\n\nAstronomers call it one of the most vivid displays in years, a reminder of the vast cosmos above."

  # 1913 - 1915
  _atmosphere.3.d: "Roland Garros, a daring French aviator, completes a daring flight across the Mediterranean, landing to astonished crowds. His fragile machine defies wind and distance alike.\n\nThe feat inspires admiration across Europe, proving that aviation’s limits continue to expand with each bold attempt."
  _atmosphere.4.d: "Albert Einstein’s latest work sparks debate among scientists, who claim his theories may reshape our understanding of space and time. Newspapers struggle to explain the implications.\n\nThough few grasp the details, many sense that a profound shift in physics is underway."

  # 1917 - 1918
  _atmosphere.5.d: "A massive explosion devastates Halifax, flattening buildings and sending shockwaves across the harbor. Early reports speak of widespread destruction and countless casualties.\n\nRescue efforts begin immediately, but the scale of the disaster leaves the world stunned and grieving."
  _atmosphere.6.d: "A virulent influenza strain spreads rapidly across continents, overwhelming hospitals and disrupting daily life. Governments urge caution as cases multiply.\n\nDoctors warn the epidemic may become global, prompting fear that the world faces a crisis unlike any in recent memory."

## -- internal

  # army
  _army.1.d: "The capital awoke today to the rhythmic thunder of boots and the gleam of steel. Regiments marched through the streets, flags high and bands playing.\n\nCitizens lined the avenues, some in awe, others in quiet dread—each sensing that history was quickening its pace."
  _army.2.d: "Recruitment centers have opened across the nation. Long queues of young men stretch down city streets, eager or anxious to enlist.\n\nSome come for honor, others for bread. Yet all are swept up by the same great current of patriotic fever."

  # demonstrations
  _demonstrations.1.d: "Crowds of workers have filled the streets of [event_state.GetName], waving red banners and shouting for reform. Factories have fallen silent as speeches ring through the squares.\n\nThe government watches closely, uncertain whether this is mere protest — or the spark of something far greater."
  _demonstrations.2.d: "In [event_state.GetName], democratic sympathizers gather beneath banners of liberty and law. Their speeches call for constitutional rights and fair elections, to the cheers of students and clerks.\n\nAuthorities regard the crowds with suspicion, unsure whether such passions will fade — or ignite a wider flame."

  # change
  _change.1.d: "Factories stand still as workers seize control of the machines. Red banners flutter over the rooftops, and demands echo through the streets: bread, peace, equality.\n\nThe old order hesitates between negotiation and repression, knowing that any decision may decide the nation’s fate."
  _change.2.d: "Across the country, democratic leaders demand elections and constitutional reform. Public rallies swell in number, their slogans invoking freedom and representation.\n\nThe ruling authorities debate whether to yield or resist, aware that defiance could lead not to stability — but to open revolt."
  _change.3.d: "In private salons and officers’ messes, aristocrats whisper of betrayal and decline. They call for decisive action to restore honor and authority. \n\nRumors of a coup sweep the capital, and the government, though still seated, feels the ground shifting beneath its feet."

  # stability
  _stability.1.d: "In [event_state.GetName], angry mobs have attacked local officials accused of corruption and neglect. Government buildings lie in ruins, and the police struggle to restore order.\n\nThe unrest spreads through rumor and resentment, a warning that authority itself is under siege."
  _stability.2.d: "Reports from the garrison in [event_state.GetName] tell of mass desertions. Soldiers have vanished into the countryside, abandoning rifles and oaths alike.\n\nSome blame low morale, others whisper of sedition. Whatever the cause, discipline has cracked — and with it, faith in command."

  # tensions
  _tensions.1.d: "Ministers quarrel, newspapers mutter of incompetence, and whispers fill the cafés of the capital. The government’s authority wanes, its unity fraying under the weight of crisis.\n\nIn such an atmosphere, ambition grows bold and loyalties begin to shift like sand in the wind."
  _tensions.2.d: "Liberal deputies have denounced the government’s handling of the economy, accusing officials of waste and secrecy.\n\nIn parliament and press alike, arguments rage over the nation’s future. Confidence falters, and even loyal supporters begin to wonder whether reform may be inevitable."
  _tensions.3.d: "Conservative voices rise in defense of tradition, warning that unchecked change will erode discipline and faith.\n\nPamphlets circulate, sermons resound, and patriotic societies gather. Yet beneath their solemn appeals lies a tremor of fear — that the old order may already be slipping away."

## -- war and diplomacy

  # align
  _align.1.d: "[FROM.GetNameDefCap] has demanded our political alignment, insisting that our future lies under their influence.\n\nTheir envoys speak of shared destiny and mutual protection, yet the tone leaves little doubt that refusal could invite grave consequences."
  _align.2.d: "Under mounting diplomatic and military pressure, [ROOT.GetNameDef] has formally aligned with [FROM.GetNameDef].\n\nThe announcement is met with both celebration and unease, as another state falls into the orbit of an emerging great power."

  # alliance
  _alliance.1.d: "[FROM.GetNameDefCap] has announced a new alliance, seeking to expand its influence through military cooperation.\n\nThis step will certainly reshape international alignments, unsettling those who fear an approaching armed confrontation."

  # armistice
  _armistice.1.d: "Exhaustion and despair following unsatisfactory military action spread across the country. Commanders whisper that further fighting is futile, and diplomats argue for peace.\n\nWhether pride or pragmatism prevails, the decision to seek an armistice may decide the nation’s fate for generations."
  _armistice.2.d: "[FROM.GetNameDefCap] has extended an offer of armistice, seeking to end hostilities and spare further slaughter. Some urge acceptance and reconciliation, while others demand a total victory.\n\nThe world watches to see whether reason or resentment will guide the response."

  # autonomy
  _autonomy.1.d: "[FROM.GetName] has issued statements and gestures in favour of our aspirations for independence. Their diplomats speak of self-determination, their newspapers praise our cause.\n\nAt home, patriots rejoice at this recognition, while cautious voices wonder what price such foreign sympathy might eventually demand."
  _autonomy.2.d: "[FROM.GetName] has presented a grave demand: greater autonomy, or a loosening of the bonds that tie them to our rule. Their envoys cite history, culture, and the will of their people.\n\nWithin our own councils, some urge compromise to avoid bloodshed; others insist that yielding once will only invite further disobedience."
  _autonomy.3.d: "[ROOT.GetName] declares full independence, ending years of outside control. Crowds gather in the capital as officials proclaim a new chapter, marked by pride and uncertainty in equal measure.\n\nForeign observers watch closely, unsure whether this liberation heralds stability or future upheaval."

  # demand
  _demand.1.d: "Diplomatic couriers from [FROM.GetNameDef] have arrived, presenting firm demands for territories they claim as  theirs.\n\nThe ultimatum leaves little room for negotiation, and observers wonder whether compliance will preserve peace or merely invite further ambition."
  _demand.2.d: "[ROOT.GetNameDefCap] has expanded its territory through diplomatic pressure targeting [FROM.GetNameDef].\n\nThe concession was accepted, and while order remains, many fear this constitutes an overture to new struggles across the continent."

  # guarantees
  _guarantees.1.d: "Envoys from [FROM.GetName] arrive with a proposal for mutual defense. They speak of shared interests, common dangers, and the need to present a united front.\n\nAccepting would bind our fate to theirs in war and peace alike; refusal would keep our hands free — and possibly leave us isolated."
  _guarantees.2.d: "Our proposal for a defensive agreement has been coolly declined by [FROM.GetName]. Their ministers speak of caution and neutrality, but many see only distrust.\n\nSome in our councils argue that we must look elsewhere for partners — or stand ready to face future crises alone."

  # hunger
  _hunger.1.d: "Food shortages have worsened as the war drags on. Fields lie fallow, transport falters, and rations dwindle.\n\n Starvation looms in many regions, testing the endurance of both soldiers and civilians as desperation begins to erode discipline and faith."
  _hunger.2.d: "In [hunger_state.GetCapitalVictoryPointName], starving civilians have raided trains for food.\n\nThe authorities struggle to restore order as the army diverts precious resources to protect the railways — another grim reminder of how the war now devours its own."
  _hunger.3.d: "Reports suggest soldiers are secretly sending supplies home to starving families.\n\nThough officials deny the rumors, public sympathy for the troops grows even as the army’s stores run dangerously low, revealing the deepening strain within the war effort."

  # mobilization
  _mobilization.1.d: "Across [ROOT.GetName], bells ring, whistles sound, and notices are pasted onto walls and station boards. Men gather in crowded squares and at rural crossroads, reading their summons with a mixture of pride, fear, and excitement.\n\nThe world seems to stand on the edge of the abyss, and it is now trying to sense its depth."

  # mutinies
  _mutinies.1.d: "Months of hardship and hopelessness have taken their toll on the army. Desertions rise, officers face defiance, and whispers of mutiny echo through the ranks.\n\nWithout swift action, discipline may collapse and the front itself could soon unravel."

  # uprising
  _uprising.1.d: "Reports emerge of armed [ROOT.GetAdjective] fighters taking up arms all across the country.\n\nThe conflict spreads swiftly through towns and countryside, fueled by years of exploitation, and threatening to escalate into an independence war unless crushed with decisive force."

  # war
  _war.1.d: "War erupts across Europe as old rivalries ignite and alliances snap into motion.\n\nMobilization orders race through capitals, pulling millions into uniform almost overnight, while governments insist the conflict will be short. Crowds cheer departing regiments even as unease spreads beneath the surface.\n\nWithin days, the continent plunges into a storm from which none can easily escape."
  _war.2.d: "To lift spirits amidst the conflict, daring aviators perform breathtaking maneuvers over [ROOT.capital_scope.GetCapitalVictoryPointName].\n\nCrowds cheer as airplanes circle and dive, celebrating courage and innovation even as the world below is consumed by war."
  _war.3.d: "Communist agitators have begun rallying against the ongoing war, denouncing it as a capitalist slaughter.\n\nTheir slogans spread among factories and barracks, alarming authorities already struggling to maintain unity and morale on the home front."
