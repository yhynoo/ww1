l_english:
  naval_armaments: "Naval Armaments"

  encourage_the_arms_race: "Encourage the Naval Arms Race"
  encourage_the_arms_race_desc: "Increase naval investment to compete with other Latin American powers, asserting Argentina’s position as the preeminent power in the South Atlantic."  

  demands_in_antarctica: "Demands in Antarctica"
  demands_in_antarctica_desc: "Press territorial claims in the Malvinas and Chile to secure potential resources and reinforce national prestige on the southern frontier."  

  the_southern_anchor: "The Southern Anchor"

  assert_claims_in_atacama: "Assert Our Claim to the Atacama Desert"
  assert_claims_in_atacama_desc: "Reaffirm Argentina’s historical claims over disputed territories in the Atacama Desert, challenging Andean dominance in the region."  

  demands_in_south_atlantic: "Demands in South Atlantic"
  demands_in_south_atlantic_desc: "Assert control over key islands and maritime routes in the South Atlantic, safeguarding trade and strategic interests."  

  infanteria_de_marina: "Expand Infantería de Marina"
  infanteria_de_marina_desc: "Expand and modernize the Argentine Marine Corps to strengthen amphibious capabilities and protect overseas and coastal holdings."

