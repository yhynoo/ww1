l_english:
## -- TURKEY
  # annexation
  tur_annexation.1.d: "In Constantinople, ministers gather to weigh their response to Austria’s moves in South-East Europe. Some demand a firm stand in defence of Ottoman claims; others warn that sabre-rattling without actual strength will only invite humiliation.\n\nTelegrams are drafted and redrafted, each word carrying the weight of lost provinces and fading prestige."
  tur_annexation.2.d: "[TUR.GetName] has issued a stern warning to Vienna, protesting Austria’s ambitions and invoking past agreements and wounded honour.\n\nYet in Europe’s capitals, many quietly wonder whether the Turks still possesses the power to enforce its words with steel."


  # achaean
  turkey_achaean.1.d: "In Athens, a new 'Achaean League' has declared itself the guardian of Hellenic unity, calling for the liberation of all Greeks under Ottoman rule.\n\nTheir rhetoric spreads quickly across the Aegean — rekindling old fears of rebellion among the Empire’s remaining European subjects."

  turkey_achaean.2.d: "Reports arrive of armed bands forming across Anatolia and the Caucasus. Greek militias seize coastal towns while Armenian groups raise banners in the east.\n\nThe government must decide — concede to their demands, or crush this wave of insurrection before it consumes the Empire."

  turkey_achaean.3.d: "As the provinces fall into revolt and soldiers question their orders, a group of young officers linked to the failed coup of 1908 has announced the forming of a 'Salvation Government.'\n\nMany groups now claim to fight for the nation’s survival — but no one agrees on what that nation truly is."

  # armenia
  turkey_armenia.1.d: "Reports from missionaries and local officials describe grave violence across Armenian and Assyrian provinces. Testimonies speak of villages destroyed and deportations carried out under confusion and chaos.\n\nThe government must decide whether to acknowledge these claims — or suppress them to preserve what remains of its authority."

  turkey_armenia.2.d: "Prominent conservative figures have denounced the testimonies as lies meant to weaken the Empire from within. Newspapers proclaim that 'slander is treason' and urge loyalty above all.\n\nYet whispers persist that truth, once spoken, cannot be buried — no matter how fiercely the censors work."

  # aviators
  turkey_aviators.1.d: "A group of Turkish aviators trained in France has returned home, bringing with them several aircraft and valuable technical experience. Their arrival marks a new chapter for the Empire’s small air arm.\n\nMilitary officials hail this as proof that modern war demands mastery of the skies."

  # egypt
  turkey_egypt.1.d: "Facing crushing debts, the [TUR.GetAdjective] treasury has discreetly offered to sell Egypt to [ENG.GetNameDef].\n\nOfficials in London see both opportunity and risk in acquiring the province — a move that could alter the balance of power in the region."

  turkey_egypt.2.d: "[TUR.GetNameDefCap] has formally ceded control of Egypt to [ENG.GetNameDef] in exchange for financial relief.\n\nThe sale shocks European capitals, redrawing colonial boundaries and highlighting the empire’s growing desperation to stave off imminent financial trouble."

  # mehmed
  turkey_mehmed.1.d: "Following the death of Sultan Abdulhamid II, Prince Mehmed Vahideddin has ascended the throne as Sultan Mehmed V. His accession is met with solemn ceremony and quiet apprehension in the capital.\n\nMany wonder whether the new ruler can steady an empire weary from conflict and political turmoil."

  # turanism
  turkey_turanism.1.d: "Reports from Central Asia speak of growing Turanist agitation, with agents and pamphlets said to originate from Constantinople. Russian authorities warn that pan-Turkic rhetoric is spreading among local intellectuals.\n\nThe activity stirs unease in St. Petersburg, where officials debate how far the movement might reach."

  turkey_turanism.2.d: "Local Muslim leaders in Central Asia have begun petitioning for greater autonomy, citing mismanagement and neglect by imperial authorities. Some officials quietly sympathize, while others see the move as a veiled threat to our government.\n\nWhispers of outside influence make the issue all the more volatile."

  # salonika
  turkey_salonika.1.d: "In a dramatic declaration from Salonika, the [TUR.GetAdjective] government has pledged to ease its control over its southeastern European territories and pass it on to local Orthodox administration.\n\nAn unexpected pivot eastward, the move signals a new strategy focused on Central Asia and the wider Turkic world."

  turkey_salonika.2.d: "Emboldened by promises of autonomy, Serbian leaders in Belgrade have issued a direct demand for full independence from [TUR.GetName].\n\nWhile some advisors suggest a peaceful settlement could avoid future bloodshed, hardliners warn that granting independence would invite other provinces to follow suit."

  turkey_salonika.3.d: "With Serbian leaders shunned, local armed bands have risen up across the countryside, declaring a war of independence.\n\nWith war fervor sweeping the region, what was originally meant to deescalate the situation, spiraled into a fierce struggle for control over the south-east of Europe."
