l_english:
  ## -- TURKEY

  # aviators
  tur_aviators.1.d: "A group of Ottoman officers has returned from France, proudly wearing their flying badges. With them come fragile aeroplanes, crates of spare parts, and notebooks filled with lessons learned above foreign fields.\n\nAs the machines are assembled on a rough strip near Constantinople, optimists speak of a modern air arm; skeptics mutter that the empire has more pressing needs than wings."

  # epirus
  tur_epirus.1.d: "News from Epirus tells of rising tensions between communities, each claiming the land as their own. Petitions, protests, and whispered threats race ahead of the authorities.\n\nSome insist that only firm intervention can preserve order; others fear that every step taken will deepen the wounds instead of healing them."
  tur_epirus.2.d: "Reports from Yanya speak of bloodshed and confusion. Shots fired, homes burned, and families driven from their streets — the details differ, but all accounts agree on tragedy.\n\nAcross the region, fear and anger grow, and foreign newspapers seize on the story as proof that the area remain a tinderbox."

  # armenia
  tur_armenia.1.d: "Witnesses and refugees speak of terrible deeds in the lands of Armenia and Assyria: deportations, ruined villages, empty churches and fields.\n\nTheir testimonies spread through foreign newspapers and parliaments, raising the question of whether these are the cruelties of war — or something darker."
  tur_armenia.2.d: "Diplomats, churchmen, and activists call for an honest reckoning with what has happened in the eastern provinces. Some argue that only open investigation can restore the empire’s honour.\n\nOthers warn that lifting the veil may expose more than anyone is prepared to face."
  tur_armenia.3.d: "Young officers and hard-line newspapers rage against those who speak of atrocities, denouncing them as traitors and agents of foreign slander.\n\nThe louder their cries, the clearer it becomes that the struggle over memory and responsibility is only beginning."

  # abdulhamid dies
  tur_abdulhamid.1.d: "Word spreads quietly through the palaces and streets: Abdülhamid has died. The once-feared Sultan, who ruled from behind curtains and spies, now passes into history.\n\nIn some quarters there is mourning, in others only a heavy silence — and everywhere, speculation about what this means for the empire’s uncertain future."

  # young turks
  tur_young_turks.3.d: "In barracks, cafés, and secret meetings, discontent has hardened into resolve. Officers and activists who once whispered of reform now call openly for the overthrow of the old order.\n\nAs units mutiny and banners are raised, the empire stands at a crossroads: one more coup to suppress — or a revolution that finally remakes the state."
