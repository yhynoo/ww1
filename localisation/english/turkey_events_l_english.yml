l_english:

  # achaean
  turkey_achaean.1.d: "Whispers from Constantinople warn that a new Achaean League has been declared in Athens, sparking [TUR.GetAdjective] unease. \n\nThe formation threatens to inflame Greek nationalism and destabilize [TUR.GetAdjective] control in the Balkans, raising fears of future unrest."

  turkey_achaean.2.d: "Rebellion has broken out as Greek nationalists launch a war of independence, challenging [TUR.GetAdjective] authority in the region. \n\nThe Empire braces for a conflict that could unravel its fragile grip on the Balkans and inspire further separatist movements."

  # armenia
  turkey_armenia.1.d: "A new wave of anti-Christian violence flares in the eastern provinces of Armenia and Assyria, with clashes spreading rapidly. \n\nThe [TUR.GetAdjective] administration struggles to contain ethnic and religious tensions as calls for justice and reform grow louder among local populations."

  turkey_armenia.2.d: "Liberal factions demand a full investigation into recent outbreaks of violence, pushing for accountability within the Empire’s ranks.\n\nTheir calls deepen political divisions, pressuring the government to respond amid rising unrest in the east."

  turkey_armenia.3.d: "A group of young officers has publicly denounced reformist claims as treasonous slander against the Empire. \n\nThis defiant stance signals a hardening authoritarianism, threatening to stifle dissent and escalate political tensions."

  # asia
  turkey_asia.1.d: "Asian Muslim communities within the Empire are increasingly demanding autonomy, stirring anxiety in Petrograd. \n\nOfficials debate whether to infiltrate these groups or risk further destabilization in the volatile eastern provinces."

  turkey_asia.2.d: "[TUR.GetAdjective] agents have been arrested in Samarkand on charges of espionage, raising alarm over foreign interference. \n\nThe incident exposes vulnerabilities in the Empire’s hold over Central Asia, complicating regional relations."

  # egypt
  turkey_egypt.1.d: "Financial strain pushes Constantinople to consider ceding control of Egypt to Britain. \n\nThe deal offers relief from crippling debt but risks diminishing [TUR.GetAdjective] influence over this strategic province."

  turkey_egypt.2.d: "Egypt has officially been handed over to British control, marking a painful retreat for the Empire. \n\nThe transfer highlights the financial desperation of Constantinople and reshapes the balance of power in the region."

  # salonika
  turkey_salonika.1.d: "The [TUR.GetAdjective] government declares a strategic withdrawal from southeastern Europe, in many areas granting administrative authority to the Orthodox Church. \n\nThis move signals a shift in focus toward Central Asia as the Empire seeks to consolidate power amid mounting pressures."
