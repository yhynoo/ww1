l_english:

  american_influence: "American Influence in Central America"
  american_influence_desc: "For decades, Washington has treated Central America as its informal dominion, shaping its politics and economy to serve American interests. The Panama Canal stands as the ultimate symbol of this dominance.\n\nNow it falls to us to decide whether the status quo shall endure — or be challenged."

  # america
  demand_access: "Offer Investments to [FROM.GetNameDef]"
  demand_access_desc: "We can extend a proposal of economic partnership to [FROM.GetNameDef], offering development funds in exchange for privileged access to their resources. A gesture of friendship — or subtle domination."

  investment_in_progress: "Ongoing Investment..."
  investment_in_progress_desc: "Our civilian factories are currently devoted to large-scale development abroad. Once completed, these investments will expand infrastructure — and our influence."

  # colombia and mexico
  appoint_american_adminstrators: "Appoint Pro-American Administrators"
  appoint_american_adminstrators_desc: "By installing loyal administrators sympathetic to American interests, we can ensure smoother cooperation and secure their backing on international stage."

  sabotage_american_enterprises: "Sabotage American Enterprises"
  sabotage_american_enterprises_desc: "American-owned businesses dominate our economy. Through covert action and subtle interference, we can weaken their control and reclaim national autonomy."

  expel_american_investors: "Expel American Investors"
  expel_american_investors_desc: "The time has come to end foreign economic domination. By expelling American investors, we can restore our sovereignty — though not without economic disruption."

  # tooltips
  tt_demand_access: "If they agree, we will develop the infrastructure there in exchange for access to all the resources.\n\nThe investment will use §Y3 civilian factories§! and change our daily political power gain: §t-0.5§! for §Y90 days§!."
  tt_allow_investment: "If we agree, they will develop §Y1 infrastructure§! in §Y90 days§! — in exchange for access to §tall the resources§! in this state."
