l_english:
  # near
  oriental_investments: "Oriental Aspirations"

  egyptian_cotton: "Access the Egyptian Cotton"
  egyptian_cotton_desc: "Secure a supply of high-quality Egyptian cotton through diplomatic and financial influence in Constantinople."

  unrest_in_algeria: "Foster Unrest in Algeria"
  unrest_in_algeria_desc: "Support covert operations aimed at destabilizing French control in Algeria, distracting our western rivals and expanding German influence."

  wassmuss_in_the_gulf: "Dispatch Wilhelm Wassmuss to the Gulf"
  wassmuss_in_the_gulf_desc: "Send a secretive envoy on a covert mission to the Near East, where tribal alliances and imperial ambitions collide."

  recall_wassmuss: "End Wassmuss' Mission"
  recall_wassmuss_desc: "Bring Wassmuss home before his desert intrigues draw the Empire into unpredictable entanglements."

  # alliances
  a_place_in_the_sun: "A Place in the Sun"

  demand_east_africa: "Demand South-East Africa"
  demand_east_africa_desc: "Revisit the colonial order and carve out a larger chunk of the continent for ourselves, challenging London's domination in the southern hemisphere."

  support_baltic_germans: "Support Germans in the East"
  support_baltic_germans_desc: "Back political movements seeking autonomy for Baltic Germans, extending Berlin’s influence deep into the Russian territories under a guise of self-determination."

  # alt
  approach_the_uk: "End the Weltpolitik"

  ask_to_withdraw_french_guarantees: "Negotiate the End of Naval Arms Race"
  ask_to_withdraw_french_guarantees_desc: "Ask London to withdraw from its defense agreement with France in exchange for us withdrawing from the Tirpitz Plan: our naval development strategy."

  align_china: "Align [MAN.GetNameDef]"
  align_china_desc: ""

  # eco
  eberts_appointment: "Ebert’s Appointment"

  eberts_agrarian_reform: "Introduce Agrarian Reform"
  eberts_agrarian_reform_desc: ""

  tanganyika_cotton: "Expand the Cotton Fields in Tanganyika"
  tanganyika_cotton_desc: "Stretch the cotton fields of Tanganyika under the equatorial sun, weaving prosperity into the fabric of the Empire’s farthest reaches."