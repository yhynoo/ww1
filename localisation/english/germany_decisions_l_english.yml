l_english:
  # near
  oriental_investments: "Oriental Investments"

  egyptian_cotton: "Access the Egyptian Cotton"
  egyptian_cotton_desc: "Secure a supply of high-quality Egyptian cotton through diplomatic and financial influence in Constantinople."

  unrest_in_algeria: "Foster Unrest in Algeria"
  unrest_in_algeria_desc: "Support covert operations aimed at destabilizing French control in Algeria, distracting our western rivals and expanding German influence."

  wassmuss_in_the_gulf: "Dispatch Wilhelm Wassmuss to the Gulf"
  wassmuss_in_the_gulf_desc: "Send a secretive envoy on a covert mission to the Near East, where tribal alliances and imperial ambitions collide."

  recall_wassmuss: "End Wassmuss' Mission"
  recall_wassmuss_desc: "Bring Wassmuss home before his desert intrigues draw the Empire into unpredictable entanglements."

  # alliances
  germany_alliances: "A Place in the Sun"

  demand_south_africa: "Demand South Africa"
  demand_south_africa_desc: "Assert our claim over South Africa to expand the Reich’s colonial holdings and challenge British dominance on the continent."

  ger_offer_alliance: "Offer Alliance to [FROM.GetNameDef]"
  ger_join_alliance: "Seek Alliance with [FROM.GetNameDef]"

  # alt
  approach_the_uk: "Approach the United Kingdom"

  treaty_of_singapore: "Offer to End the Arms Race"
  treaty_of_singapore_desc: "Propose a cessation of naval competition with London, seeking peace and mutual respect in the oceans."

  ask_to_withdraw_french_guarantees: "Ask to Withdraw Guarantees to France"
  ask_to_withdraw_french_guarantees_desc: "Request that London withdraw its protective guarantees to France, aiming to reshape the European balance of power."

  # eco
  afrika_amt: "Afrika-Amt"

  develop_south_west_africa: "Develop South-West Africa"
  develop_south_west_africa_desc: "Invest in infrastructure and industry in South-West Africa to increase resource extraction and solidify colonial governance."

  tanganyika_cotton: "Expand the Cotton Fields in Tanganyika"
  tanganyika_cotton_desc: "Stretch the cotton fields of Tanganyika under the equatorial sun, weaving prosperity into the fabric of the Empire’s farthest reaches."

  