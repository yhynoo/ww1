l_english:
  # allegiance
  south_africa_allegiance.1.d: "Across the endless veld, chiefs and settlers alike await our banners. In the wake of our advance into enemy colonial territories, local Hottentot and Kleurlinge communities send envoys, pledging their loyalty — or, at least, their acceptance — to the new order.\n\nWhether they see us as liberators or merely another master remains to be seen."

  # maritz
  south_africa_maritz.1.d: "Reports from the Cape Colony tell of Afrikaner officers refusing orders and proclaiming their loyalty to the old Boer republics. Commandos rise in the countryside, waving the Vierkleur and calling for independence from London.\n\nThe Empire faces rebellion in the very heart of South Africa."

  # trek
  south_africa_trek.1.d: "Distances in Africa defy all measure — deserts, savannas, and mountains stretch endlessly between our towns. Some dream of conquering them not on horseback, but in the sky. The idea of an 'Air Trek' — a fleet of great airships linking the cities on the coast with northern territories — captures the imagination of soldiers and settlers alike."

  south_africa_trek.2.d: "A delegation from Pretoria arrives in Berlin with a curious request: the purchase of decommissioned airships for long-range colonial patrols and mail service.\n\nTheir tone is earnest, their resources modest. Some in the Admiralty scoff, others see a chance to strengthen friendship across the seas."

  south_africa_trek.3.d: "From Europe comes the news — the German government has agreed to supply us with several old airships. Engineers already prepare fields for their arrival, and the press hails this as the dawn of a new age of flight over Africa.\n\nThe dream of the Air Trek begins to take shape in the sky."
