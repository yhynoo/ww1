l_english:
  # near
  slavic_unrest: "Slavic Unrest"

  unrest_in_galicia: "Foster Unrest in Galicia"
  unrest_in_galicia_desc: "Encourage nationalist agitation in Galicia to weaken Austro-Hungarian control and stir dissent on our western frontier."

  army_approvisation_plan: "Enact the Army Approvisation Plan"
  army_approvisation_plan_desc: "Implement measures to secure food and supplies for the army, ensuring that our troops remain well-provisioned despite ongoing hardships."

  # alt
  far_east_affairs: "Far East Affairs"

  align_afghans: "Align the Afghans"
  align_afghans_desc: "Cultivate closer ties with Afghan leaders to counter British influence and extend Russian sway in Central Asia."

  harbin_section: "Demand Access to the Harbin Section"
  harbin_section_desc: "Demand strategic access to the Harbin railway section, securing vital transport routes for military and economic advantage."

  avenge_1905: "Avenge the Defeat of 1905"
  avenge_1905_desc: "Now that we revise our East Asian standing, we must reclaim what we lost in the tragic war of 1905."

  # eco
  agrarian_reform: "Agrarian Reform"

  agrarian_administration_in_asia: "Organize the Administration in Central Asia"
  agrarian_administration_in_asia_desc: "Establish effective governance over Central Asian lands to improve agricultural output and integrate the region into the empire’s economy."

  expand_ukrainian_cotton: "Expand Ukrainian Cotton"
  expand_ukrainian_cotton_desc: "Promote the growth of cotton cultivation in Ukraine, diversifying crops and strengthening local economies to support the war effort."
