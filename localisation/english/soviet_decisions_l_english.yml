l_english:
  # near
  slavic_unrest: "Slavic Unrest"

  unrest_in_galicia: "Sponsor Unrest in Galicia"
  unrest_in_galicia_desc: "Encourage nationalist agitation in Galicia to weaken Austro-Hungarian control and stir dissent on our western frontier."

  support_greeks: "Support Greek Independence"
  support_greeks_desc: "Support Orthodox militants in Greece to destabilize [TUR.GetNameDef] and spread our influence through faith and solidarity."

