  agrarian_reform: "Limited Autonomy"

  amnesty_local: "Amnesty for Democratic Activists"
  amnesty_local_desc: "Grant amnesty to local activists to ease tensions, foster goodwill, and integrate regional movements into the imperial framework."

  expand_ukrainian_cotton: "Expand the Cotton Industry in Ukraine"
  expand_ukrainian_cotton_desc: "Promote the growth of cotton cultivation in Ukraine, diversifying crops and strengthening local economies to support the war effort."
