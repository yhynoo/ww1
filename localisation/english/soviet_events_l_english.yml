l_english:

  ## -- RUSSIAN EMPIRE

  # agitation
  sov_agitation.1.d: "Reports of unrest spread through the imperial army as soldiers question the purpose of the war. Desertions rise, and discipline weakens.\n\nCommanders fear the agitation may soon undermine entire fronts."
  sov_agitation.2.d: "A violent assault on the Arkhangelsk garrison leaves several soldiers wounded and equipment destroyed. Witnesses speak of open mutiny and an attack from within.\n\nThe incident deepens concerns about loyalty within the ranks."  
  sov_agitation.3.d: "Apparently, Vladimir Lenin has arrived in the capital, drawing crowds of workers and agitators. His speeches call for radical change.\n\nAuthorities debate whether to suppress his influence or risk inflaming the situation further."

  # aircraft
  sov_aircraft.1.d: "Today, the four-engined ‘Russkiy Vityaz’ has taken to the skies, a marvel of Igor Sikorsky’s engineering and ambition. Its vast wingspan and power promise new possibilities for military and civilian aviation alike.\n\nDefying expectations, it fuels hopes that the empire may yet lead the world into a new age of flight."

  # duma
  sov_duma.1.d: "Tensions rise in the State Duma as factions trade accusations over the direction of reforms. Ministers struggle to maintain discipline.\n\nRumours spread that the Kadets may soon be invited into government to steady the situation."

  # end
  sov_end.1.d: "Communist agitation spreads across the empire as soldiers mutiny and workers seize factories. The government’s authority collapses in key cities, and rival committees proclaim their own mandates. Reports from across the country describe entire regions slipping from imperial control.\n\nDiplomats across the world now fear that Russia stands on the brink of a full‑scale civil war."
  sov_end.2.d: "After years of declining imperial rule, a great communist uprising has broken out in Russia. As of today, rebel armies seize rail lines and administrative centers, and control close to half of the country.\n\nWhatever the outcome, Russia will emerge from this war nothing like it used to be."

  # tsar
  sov_tsar.1.d: "After months of unrest, the Tsar has been forced from the throne.\n\nCrowds in all of Russia celebrate the fall of the old imperial regime, while loyalist officers consider their next move. Government ministries stand paralyzed as rival factions scramble for influence.\n\nAcross Europe, observers warn that the eastern giant has entered a dangerous and unpredictable new era."

  # ukraine
  sov_ukraine.1.d: "A suspicious fire breaks out in Sevastopol, destroying several warehouses and alarming local authorities. Witnesses speak of masked figures fleeing into the night.\n\nThe incident deepens fears that unrest in the south of the empire may be slipping beyond the government’s control."
  sov_ukraine.2.d: "Reports from the Ukrainian steppe describe villages without authorities and locals organizing into armed troops. Telegraph lines fall silent as order collapses across wide stretches of countryside.\n\nOfficials warn that at this point, dissent has turned into an open conflict."
