l_english:

  # aftermath
  soviet_aftermath.1.d: "The assassination of Minister Stolypin in 1911 shattered the government’s wager. Instead of conservative stability, unrest spreads through the villages, peasants challenging both landlords and officials.\n\nFor now, no one knows whether attempted reforms will bring order — or only feed the storm."  

  soviet_aftermath.2.d: "Democratic reformers propose expanding village autonomy to anchor a stable, conservative agrarian order under local control.\n\nOthers warn it risks undermining authority, urging withdrawal — yet in retreat, anarchists and communists alone may claim the peasant’s cause."  

  # agitation
  soviet_agitation.1.d: "Outside Arkhangelsk, a group of workers and deserters stormed a military outpost, leaving gendarmes shaken and supplies plundered.\n\nScattered pamphlets, urging ‘peace, bread, and land for all Russians,’ reveal the growing reach of underground agitators in the countryside."  

  soviet_agitation.2.d: "Vladimir Lenin has returned from exile, his speeches denouncing war and privilege drawing vast, feverish crowds in the capital.\n\nOfficials warn that such rhetoric may ignite unrest already simmering, and fear his influence could push Russia toward full-scale revolution."  

  # alexei
  soviet_alexei.1.d: "The Tsarevich’s sudden recovery from his life-long hemophilia astonishes the nation. Doctors cautiously study the case, while others call it a miracle.\n\nNow, how we present the news to our subjects may shape the Empire’s image at home and abroad."

  # end
  soviet_end.1.d: "Across the empire, revolutionary councils emerge, soldiers mutiny, and strikes erupt, leaving cities fractured and authority crumbling.\n\nLenin’s disciples, deserters, and disillusioned workers openly call for the end of imperial rule, while loyalists brace for the decisive struggle over Russia’s future."  

  # entente
  soviet_entente.1.d: "From [SOV.capital.GetCapitalVictoryPointName] comes an official démarche: [SOV.GetNameDef] proposes that the loose Franco-Russian understanding be elevated into a formal Entente. Advocates in Paris praise the strategic necessity, highlighting the growing German threat.\n\nYet others mutter that such an alliance could entangle France in Russia’s domestic storms."

  soviet_entente.2.d: "Word arrives that [FROM.GetNameDef] has declined to formalize its ties with us. In diplomatic circles, the rebuff is interpreted as both insult and warning.\n\nThe press seizes on the humiliation, and faith in France’s reliability wavers. Echoes of Agadir shake the continent once more."

  # far east
  soviet_far_east.1.d: "[SOV.GetName] has formally demanded access to Harbin and the surrounding stretches of the Trans-Siberian Railway, currently under [ROOT.GetAdjective] administration.\n\nOfficials in [ROOT.capital.GetCapitalVictoryPointName] fear that rejecting the ultimatum could escalate into open conflict, while agreeing would establish a precarious condominium under Russian dominance."

  soviet_far_east.2.d: "A compromise has been struck between [SOV.GetNameDef] and [MAN.GetNameDef], establishing a 'Free Eastern Railway Zone' under [FER.GetNameDef].\n\nThough nominally autonomous under [MAN.capital.GetCapitalVictoryPointName]’s governance, the arrangement ensures Russian access to the tracks and cities vital for their Far Eastern trade and troop movements."

  # okhrana provocations
  soviet_okhrana.1.d: "Masked assailants stormed a tax office in Tarnów, killing several clerks and torching state records.\n\nAuthorities suspect Russian agents of having armed and funded the attackers, seeking to inflame unrest among the Galician population and undermine [AUS.GetAdjective] rule."

  soviet_okhrana.2.d: "Archduke Franz Ferdinand has been assassinated in Lemberg during a public procession, gunned down in broad daylight.\n\nLocal police believe Russian operatives smuggled weapons and funds to the assassins, turning simmering unrest in Galicia into a direct strike against the [AUS.GetAdjective] crown."

  soviet_okhrana.3.d: "Intelligence reports strongly indicate the Okhrana may have been involved in orchestrating the Lemberg assassination.\n\nWhile [SOV.capital.GetCapitalVictoryPointName] vehemently denies the allegations, public opinion across [AUS.GetNameDef] clamors for vengeance against the [SOV.GetNameDef]."

  # southeast
  soviet_southeast.1.d: "Villages across south-east Europe report outbreaks of unrest led by Orthodox clergy and local militants. Crosses, banners, and rifles are gathered in local churches, many of uncertain origin.\n\nOfficials in Constantinople whisper that the agitation bears the unmistakable imprint of [SOV.GetAdjective] intrigue, yet decisive action is yet to be seen."

  # tsiolkovsky
  soviet_tsiolkovsky.1.d: "Konstantin Tsiolkovsky, visionary of modern aeronautics, has unveiled ambitious airship designs promising unprecedented endurance and range.\n\nHis ideas inspire awe and cautious optimism alike, challenging the Admiralty to decide whether to embrace innovation or leave brilliance unrealized."
  
  soviet_tsiolkovsky.2.d: "A daring crew completes the first nonstop airship flight from Tallinn to Vladivostok, spanning the breadth of the Empire.\n\nScientists hail the triumph, while officials celebrate it as proof of Russia’s technological promise and national unity."
