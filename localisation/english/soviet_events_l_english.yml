l_english:
  # aftermath
  soviet_aftermath.1.d: "The assassination of Pyotr Stolypin has plunged the Empire into uncertainty. His death leaves a void in leadership amid rising calls for reform and stability.\n\nSome voices urge admitting overreach and adjusting policies to avoid further unrest, while others advocate maintaining the current course, despite the growing tensions."

  # agitation
  soviet_agitation.1.d: "A sudden attack on the remote outpost of Arkhangelsk has sent shockwaves through the northern provinces. The assault underlines the growing boldness of insurgents seeking to undermine Imperial authority.\n\nOfficials fear this unrest may spread, weakening the fragile control the Empire still holds over its vast northern frontiers."

  soviet_agitation.2.d: "Lenin’s arrival in the capital stirs unease among both the government and the populace. The revolutionary leader’s presence threatens to ignite the simmering discontent of the workers and peasants.\n\nAuthorities face a difficult choice: suppress his influence with force or risk provoking the very uprising they hope to avoid."

  soviet_agitation.3.d: "The Russian Empire is engulfed in civil war as communist forces clash with monarchist loyalists. The old order is fracturing, with violence spreading across cities and countryside alike.\n\nAmidst the chaos, competing factions vie for control, each determined to shape the nation’s uncertain future."

  # far east
  soviet_far_east.1.d: "[FROM.GetName] has formally demanded access to Harbin, challenging Imperial claims in the Far East. The request tests Russia’s resolve to maintain influence over these strategic borderlands.\n\nHow the Empire responds could alter the region’s delicate balance of power, with consequences rippling far beyond the immediate frontier."

  soviet_far_east.2.d: "The establishment of [FER.GetName] stands as a testament to [SOV.Adjective] diplomacy and determination. This new administrative entity solidifies influence deep in the Siberian interior.\n\nThough far from the centers of power, the move is celebrated as a significant achievement, projecting strength and control in a turbulent region."

  # okhrana
  soviet_okhrana.1.d: "The Tax Office in Tarnów has suffered a brazen assault by insurgents. This brazen attack exposes the vulnerabilities of our security in Galicia.\n\nOfficials worry that without swift and decisive action, lawlessness may spread, emboldening revolutionary elements to further challenge the state."

  soviet_okhrana.2.d: "The Habsburg Archduke Franz Ferdinand has been assassinated, sending shockwaves throughout Europe. Many believe that agents of the Okhrana, the Empire’s secret police, were behind this ruthless act.\n\nThis revelation threatens to ignite international tensions and casts a deep suspicion over Imperial intelligence, prompting urgent demands for answers and justice."

  # tuva
  soviet_tuva.1.d: "Amid China’s civil war, Tuva stands as a prize contested by many. The Empire must decide whether to seize this frontier region or support Mongol allies in hopes of securing a stable buffer state.\n\nThis strategic choice carries great risk and could define Petersburg’s influence in Central Asia for years to come."

  soviet_tuva.2.d: "[SOV.GetName] has boldly claimed Tuva, expanding Imperial reach into contested borderlands. This decisive action asserts Russia’s interests but risks provoking neighboring powers.\n\nWhile seen as an imperial triumph, the move may ignite tensions and complicate fragile regional alliances."

  soviet_tuva.3.d: "[SOV.GetName] has sent vital military equipment to Mongol allies, reinforcing their position amid regional instability. This gesture aims to strengthen ties and counterbalance rival influences in Central Asia.\n\nThe Empire hopes that such support will secure a loyal ally and preserve stability along its vulnerable southern frontier."

  # ukraine
  soviet_ukraine.1.d: "Unrest simmers in Ukraine, where socialist agitation threatens to unravel our control. Rising tensions among peasants and workers fuel fears of widespread rebellion.\n\nOfficials must carefully navigate these challenges to prevent chaos from spreading across this key region of the Empire."

  soviet_ukraine.2.d: "A devastating fire has engulfed Yekaterinoslav, exacerbating tensions between the authorities and local populations. The blaze is suspected to be an act of arson by radical elements.\n\nThe government faces a critical decision: deploy troops to restore order or seek conciliation to avoid further alienation of the populace."

  soviet_ukraine.3.d: "Anarchy has erupted across the Ukrainian steppes as revolutionary forces seize control. The chaos threatens the territorial integrity of the Empire and the stability of the region.\n\nThe government mobilizes to suppress the uprising, but many fear this may only deepen the divisions and prolong the conflict."

