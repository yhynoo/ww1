l_english:

  # stolypin aftermath
  soviet_aftermath.1.d: "In 1911, Prime Minister Pyotr Stolypin, the architect of Russia’s recent agrarian reforms, has fallen victim to an assassin’s bullet.\n\nHis death has thrown the government into turmoil: moderates and reformers mourn the loss of a man who sought to modernize the empire without destroying its traditions, while hardliners whisper that his concessions only emboldened radicals."

  # agitation
  soviet_agitation.1.d: "A military outpost near Arkhangelsk was assaulted by a mob of armed workers and deserters, allegedly influenced by underground Communist agitators.\n\nLocal gendarmes report that revolutionary pamphlets were found scattered after the attack, calling for 'peace, bread, and land for all Russians.' The incident has rattled the army and fueled fears that unrest could spread further behind the frontlines."

  soviet_agitation.2.d: "Vladimir Lenin, a radical socialist long exiled abroad, has returned to [SOV.GetNameDef].\n\nHis fiery speeches promising an end to war and an overturning of the old order have electrified crowds in the capital. Many in the government fear his influence may tip the already unstable situation toward full-blown revolution."

  soviet_agitation.3.d: "The empire stands on the brink of collapse as revolutionary councils rise across [SOV.GetAdjective] cities and the army mutinies grow bolder.\n\nCommunist agitators, deserters, and disenchanted workers have taken up arms and openly call for an end to imperial rule, while loyalists desperately scramble to keep the government’s authority from crumbling. The battle for the Empire’s future has begun."

  # far east
  soviet_far_east.1.d: "[SOV.GetName] has formally demanded access to Harbin and the surrounding stretches of the Trans-Siberian Railway, currently under [ROOT.GetAdjective] administration.\n\nOfficials in [MAN.capital.GetCapitalVictoryPointName] fear that rejecting the ultimatum could escalate into open conflict, while agreeing would establish a precarious condominium under Russian dominance."

  soviet_far_east.2.d: "A compromise has been struck between [SOV.GetNameDef] and [MAN.GetNameDef], establishing a 'Free Eastern Railway Zone' under [FER.GetNameDef].\n\nThough nominally autonomous under [MAN.capital.GetCapitalVictoryPointName]’s governance, the arrangement ensures Russian access to the tracks and cities vital for their Far Eastern trade and troop movements."

  # okhrana provocations
  soviet_okhrana.1.d: "Masked assailants stormed a tax office in Tarnów, killing several clerks and torching state records.\n\nAuthorities suspect Russian agents of having armed and funded the attackers, seeking to inflame unrest among the Galician population and undermine [AUS.GetAdjective] rule."

  soviet_okhrana.2.d: "Archduke Franz Ferdinand has been assassinated in Lemberg during a public procession, gunned down in broad daylight.\n\nLocal police believe Russian operatives smuggled weapons and funds to the assassins, turning simmering unrest in Galicia into a direct strike against the [AUS.GetAdjective] crown."

  soviet_okhrana.3.d: "Intelligence reports strongly indicate the Okhrana may have been involved in orchestrating the Lemberg assassination.\n\nWhile [SOV.capital.GetCapitalVictoryPointName] vehemently denies the allegations, public opinion across [AUS.GetNameDef] clamors for vengeance against the [SOV.GetNameDef]."

  # tuva
  soviet_tuva.1.d: "With China engulfed in civil war and the frontier in chaos, voices in [SOV.GetNameDef] call for decisive action in Tuva.\n\nShould the empire seize the isolated borderland for itself, support Mongolian allies, or refrain from intervention altogether?"

  soviet_tuva.2.d: "[SOV.GetName] has moved swiftly to occupy Tuva, asserting its claim over the sparsely populated region.\n\nWhile some view the annexation as a natural extension of Russian power in Central Asia, others decry it as another imperialist land grab amidst China's turmoil."

  soviet_tuva.3.d: "[SOV.GetName] has chosen to arm Mongolian forces fighting in the frontier, sending rifles and supplies to bolster their war effort.\n\nThe decision is seen as a gesture of solidarity among Asian allies resisting Chinese domination."

  # ukraine unrest
  soviet_ukraine.1.d: "Reports from Ukraine tell of peasant unrest and secret gatherings denouncing landlords and the Tsar alike.\n\nAnarchist agitators speak openly of communal rule and the abolition of property, unsettling both local authorities and imperial officials in St. Petersburg."

  soviet_ukraine.2.d: "A wave of arson attacks has struck Yekaterinoslav, with granaries and landlords' estates set ablaze overnight.\n\nPeasant delegates demand radical reforms, while the army is placed on alert for further outbreaks of violence."

  soviet_ukraine.3.d: "Open rebellion has erupted across the Ukrainian steppe as anarchist militias proclaim independence from the empire.\n\nLocal soviets declare allegiance to neither Tsar nor foreign powers, raising the specter of full-scale war to restore order in the region."
