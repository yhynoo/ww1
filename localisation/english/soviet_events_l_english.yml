l_english:

  # aircraft
  soviet_aircraft.1.d: "The four-engined ‘Russkiy Vityaz’ has taken to the skies, a marvel of Igor Sikorsky’s engineering and ambition. Its vast wingspan and power promise new possibilities for military and civilian aviation alike.\n\nDefying expectations, it inspires hope that our air power may soon outpace all the rivals."

  # agitation
  soviet_agitation.1.d: "Outside Arkhangelsk, a group of workers and deserters stormed a military outpost, leaving gendarmes shaken and supplies plundered.\n\nScattered pamphlets, urging ‘peace, bread, and land for all Russians,’ reveal the growing reach of underground agitators in the countryside."  

  soviet_agitation.2.d: "Vladimir Lenin has returned from exile, his speeches denouncing war and privilege drawing vast, feverish crowds in the capital.\n\nOfficials warn that such rhetoric may ignite unrest already simmering, and fear his influence could push Russia toward full-scale revolution."  

  soviet_agitation.3.d: "Across the empire, revolutionary councils emerge, soldiers mutiny, and strikes erupt, leaving cities fractured and authority crumbling.\n\nLenin’s disciples, deserters, and disillusioned workers openly call for the end of imperial rule, while loyalists brace for the decisive struggle over Russia’s future."  

  # entente
  soviet_entente.1.d: "From [SOV.capital.GetCapitalVictoryPointName] comes an official démarche: [SOV.GetNameDef] proposes that the loose Franco-Russian understanding be elevated into a formal Entente. Advocates in Paris praise the strategic necessity, highlighting the growing German threat.\n\nYet others mutter that such an alliance could entangle France in Russia’s domestic storms."

  # greece
  soviet_greece.1.d: "Whispers of Russian gold and Orthodox priests circulate in Athens, fueling suspicion that foreign hands are stirring unrest. Secret societies and student groups begin agitating against Ottoman rule.\n\nWhether these sparks will flare into outright rebellion remains to be seen."

  soviet_greece.2.d: "Greek banners have been raised against Ottoman authority, proclaiming independence in defiance of Constantinople. The Orthodox population cheers in the squares, hopeful of Russian support and protection.\n\nThe Sublime Porte now faces yet another threat to its crumbling dominion."

  # harbin
  soviet_harbin.1.d: "[SOV.GetName] has formally demanded access to Harbin and the surrounding stretches of the Trans-Siberian Railway, currently under [ROOT.GetAdjective] administration.\n\nOfficials in [ROOT.capital.GetCapitalVictoryPointName] fear that rejecting the ultimatum could escalate into open conflict, while agreeing would establish a precarious condominium under Russian dominance."

  # okhrana
  soviet_okhrana.1.d: "A supply train has derailed in Krakau under suspicious circumstances, injuring dozens and causing thousands of Kronen of damages. Some whisper that it was no accident.\n\nThe question now is whether to treat the incident as sabotage, or dismiss it as misfortune in uncertain times."

  soviet_okhrana.2.d: "Evidence emerges suggesting involvement of Okhrana agents in the Krakau disaster. Their role remains unclear, but the implication is grave.\n\nIf true, this would mean state-sponsored terrorism on our soil, and a deliberate attack against the monarchy itself."

  soviet_okhrana.3.d: "Archduke Franz Ferdinand has been assassinated during a visit to Lemberg. Gunfire struck his procession, shocking the city and empire alike. Evidence undoubtedly points to Okhrana-sponsored agents.\n\nNow, many demand vengeance, while others fear escalation into a war — despite the obvious humilition of the crown."

  # tsar
  soviet_tsar.1.d: "News spreads across the world: the Russian Tsar is no longer on the throne. Centuries of autocratic rule have come to an end, leaving the nation at a crossroads.\n\nCitizens and officials alike ponder what the future holds as political forces and public opinion react to this historic change."
