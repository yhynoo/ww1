l_english:
  # afghans
  soviet_afghans.1.d: "The Russian envoy has presented an offer to align Afghanistan with [SOV.capital.GetCapitalVictoryPointName] interests. Acceptance would mean joining their sphere of influence and potentially relinquishing substantial autonomy — but in return, the promise of protection and support looms large.\n\nAs regional instability grows, the cost of refusal may be even greater."

  soviet_afghans.2.d: "Faced with mounting pressure from the north, Afghanistan has accepted Russian alignment. While independence remains nominal, effective sovereignty has shifted to [SOV.capital.GetCapitalVictoryPointName], which now holds considerable sway over Kabul's foreign and domestic policy. A new chapter in the century-old Great Game begins, as the empire's influence spreads deeper into Central Asia."

  soviet_afghans.3.d: "Afghanistan has rejected [SOV.capital.GetCapitalVictoryPointName] demands, asserting its sovereignty in the face of foreign pressure. [SOV.GetNameDefCap], however, is unlikely to take this defiance lightly.\n\nTensions escalate as the specter of war returns to the mountains and deserts of Central Asia."

  # agitation during war
  soviet_agitation.1.d: "News arrives from the north: an outpost in Arkhangelsk has come under attack by unknown agitators.\n\nThough the details remain uncertain, whispers of revolutionary pamphlets and red flags suggest the embers of unrest are no longer confined to the capitals. The Empire’s grip on the hinterlands is beginning to tremble."

  soviet_agitation.2.d: "In the haze of public unrest and waning morale, a familiar name returns from exile — Lenin has arrived.\n\nThough dismissed by some as a relic of the past, his presence stirs the factory floors and agitates the barracks. The ruling elite now faces a dilemma: suppress him, or risk lighting the fuse."

  soviet_agitation.3.d: "With the air thick with slogans and the streets echoing with chants, the Russian Empire finds itself at a dreadful precipice.\n\nCommunist influence surges, and loyalty fractures; the old regime must now either embrace revolution — or face it in arms. A nation stands between past and future, sword drawn against itself."

  # central asia
  soviet_central_asia.1.d: "Reports indicate an increase in Turanist propaganda circulating throughout Central Asia. Ottoman agents and sympathizers have been actively promoting pan-Turkic unity, seeking to stir nationalist sentiments among the diverse peoples of the region.\n\nThe movement’s true strength remains uncertain, but its potential to destabilize the imperial order cannot be ignored."

  soviet_central_asia.2.d: "Several Ottoman agents were uncovered attempting to coordinate with local Turanist groups. Their activities include distributing propaganda and fomenting unrest aimed at undermining imperial control.\n\nThe government must respond decisively if it hopes to quell these subversive efforts and maintain stability in this vital region."

  # mongolia
  soviet_mongolia.1.d: "The Russian envoy has delivered a direct demand: Mongolia must be granted full independence from Chinese administration. While this would formally severe our authority over the region, it is understood that the newly independent Mongolia would fall firmly within the Russian sphere of influence.\n\nGiven the current balance of power, refusing the demand could provoke dire consequences."

  soviet_mongolia.2.d: "In a move orchestrated by Russian diplomacy, Mongolia has declared its independence. Chinese officials have offered no resistance, likely under pressure from mounting Russian military presence along the border.\n\nWhile [SOV.capital.GetCapitalVictoryPointName] hails the decision as a victory for self-determination, many see it as a thinly veiled expansion of Russian control into Inner Asia."

  soviet_mongolia.3.d: "The Chinese government has rejected the Russian demand for Mongolian independence, refusing to yield to external pressure. This defiance has prompted a strong reaction in [SOV.capital.GetCapitalVictoryPointName], which now seeks to enforce its will through military means. A new conflict may be on the horizon."

  # steppe
  soviet_steppe.1.d: "Rumors spread from the east: Nestor Makhno has escaped from Siberian exile. The name stirs unease in village councils and garrisons alike.\n\nIn the scattered hamlets of southern Ukraine, old sympathizers stir — and the vast steppe once again whispers of rebellion."

  soviet_steppe.2.d: "Armed bands of anarchists have seized villages across the steppe, flying black flags and declaring the rule of communes.\n\nUnder Makhno’s name — real or claimed — the countryside descends into chaos. Authorities retreat or defect, and order dissolves into open defiance."

  # trans-amur
  soviet_transamur.1.d: "With Manchuria in foreign hands, our grip on the Far East weakens. The old Trans-Siberian route no longer runs end to end — and beyond the Amur, entire districts risk falling into silence.\n\nSome urge the construction of a new line through Russian soil alone. It would be long, costly, and difficult — but perhaps necessary."
