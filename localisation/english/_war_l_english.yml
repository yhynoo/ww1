l_english:

  # align
  _align.1.d: "[FROM.GetName] has issued a demand that we align ourselves under their influence, seeking to turn us into their dominion state. This outrageous move threatens our sovereignty and challenges our independence.\n\nThe choice is stark: submit and preserve peace, or resist and prepare for war."

  _align.2.d: "[FROM.GetName] has successfully brought [ROOT.GetNameDef] under its control, formalizing an alignment that places their nation in a subordinate position. This marks a significant shift on the world stage.\n\nWhile diplomacy has prevailed for now, many watch nervously what the future may hold."

  # anti-war
  _anti-war.1.d: "Crowds have taken to the streets in protest against the war. Demonstrators denounce the sacrifices demanded and point to the widespread hunger, malnutrition, and other civilian supply issues.\n\nAuthorities are unsure whether to repress the unrest or risk letting it grow unchecked."

  _anti-war.2.d: "Mutinies have broken out among the troops. Soldiers refuse to fight, demand peace, and in some cases assault their officers directly.\n\nThe insubordination is a stark warning: morale has broken, and loyalty now wavers."

  # armistice
  _armistice.1.d: "A change in government has brought new voices to the table, questioning the cost of continued war. The people grow weary, and the halls of power no longer echo with certainty.\n\nSome urge that the time has come to seek terms, lest further blood be spilled for too little gain."

  _armistice.2.d: "The front lines remain frozen, with neither side able to gain meaningful ground. Each advance is followed by retreat, and each victory feels hollow.\n\nThe war grinds on, but the question now hangs in the air: what, if anything, remains worth fighting for?"

  # army
  _army.1.d: "A new faction of aviation enthusiasts has emerged within the armed forces, insisting that the future of war lies in the skies.\n\nTheir calls for greater funding, training, and research into aerial combat stand in stark contrast to the army’s long-standing traditions — and threaten to reshape the nature of our military entirely."

  _army.2.d: "Senior officers of the old guard have expressed growing concern at what they call the ‘unruliness’ of the modern army. Discipline, ceremony, and loyalty to the crown, they argue, are giving way to informality and dangerous innovation.\n\nSome in the government are inclined to agree; others dismiss it as the eternal grumbling of the traditionalist class."

  # demand
  _demand.1.d: "The government of [FROM.GetName] has issued a stern demand for territory claimed by our nation. They insist that these lands rightfully belong to them, threatening further conflict if refused.\n\nThe choice lies before us: concede to avoid bloodshed, or stand firm and risk war."

  _demand.2.d: "[FROM.GetName] has accepted the transfer of territory, ceding control of the contested lands. This concession marks a significant diplomatic victory for [ROOT.GetNameDef] and reshapes the regional balance.\n\nWhether peace holds remains to be seen, but for now, the borders have shifted."

  # offer
  _offer.1.d: "A formal request for an armistice has arrived from [FROM.GetName], citing exhaustion and the growing cost of continued warfare. Their diplomats stress that peace may now serve both sides better than further sacrifice.\n\nIt is an unexpected offer — and one that could bring this bloody conflict to a close."

  _offer.2.d: "After careful deliberation, [FROM.GetName] and [ROOT.GetNameDef] have agreed to an armistice. The guns are silent — for now — and soldiers on both sides breathe a sigh of relief.\n\nPeace talks are expected to begin soon as the long war finally shows signs of ending."

  _offer.3.d: "In a sharp reply, [FROM.GetName] has rejected our proposal for an armistice, declaring their intent to continue fighting until complete victory is achieved.\n\nThe battlefield remains unchanged, but the message is clear: peace will have to wait."

  # outbreak
  _war_outbreak.1.d: "Reports are coming in of food shortages, delivery delays, and black-market profiteering.\n\nThe war effort is straining civilian supply lines, and patience among the public is beginning to fray."

  _war_outbreak.2.d: "In an unusual morale-building initiative, senior officers of the Navy have suggested commissioning a commemorative album — a collection of photographs celebrating our fleet’s might and the bravery of its sailors.\n\nIntended for display in all cities, the project would serve both as a symbol to inspire recruitment and support for the war at sea."