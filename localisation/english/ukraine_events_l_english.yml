l_english:

  # uprising
  ukraine_uprising.1.d: "Across the black soil plains, murmurs spread faster than the harvest. Ukraine grumbles of grain requisitions and distant rulers whose empire it carries on her shoulders.\n\nThe countryside grows restless, and even loyal officials whisper that something stirs beneath the steppe’s silence."

  ukraine_uprising.2.d: "The steppe burns with chaos. Bands of armed peasants seize trains, hoist blue and yellow banners, and proclaim their own justice. Authority fades between villages, swallowed by smoke and rumor.\n\nIn the steppe, the horizon looks endless — and the old empire’s capitals are far beyond it."
