l_english:

  # makhno
  ukraine_makhno.1.d: "In the villages of the south, radical pamphlets circulate alongside tales of returning deserters and stolen grain. Peasants speak of equality and vengeance, of communes and free men.\n\nLocal garrisons hesitate to intervene, unsure whether the agitation is merely political — or the start of something larger."

  ukraine_makhno.2.d: "Armed detachments under black flags now control the steppe, calling it the ‘Free Territory.’ Their leaders reject every state, red or white, promising only liberty and land.\n\nWhat began as rumor has become revolution, and the air over Ukraine crackles with defiance and gunpowder smoke."

  # uprising
  ukraine_uprising.1.d: "Across the black soil plains, murmurs spread faster than the harvest. Ukraine grumbles of grain requisitions and distant rulers whose empire it carries on her shoulders.\n\nThe countryside grows restless, and even loyal officials whisper that something stirs beneath the steppe’s silence."

  ukraine_uprising.2.d: "The steppe burns with chaos. Bands of armed peasants seize trains, hoist blue and yellow banners, and proclaim their own justice. Authority fades between villages, swallowed by smoke and rumor.\n\nIn the steppe, the horizon looks endless — and the old empire’s capitals are far beyond it."
