l_english:

  ## -- ITALY
  # tripoli
  ita_tripoli.1.d: "After the defeat of Tripoli, journalists across the country speak of humiliation, and soldiers return angry and disappointed in their superiors.\n\nSome call for the King to seize authority and restore order; others insist the socialists were right all along."

  # aeroplane
  ita_aeroplane.1.d: "Marinetti’s poem ‘The Pope’s Aeroplane’ spreads through cafés and salons, scandalizing conservatives and thrilling futurists.\n\nTo some it is harmless art, to others a blasphemous assault on tradition."

  # unrest in torino
  ita_torino.1.d: "Strikes in Torino spill into the streets. Workers clash with police, factories stand silent, and banners demand justice.\n\nThe government must decide whether to crush the unrest or risk emboldening the syndicalists."
  ita_torino.2.d: "Gunfire echoes through Torino as troops open fire on demonstrators. Sixteen lie dead, and the city trembles.\n\nThe massacre shocks the nation, deepening the gulf between government and ordinary Italians."
  ita_torino.3.d: "The massacre in Torino ignites a wider uprising. Workers seize rail yards, barricade streets, and declare their defiance.\n\nItaly descends into civil war."

  # syndicalists
  ita_syndicalists.1.d: "The syndicalists refuse to join liberal coalitions, demanding recognition of their unions and their cause.\n\nThe government must choose between concessions or confrontation."
  ita_syndicalists.2.d: "Union leaders present their demands: higher wages, safer conditions, and political respect.\n\nTo grant them risks empowering radicals; to dismiss them risks the degeneration of our state system again."

  # aegean
  ita_aegean.1.d: "Rome announces new claims in Albania and the Aegean. Diplomats whisper of ambition, and southeast Europe looks towards Italy with growing distrust.\n\nEurope watches uneasily as Italy extends its reach."

  # avanti
  ita_avanti.1.d: "The socialist paper ‘Avanti’ publishes a fiery editorial, questioning Italy’s place in the looming European war.\n\nMussolini’s words stir debate: opportunism or conviction, patriotism or folly?"

  # eia
  ita_eia.1.d: "With central authority over the country established, competing visions emerge to shape Italy’s future. D’Annunzio’s totalists call for a fervent, disciplined movement to restore national strength through spectacle and will.\n\nMarinetti’s accelerationists answer with promises of technological advancement, upheaval, and a new mechanised age."

  # elections
  ita_elections.1.d: "The election of 1913 unfolds amid crisis. Posters bloom on walls, and debates rage over whether Giolitti or Sacchi can steady the Republic.\n\nThe outcome may decide Italy’s fragile balance."
  ita_elections.2.d: "The election of 1917 arrives in more turmoil than ever. Giolitti’s cautious hand contrasts with Salandra’s martial promises.\n\nThe people must choose between continuity and confrontation."
  ita_elections.3.d: "By 1921, Italy is weary yet restless. Sturzo offers moral renewal, while Orlando promises pragmatic leadership.\n\nThe vote will shape Italy’s postwar destiny."
