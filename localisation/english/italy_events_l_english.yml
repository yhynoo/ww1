l_english:

  # aegean
  italy_aegean.1.d: "Italian diplomats have issued statements declaring historical and strategic claims over the Aegean islands, including Crete and the Dodecanese.\n\nThe move is being watched closely in Athens and Constantinople, where tensions over territorial ambitions are already high."

  # alps
  italy_alps.1.d: "Italy has formally annexed several Mediterranean territories previously seized during its war with France.\n\nThough quiet on the war-torn international stage, the act marks another step in Rome’s growing regional assertiveness."
