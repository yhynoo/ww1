l_english:

  # aegean
  italy_aegean.1.d: "Italian diplomats have issued statements declaring historical and strategic claims over Albania and the Aegean islands.\n\nThe move is being watched closely in Athens and Constantinople, where tensions over territorial ambitions are already high."

  italy_aegean.2.d: "Debate continues in Italian councils over whether to press claims into Kosovo and Epirus. Some see expansion as vital for security and resources, while others warn of overreach and possible conflict.\n\nThe decision may shape Italy’s role in southeastern Europe for years to come."

  italy_aegean.3.d: "The Italian government moves to pursue further annexations in southeastern Europe.\n\nHawks in Rome, sensing weakness in Constantinople, push to extract concessions from the ‘Sick Man of Europe,’ further destabilizing the region, with few expecting a peaceful outcome."

  # aeroplane
  italy_aeroplane.1.d: "Filippo Tommaso Marinetti has published his provocative poem, ‘The Pope's Aeroplane,’ glorifying speed, technology, and the bold spirit of futurism — the recent development on Italian art scene.\n\nThe work shocks traditionalists and the Church alike, sparking heated debates over art, progress, and the role of religion in an age of machines."

  # avanti
  italy_avanti.1.d: "In today’s issue of ‘Avanti!’, an editorial by the journalist Mussolini urges Italy to abandon neutrality and join the war alongside the Entente, arguing national honor demands it.\n\nYet many in Rome say Italy’s true foe should be France, not Austria — whatever the choice of allies, the nation is thirsty for glory."

  italy_avanti.2.d: "The question now dominates every café, barracks, and ministry: should Italy remain at peace, or join the fight? Interventionists see war as the final test of national unity, while others warn that the fields of Europe are already choked with the dead. The choice cannot be delayed much longer."

  # trasformismo
  italy_trasformismo.1.d: "The old system of ‘trasformismo’, haphazard and improvised political alliances, seems to be fraying under pressure.\n\nSocialists and communists are rallying together, united by fear of the rising authoritarian and futurist threat shaking Italy's political order."

  italy_trasformismo.2.d: "Filippo Turati, the veteran socialist and advocate of reformism, rises as the leading voice of Italy's socialists during these turbulent times.\n\nHis moderate stance and calls for cautious change challenge more radical elements within the movement — but they also make the socialists a more palatable ally."
