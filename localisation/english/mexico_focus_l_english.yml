l_english:
  MEX_army: "Army"
  MEX_army_desc: "Strengthen and modernize the land forces to prepare for future conflicts."

  MEX_army_maneuvers: "Army Maneuvers"
  MEX_army_maneuvers_desc: "Conduct large-scale training exercises to enhance combat readiness."

  MEX_conscription: "Announce Mobilization"
